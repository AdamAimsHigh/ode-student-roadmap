        let currentSubject = 'All';

        const grid = document.getElementById('reviews-grid');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const sortSelect = document.getElementById('sort-select');

        function renderStars(rating) {
            let stars = '';
            for(let i=1; i<=5; i++) {
                stars += (i <= rating) ? '★' : '☆';
            }
            return `<span class="review-stars">${stars}</span>`;
        }

        function renderReviews() {
            // Filter
            let filtered = reviewsData.filter(r => {
                if (currentSubject === 'All') return true;
                return r.subject === currentSubject || r.subject === 'All';
            });
            
            // Sort
            filtered.sort((a, b) => {
                if (currentSort === 'recent') {
                    return new Date(b.date) - new Date(a.date); // Hidden chronological sort
                } else if (currentSort === 'highest') {
                    // if ratings are same, sort by recent
                    if (b.rating === a.rating) return new Date(b.date) - new Date(a.date);
                    return b.rating - a.rating;
                }
                return 0;
            });

            grid.innerHTML = '';
            filtered.forEach(review => {
                const card = document.createElement('div');
                card.className = 'review-card';
                
                let responseHTML = '';
                if (review.response) {
                    responseHTML = `
                        <div class="tutor-response">
                            <div class="tutor-response-label">Tutor responded:</div>
                            <div class="tutor-response-text">${review.response}</div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="review-header">
                        <div>
                            <h3 class="review-title">${review.title}</h3>
                            <div class="review-meta"><strong>${review.student}</strong>, ${review.lessons} lesson${review.lessons !== 1 ? 's' : ''}</div>
                        </div>
                        <div>
                            ${renderStars(review.rating)}
                        </div>
                    </div>
                    <div class="review-text">${review.text}</div>
                    ${responseHTML}
                `;
                grid.appendChild(card);
            });
        }

        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentSubject = e.target.dataset.subject;
                renderReviews();
            });
        });

        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderReviews();
        });
