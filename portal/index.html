<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Staples Education</title>
    <meta name="description" content="The Staples Education student portal: your course library, your tutoring packages, and your account, all in one place.">
    <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48">

    <!-- Google Identity Services for the shared SSO loop. Loads async and
         degrades silently on file:// or offline sessions, exactly like the
         ODE spoke (WEBSITE_BLUEPRINT Pillar 5). This is the hub's ONLY
         external reference: no KaTeX, no Math.js, no framework. -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Pre-paint theme stamp: applies the stored preference before first
         layout so a dark-mode student never sees a light flash. app.js owns
         the full adaptive engine (system preference listener included). -->
    <script>
        (function () {
            try {
                var pref = localStorage.getItem("ode_theme_preference");
                var dark = pref === "dark" || (pref !== "light" &&
                    pref === "system" &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches);
                if (dark) document.documentElement.setAttribute("data-theme", "dark");
            } catch (err) { /* storage unavailable: light default */ }
        })();
    </script>

    <style>
        /* The Pillar 4 token palette, inherited verbatim from the ODE
           spoke's theme.css so the hub and every classroom render as one
           campus. Light on :root, the same token names overridden under
           [data-theme="dark"], switched by one root attribute. */
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --text-secondary: #5a5a6e;
            --panel-bg: #f4f4f4;
            --panel-border: rgba(0, 0, 0, 0.08);
            --accent-color: #6200ee;
            --accent-soft: rgba(98, 0, 238, 0.10);
            --accent-text: #6200ee;
            --success-color: #1b7a43;
            --error-color: #b3261e;
            --locked-color: #9b9ba8;
            --header-bg: #fafafa;
            --shadow-color: rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --text-secondary: #9aa0b0;
            --panel-bg: #1e1e1e;
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-color: #bb86fc;
            --accent-soft: rgba(187, 134, 252, 0.12);
            --accent-text: #c5a3ff;
            --success-color: #38c172;
            --error-color: #f2746b;
            --locked-color: #5c5c6a;
            --header-bg: #181818;
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .portal-header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--panel-border);
            padding: 1rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .portal-brand { min-width: 0; }

        .portal-brand-name {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-text);
            text-decoration: none;
        }

        .portal-title {
            margin: 0.15rem 0 0;
            font-size: 1.35rem;
        }

        .portal-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
        }

        .theme-row { display: flex; gap: 0.4rem; }

        .theme-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--panel-border);
            border-radius: 999px;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .theme-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: 600;
        }

        .auth-area {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        #auth-signin-slot[hidden] { display: none !important; }

        /* Signed-in identity cluster: circular avatar opening a compact
           account menu on hover or focus, plus a gear link to the account
           section. Token-identical to the ODE spoke's header treatment. */
        .auth-identity { display: flex; align-items: center; gap: 0.4rem; }
        .auth-identity[hidden] { display: none; }

        .auth-dropdown { position: relative; display: inline-block; }

        .auth-avatar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            padding: 0;
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .auth-dropdown:hover .auth-avatar-btn,
        .auth-dropdown:focus-within .auth-avatar-btn {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .auth-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .auth-avatar[hidden] { display: none; }

        .auth-avatar-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: var(--accent-soft);
            color: var(--accent-text);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .auth-avatar-fallback[hidden] { display: none; }

        .auth-menu {
            position: absolute;
            top: calc(100% + 0.4rem);
            right: 0;
            z-index: 1100;
            min-width: 13rem;
            margin: 0;
            padding: 0.35rem;
            list-style: none;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            box-shadow: 0 8px 24px var(--shadow-color);
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
            visibility: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
        }

        .auth-menu::before {
            content: "";
            position: absolute;
            top: -0.4rem;
            left: 0;
            right: 0;
            height: 0.4rem;
        }

        .auth-dropdown:hover .auth-menu,
        .auth-dropdown:focus-within .auth-menu {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            visibility: visible;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0s;
        }

        .auth-menu li { margin: 0; }

        .auth-menu-identity {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--panel-border);
            margin-bottom: 0.25rem;
        }

        .auth-status-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-color);
            overflow-wrap: anywhere;
        }

        .auth-status-email {
            font-size: 0.78rem;
            color: var(--text-secondary);
            overflow-wrap: anywhere;
        }

        .auth-status-email[hidden] { display: none; }

        .auth-signout {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.5rem 0.75rem;
            border: none;
            border-radius: 6px;
            background: none;
            color: var(--accent-text);
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
        }

        .auth-signout:hover,
        .auth-signout:focus-visible {
            background: var(--accent-soft);
            outline: none;
        }

        .auth-gear {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            color: var(--text-secondary);
            transition: color 0.2s ease, background-color 0.2s ease, transform 0.3s ease;
        }

        .auth-gear:hover,
        .auth-gear:focus-visible {
            color: var(--accent-color);
            background: var(--accent-soft);
            transform: rotate(30deg);
            outline: none;
        }

        .portal-main {
            max-width: 1080px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .portal-section { margin-bottom: 2.25rem; }

        .portal-section-title {
            margin: 0 0 0.35rem;
            font-size: 1.25rem;
        }

        .portal-section-sub {
            margin: 0 0 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .portal-note {
            color: var(--text-secondary);
            font-size: 0.9rem;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 0.9rem 1.1rem;
        }

        /* Course library grid */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
        }

        .course-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 0;
        }

        .course-card.active { border-top: 4px solid var(--accent-color); }

        .course-card.locked {
            border-top: 4px solid var(--locked-color);
            opacity: 0.75;
        }

        .course-card-title { margin: 0; font-size: 1.05rem; }

        .course-card-desc {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-grow: 1;
        }

        .course-card-cta {
            display: inline-block;
            align-self: flex-start;
            background: var(--accent-color);
            color: var(--bg-color);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
        }

        .course-card-cta:hover { box-shadow: 0 2px 10px var(--shadow-color); }

        .course-card-badge {
            display: inline-block;
            align-self: flex-start;
            border: 1px solid var(--locked-color);
            color: var(--locked-color);
            border-radius: 999px;
            padding: 0.25rem 0.8rem;
            font-size: 0.78rem;
            font-weight: 600;
        }

        /* Shared card and console shells (ported from the spoke settings) */
        .portal-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 1.1rem 1.25rem;
        }

        .portal-card-title { margin: 0 0 0.9rem; font-size: 1.05rem; }

        .admin-console {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-top: 4px solid var(--accent-color);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
        }

        .admin-console-title { margin: 0; font-size: 1.3rem; }

        .admin-section {
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px solid var(--panel-border);
        }

        .admin-status {
            margin: 0.5rem 0 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-height: 1.1em;
        }

        .admin-status.error { color: var(--error-color); }

        .catalog-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .catalog-card {
            background: var(--accent-soft);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }

        .catalog-card-title { margin: 0 0 0.3rem; font-size: 0.92rem; }

        .catalog-card-price {
            margin: 0;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .portal-hint {
            margin: 0 0 0.9rem;
            font-size: 0.83rem;
            color: var(--text-secondary);
        }

        .admin-form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            align-items: end;
        }

        .admin-field { display: flex; flex-direction: column; gap: 0.3rem; min-width: 0; }

        .admin-field-label { font-size: 0.78rem; color: var(--text-secondary); }

        .admin-input {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 0.45rem 0.6rem;
            font-size: 0.88rem;
            max-width: 100%;
        }

        .admin-input:focus { outline: 2px solid var(--accent-color); outline-offset: 1px; }

        .admin-input-minutes { width: 110px; }

        .primary-btn {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
        }

        .secondary-btn {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--text-color);
            border-radius: 8px;
            padding: 0.45rem 0.9rem;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .secondary-btn:hover { border-color: var(--accent-color); color: var(--accent-text); }

        .pkg-row { border-top: 1px solid var(--panel-border); padding: 0.75rem 0; }

        .pkg-row-title {
            margin: 0 0 0.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }

        .pkg-row-meta {
            margin: 0 0 0.5rem;
            font-size: 0.83rem;
            color: var(--text-secondary);
            overflow-wrap: anywhere;
        }

        .pkg-row-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; }

        .pkg-status {
            display: inline-block;
            border-radius: 999px;
            padding: 0.1rem 0.6rem;
            font-size: 0.72rem;
            font-weight: 600;
            border: 1px solid currentColor;
        }

        .pkg-status-quoted { color: var(--accent-text); background: var(--accent-soft); }
        .pkg-status-active { color: var(--success-color); }
        .pkg-status-completed { color: var(--text-secondary); }

        .session-log-list {
            margin: 0;
            padding-left: 1.25rem;
            font-size: 0.87rem;
        }

        .session-log-item { padding: 0.2rem 0; }

        .portal-footer {
            border-top: 1px solid var(--panel-border);
            padding: 1.25rem 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }

        @media (max-width: 800px) {
            .course-grid,
            .catalog-row,
            .admin-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="portal-header">
        <div class="portal-brand">
            <a href="../" class="portal-brand-name">Staples Education</a>
            <h1 class="portal-title">Student Portal</h1>
        </div>
        <div class="portal-controls">
            <div class="theme-row" aria-label="Color theme">
                <button type="button" class="theme-btn" data-theme-choice="light">Light</button>
                <button type="button" class="theme-btn" data-theme-choice="dark">Dark</button>
                <button type="button" class="theme-btn" data-theme-choice="system">System</button>
            </div>
            <div class="auth-area" aria-label="Account">
                <div id="auth-signin-slot"></div>
                <!-- Signed-in identity cluster: the circular Google avatar
                     opens a compact account menu (name, email, sign out),
                     and the gear links to the account section below. app.js
                     populates the avatar and labels from the decoded ID
                     token payload or the cached edge session profile. -->
                <div id="auth-status" class="auth-identity" hidden>
                    <div class="auth-dropdown">
                        <button type="button" class="auth-avatar-btn" aria-haspopup="true" aria-label="Account menu">
                            <img id="auth-avatar" class="auth-avatar" alt="" referrerpolicy="no-referrer" hidden>
                            <span id="auth-avatar-fallback" class="auth-avatar-fallback" aria-hidden="true"></span>
                        </button>
                        <ul class="auth-menu" role="menu" aria-label="Account options">
                            <li role="none" class="auth-menu-identity">
                                <span id="auth-status-label" class="auth-status-label">Signed in</span>
                                <span id="auth-status-email" class="auth-status-email" hidden></span>
                            </li>
                            <li role="none"><button type="button" id="auth-signout" class="auth-signout" role="menuitem">Sign out</button></li>
                        </ul>
                    </div>
                    <a class="auth-gear" href="#settings" aria-label="Your account and settings">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="3.2"></circle>
                            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.56-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1.03-1.56V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.56 1.03H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.56 1.03z"></path>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main id="portal-content" class="portal-main">
        <noscript>
            <p>The student portal requires JavaScript. Please enable it to load your courses.</p>
        </noscript>
    </main>

    <footer class="portal-footer">
        <p>Staples Education, built for conceptual understanding and first-principles logic.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
