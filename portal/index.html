<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Staples Education</title>
    <meta name="description" content="The Staples Education student portal: your course library, your tutoring packages, and your account, all in one place.">
    <!-- Strict favicon declarations (Google SERP fix, 2026-07-12). -->
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="48x48">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="96x96">
    <link rel="apple-touch-icon" href="/favicon.png">

    <!-- Google Identity Services for the shared SSO loop. Loads async and
         degrades silently on file:// or offline sessions, exactly like the
         ODE spoke (WEBSITE_BLUEPRINT Pillar 5). This is the hub's ONLY
         external reference: no KaTeX, no Math.js, no framework. -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Pre-paint theme stamp (system-default lighting engine, 2026-07-12):
         a stored MANUAL choice is stamped as data-theme before first layout
         so it overrides the OS base with no flash in either direction. With
         no manual choice the attribute stays absent and the
         prefers-color-scheme block below follows the OS natively, so system
         theming needs no JavaScript at all. -->
    <script>
        (function () {
            try {
                var pref = localStorage.getItem("ode_theme_preference");
                if (pref === "light" || pref === "dark") {
                    document.documentElement.setAttribute("data-theme", pref);
                }
            } catch (err) { /* storage unavailable: OS default */ }
        })();
    </script>

    <style>
        /* The Pillar 4 token palette, inherited verbatim from the ODE
           spoke's theme.css so the hub and every classroom render as one
           campus. Three-state contract on the root element (2026-07-12
           system-default lighting engine): light on :root, dark following
           the OS through the prefers-color-scheme block when no manual
           choice is stamped, and the same token names under an explicit
           [data-theme="dark"] for the manual override. */
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --text-secondary: #5a5a6e;
            --panel-bg: #f4f4f4;
            --panel-border: rgba(0, 0, 0, 0.08);
            --accent-color: #6200ee;
            --accent-soft: rgba(98, 0, 238, 0.10);
            --accent-text: #6200ee;
            --success-color: #1b7a43;
            --error-color: #b3261e;
            --locked-color: #9b9ba8;
            --header-bg: #fafafa;
            --shadow-color: rgba(0, 0, 0, 0.08);
        }

        /* System default: no manual stamp, so dark follows the OS. Values
           identical to the manual block below; keep them in sync. */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --text-secondary: #9aa0b0;
                --panel-bg: #1e1e1e;
                --panel-border: rgba(255, 255, 255, 0.08);
                --accent-color: #bb86fc;
                --accent-soft: rgba(187, 134, 252, 0.12);
                --accent-text: #c5a3ff;
                --success-color: #38c172;
                --error-color: #f2746b;
                --locked-color: #5c5c6a;
                --header-bg: #181818;
                --shadow-color: rgba(0, 0, 0, 0.4);
            }
        }

        :root[data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --text-secondary: #9aa0b0;
            --panel-bg: #1e1e1e;
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-color: #bb86fc;
            --accent-soft: rgba(187, 134, 252, 0.12);
            --accent-text: #c5a3ff;
            --success-color: #38c172;
            --error-color: #f2746b;
            --locked-color: #5c5c6a;
            --header-bg: #181818;
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .portal-header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--panel-border);
            padding: 1rem 1.5rem 0.9rem;
        }

        /* Campus bar (standardized header topography, 2026-07-12): one flex
           row with space-between, brand and Explore left, theme and the
           identity cluster right, wrap-ready on narrow viewports. */
        .campus-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem 1rem;
            padding-bottom: 0.85rem;
            border-bottom: 1px solid var(--panel-border);
            margin-bottom: 0.85rem;
        }

        .campus-left {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            min-width: 0;
        }

        .campus-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: inherit;
        }

        .campus-logo {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: block;
            flex-shrink: 0;
        }

        .campus-brand-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-color);
            white-space: nowrap;
        }

        .campus-brand:hover .campus-brand-name,
        .campus-brand:focus-visible .campus-brand-name {
            color: var(--accent-text);
        }

        .campus-right {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
        }

        /* Zero-dependency Explore dropdown, CSS-only via :hover and
           :focus-within, mirroring the ODE shell's nav-dropdown pattern. */
        .explore-dropdown { position: relative; display: inline-block; }

        .explore-trigger {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 0.45rem 0.9rem;
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
        }

        .explore-dropdown:hover .explore-trigger,
        .explore-dropdown:focus-within .explore-trigger {
            background: var(--accent-soft);
        }

        .explore-arrow {
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 5px solid currentColor;
        }

        .explore-menu {
            position: absolute;
            top: calc(100% + 0.4rem);
            left: 0;
            z-index: 1100;
            min-width: 15rem;
            margin: 0;
            padding: 0.35rem;
            list-style: none;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            box-shadow: 0 8px 24px var(--shadow-color);
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
            visibility: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
        }

        .explore-menu::before {
            content: "";
            position: absolute;
            top: -0.4rem;
            left: 0;
            right: 0;
            height: 0.4rem;
        }

        .explore-dropdown:hover .explore-menu,
        .explore-dropdown:focus-within .explore-menu {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            visibility: visible;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0s;
        }

        .explore-menu li { margin: 0; }

        .explore-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            text-decoration: none;
            color: var(--text-color);
            white-space: nowrap;
        }

        a.explore-item:hover,
        a.explore-item:focus-visible {
            background: var(--accent-soft);
            outline: none;
        }

        .explore-item.explore-active {
            color: var(--accent-text);
            font-weight: 600;
        }

        .explore-item.explore-locked {
            color: var(--locked-color);
            cursor: default;
        }

        .explore-badge {
            border: 1px solid var(--locked-color);
            color: var(--locked-color);
            border-radius: 999px;
            padding: 0.05rem 0.5rem;
            font-size: 0.68rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .auth-portal-link {
            color: var(--accent-text);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            white-space: nowrap;
        }

        .auth-portal-link:hover,
        .auth-portal-link:focus-visible {
            background: var(--accent-soft);
            outline: none;
        }

        .portal-title {
            margin: 0;
            font-size: 1.35rem;
        }

        .theme-row { display: flex; gap: 0.4rem; }

        .theme-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--panel-border);
            border-radius: 999px;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .theme-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: 600;
        }

        .auth-area {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        #auth-signin-slot[hidden] { display: none !important; }

        /* Signed-in identity cluster: circular avatar opening a compact
           account menu on hover or focus, plus a gear link to the account
           section. Token-identical to the ODE spoke's header treatment. */
        .auth-identity { display: flex; align-items: center; gap: 0.4rem; }
        .auth-identity[hidden] { display: none; }

        .auth-dropdown { position: relative; display: inline-block; }

        .auth-avatar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            padding: 0;
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .auth-dropdown:hover .auth-avatar-btn,
        .auth-dropdown:focus-within .auth-avatar-btn {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .auth-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .auth-avatar[hidden] { display: none; }

        .auth-avatar-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: var(--accent-soft);
            color: var(--accent-text);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .auth-avatar-fallback[hidden] { display: none; }

        .auth-menu {
            position: absolute;
            top: calc(100% + 0.4rem);
            right: 0;
            z-index: 1100;
            min-width: 13rem;
            margin: 0;
            padding: 0.35rem;
            list-style: none;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            box-shadow: 0 8px 24px var(--shadow-color);
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
            visibility: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
        }

        .auth-menu::before {
            content: "";
            position: absolute;
            top: -0.4rem;
            left: 0;
            right: 0;
            height: 0.4rem;
        }

        .auth-dropdown:hover .auth-menu,
        .auth-dropdown:focus-within .auth-menu {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            visibility: visible;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0s;
        }

        .auth-menu li { margin: 0; }

        .auth-menu-identity {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--panel-border);
            margin-bottom: 0.25rem;
        }

        .auth-status-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-color);
            overflow-wrap: anywhere;
        }

        .auth-status-email {
            font-size: 0.78rem;
            color: var(--text-secondary);
            overflow-wrap: anywhere;
        }

        .auth-status-email[hidden] { display: none; }

        .auth-signout {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.5rem 0.75rem;
            border: none;
            border-radius: 6px;
            background: none;
            color: var(--accent-text);
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
        }

        .auth-signout:hover,
        .auth-signout:focus-visible {
            background: var(--accent-soft);
            outline: none;
        }

        .auth-gear {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            color: var(--text-secondary);
            transition: color 0.2s ease, background-color 0.2s ease, transform 0.3s ease;
        }

        .auth-gear:hover,
        .auth-gear:focus-visible {
            color: var(--accent-color);
            background: var(--accent-soft);
            transform: rotate(30deg);
            outline: none;
        }

        .portal-main {
            max-width: 1080px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .portal-section { margin-bottom: 2.25rem; }

        .portal-section-title {
            margin: 0 0 0.35rem;
            font-size: 1.25rem;
        }

        .portal-section-sub {
            margin: 0 0 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .portal-note {
            color: var(--text-secondary);
            font-size: 0.9rem;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 0.9rem 1.1rem;
        }

        /* Course library grid */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
        }

        .course-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 0;
        }

        .course-card.active { border-top: 4px solid var(--accent-color); }

        .course-card.locked {
            border-top: 4px solid var(--locked-color);
            opacity: 0.75;
        }

        .course-card-title { margin: 0; font-size: 1.05rem; }

        .course-card-desc {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-grow: 1;
        }

        .course-card-cta {
            display: inline-block;
            align-self: flex-start;
            background: var(--accent-color);
            color: var(--bg-color);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
        }

        .course-card-cta:hover { box-shadow: 0 2px 10px var(--shadow-color); }

        .course-card-badge {
            display: inline-block;
            align-self: flex-start;
            border: 1px solid var(--locked-color);
            color: var(--locked-color);
            border-radius: 999px;
            padding: 0.25rem 0.8rem;
            font-size: 0.78rem;
            font-weight: 600;
        }

        /* Shared card and console shells (ported from the spoke settings) */
        .portal-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 1.1rem 1.25rem;
        }

        .portal-card-title { margin: 0 0 0.9rem; font-size: 1.05rem; }

        .admin-console {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-top: 4px solid var(--accent-color);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
        }

        .admin-console-title { margin: 0; font-size: 1.3rem; }

        .admin-section {
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px solid var(--panel-border);
        }

        .admin-status {
            margin: 0.5rem 0 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-height: 1.1em;
        }

        .admin-status.error { color: var(--error-color); }

        .catalog-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .catalog-card {
            background: var(--accent-soft);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }

        .catalog-card-title { margin: 0 0 0.3rem; font-size: 0.92rem; }

        .catalog-card-price {
            margin: 0;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .portal-hint {
            margin: 0 0 0.9rem;
            font-size: 0.83rem;
            color: var(--text-secondary);
        }

        .admin-form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            align-items: end;
        }

        .admin-field { display: flex; flex-direction: column; gap: 0.3rem; min-width: 0; }

        .admin-field-label { font-size: 0.78rem; color: var(--text-secondary); }

        .admin-input {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 0.45rem 0.6rem;
            font-size: 0.88rem;
            max-width: 100%;
        }

        .admin-input:focus { outline: 2px solid var(--accent-color); outline-offset: 1px; }

        .admin-input-minutes { width: 110px; }

        .primary-btn {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
        }

        .secondary-btn {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--text-color);
            border-radius: 8px;
            padding: 0.45rem 0.9rem;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .secondary-btn:hover { border-color: var(--accent-color); color: var(--accent-text); }

        .pkg-row { border-top: 1px solid var(--panel-border); padding: 0.75rem 0; }

        .pkg-row-title {
            margin: 0 0 0.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }

        .pkg-row-meta {
            margin: 0 0 0.5rem;
            font-size: 0.83rem;
            color: var(--text-secondary);
            overflow-wrap: anywhere;
        }

        .pkg-row-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; }

        .pkg-status {
            display: inline-block;
            border-radius: 999px;
            padding: 0.1rem 0.6rem;
            font-size: 0.72rem;
            font-weight: 600;
            border: 1px solid currentColor;
        }

        .pkg-status-quoted { color: var(--accent-text); background: var(--accent-soft); }
        .pkg-status-active { color: var(--success-color); }
        .pkg-status-completed { color: var(--text-secondary); }

        .session-log-list {
            margin: 0;
            padding-left: 1.25rem;
            font-size: 0.87rem;
        }

        .session-log-item { padding: 0.2rem 0; }

        .portal-footer {
            border-top: 1px solid var(--panel-border);
            padding: 1.25rem 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }

        @media (max-width: 800px) {
            .course-grid,
            .catalog-row,
            .admin-form {
                grid-template-columns: 1fr;
            }

            /* Narrow-viewport dropdown sheets: panels re-anchor from their
               trigger to the campus bar row, so no trigger position can
               push a panel, visible or hidden, past the viewport. */
            .campus-bar { position: relative; }

            .explore-dropdown,
            .auth-dropdown { position: static; }

            .explore-menu,
            .auth-menu {
                left: 0;
                right: 0;
                min-width: 0;
                max-width: none;
            }

            .explore-item { white-space: normal; }
        }
    </style>
</head>
<body>
    <header class="portal-header">
        <!-- Campus bar (standardized header topography, 2026-07-12). -->
        <div class="campus-bar">
            <div class="campus-left">
                <a href="../" class="campus-brand" aria-label="StaplesEducation.com home">
                    <img src="../favicon.png" alt="" class="campus-logo">
                    <span class="campus-brand-name">StaplesEducation.com</span>
                </a>
                <nav class="explore-dropdown" aria-label="Explore courses">
                    <button type="button" class="explore-trigger" aria-haspopup="true" aria-expanded="false">
                        Explore
                        <span class="explore-arrow" aria-hidden="true"></span>
                    </button>
                    <ul class="explore-menu" role="menu" aria-label="Courses">
                        <li role="none"><a role="menuitem" class="explore-item explore-active" href="../ode/">Ordinary Differential Equations</a></li>
                        <li role="none"><span class="explore-item explore-locked">Linear Algebra<span class="explore-badge">Coming Soon</span></span></li>
                        <li role="none"><span class="explore-item explore-locked">Calculus<span class="explore-badge">Coming Soon</span></span></li>
                    </ul>
                </nav>
            </div>
            <div class="campus-right">
                <div class="theme-row" aria-label="Color theme">
                    <button type="button" class="theme-btn" data-theme-choice="light">Light</button>
                    <button type="button" class="theme-btn" data-theme-choice="dark">Dark</button>
                    <button type="button" class="theme-btn" data-theme-choice="system">System</button>
                </div>
                <div class="auth-area" aria-label="Account">
                <div id="auth-signin-slot"></div>
                <!-- Signed-in identity cluster: the circular Google avatar
                     opens a compact account menu (name, email, sign out),
                     and the gear links to the account section below. app.js
                     populates the avatar and labels from the decoded ID
                     token payload or the cached edge session profile. -->
                <div id="auth-status" class="auth-identity" hidden>
                    <a class="auth-portal-link" href="./">Student Portal</a>
                    <div class="auth-dropdown">
                        <button type="button" class="auth-avatar-btn" aria-haspopup="true" aria-label="Account menu">
