<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODE Playlist Study Dashboard</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- KaTeX for beautiful LaTeX rendering in Quizzes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <!-- Math.js for robust local mathematical parsing and evaluation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #020617 100%);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glow-color: rgba(99, 102, 241, 0.4);
            --card-bg: rgba(30, 41, 59, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #10b981;
            --sidebar-width: 320px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, .chapter-title {
            font-family: 'Outfit', sans-serif;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.6);
        }

        /* Header block */
        header {
            position: relative;
            padding: 3rem 2rem 2.5rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.3);
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(8px);
        }

        .glow-circle {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 250px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.25) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 1.5rem;
            font-weight: 300;
        }

        /* Progress Dashboard Banner */
        .progress-banner {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .progress-info {
            text-align: left;
        }

        .progress-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .progress-percentage {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
        }

        .progress-track-bg {
            flex-grow: 1;
            height: 10px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--accent-gradient);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Main Grid Layout */
        .app-container {
            max-width: 1500px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: flex;
            gap: 2rem;
            flex-grow: 1;
            width: 100%;
        }

        /* Sidebar Navigation & Filters */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            position: sticky;
            top: 2rem;
            height: calc(100vh - 6rem);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reset-btn {
            font-size: 0.75rem;
            color: #ef4444;
            background: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }

        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 0.25rem;
        }

        .filter-item {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .filter-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }

        .filter-item.active {
            background: rgba(99, 102, 241, 0.15);
            color: var(--text-primary);
            border-color: rgba(99, 102, 241, 0.3);
            font-weight: 600;
        }

        .filter-badge {
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-weight: 400;
        }

        .filter-item.active .filter-badge {
            background: var(--accent-gradient);
            color: white;
            font-weight: 600;
        }

        /* Content Area */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* Chapter Section */
        .chapter-section {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scroll-margin-top: 2rem;
            transition: opacity 0.3s;
        }

        .chapter-header {
            border-bottom: 2px solid rgba(99, 102, 241, 0.25);
            padding-bottom: 0.75rem;
        }

        .chapter-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .chapter-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* Video Card Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* Video Card */
        .video-card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 
                        0 0 15px 0 rgba(99, 102, 241, 0.1);
        }

        .video-card.watched {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            overflow: hidden;
        }

        .thumbnail-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .video-card:hover .thumbnail-img {
            transform: scale(1.05);
        }

        /* Checkbox watched layer */
        .card-checkbox-label {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.85);
            border: 1.5px solid var(--card-border);
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .card-checkbox-label:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .card-checkbox {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-secondary);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: transparent;
        }

        .card-checkbox:checked {
            background: var(--success-color);
            border-color: var(--success-color);
        }

        .card-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 11px;
            font-weight: 900;
        }

        .orig-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.85);
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(4px);
            font-weight: 500;
        }

        .video-details {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
            gap: 1rem;
        }

        .video-title-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.2s;
        }

        .video-title-link:hover {
            color: #a855f7;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }

        .play-btn {
            width: 100%;
            padding: 0.65rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 0.85rem;
        }

        .play-btn:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
            transform: scale(1.02);
            color: #fff;
        }

        }

        /* Inline Quiz Card */
        .quiz-card-inline {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6) 0%, rgba(76, 29, 149, 0.2) 100%);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .quiz-card-inline:hover {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 
                        0 0 15px 0 rgba(139, 92, 246, 0.2);
        }
        
        .quiz-card-inline.passed {
            border-color: rgba(16, 185, 129, 0.4);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6) 0%, rgba(6, 78, 59, 0.2) 100%);
        }

        .quiz-card-inline.passed:hover {
            border-color: rgba(16, 185, 129, 0.6);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 
                        0 0 15px 0 rgba(16, 185, 129, 0.2);
        }

        .quiz-card-header {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Matches 16:9 Aspect Ratio */
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-card-icon-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .quiz-card-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.6));
            animation: float 3s ease-in-out infinite;
        }

        .quiz-card-inline.passed .quiz-card-icon {
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.6));
            animation: none;
        }

        .quiz-card-badge {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #c084fc;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .quiz-card-inline.passed .quiz-card-badge {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #34d399;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        /* Quiz Styles */
        .quiz-badge-btn {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            margin-top: 8px;
            font-family: 'Outfit', sans-serif;
        }

        .quiz-badge-btn:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .quiz-passed-badge {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #34d399;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
        }

        /* Modal Background */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.75);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Modal Container */
        .quiz-modal {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: 90%;
            max-width: 650px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        0 0 40px rgba(99, 102, 241, 0.15);
            backdrop-filter: blur(20px);
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .quiz-modal {
            transform: scale(1);
        }

        .close-modal-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal-btn:hover {
            color: var(--text-primary);
        }

        /* Quiz UI Elements */
        .quiz-header {
            margin-bottom: 1.5rem;
        }

        .quiz-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .quiz-progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .quiz-progress-bar-bg {
            height: 6px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 3px;
            overflow: hidden;
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .quiz-progress-bar-fill {
            height: 100%;
            background: var(--accent-gradient);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.5;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .option-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .option-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(99, 102, 241, 0.3);
            color: var(--text-primary);
        }

        .option-card.selected {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.6);
            color: var(--text-primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.25);
        }

        .option-card.correct {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--success-color);
            color: var(--text-primary);
        }

        .option-card.incorrect {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
            color: var(--text-primary);
        }

        .option-radio {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-secondary);
            border-radius: 50%;
            outline: none;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .option-card.correct .option-radio {
            border-color: var(--success-color);
            background: var(--success-color);
        }

        .option-card.correct .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
        }

        .option-card.incorrect .option-radio {
            border-color: #ef4444;
            background: #ef4444;
        }

        .option-card.incorrect .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
        }

        .option-card.selected .option-radio {
            border-color: #a855f7;
        }

        .option-card.selected .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-gradient);
        }

        /* Feedback Area */
        .feedback-container {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .feedback-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .feedback-title.correct { color: var(--success-color); }
        .feedback-title.incorrect { color: #ef4444; }

        .feedback-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Action Buttons */
        .quiz-actions {
            display: flex;
            align-items: center;

ng to find when you solve $\\frac{dy}{dx} = 2x$?"}, {"questionNumber": 2, "question": "In the differential equation modeling radioactive decay, $\\frac{dN}{dt} = -\\lambda N$, identify the independent variable.", "answerOptions": [{"text": "$N$ (the amount of substance)", "rationale": "Incorrect. $N$ is the dependent variable, as its value depends on how much time has passed.", "isCorrect": false}, {"text": "$\\lambda$ (the decay constant)", "rationale": "Incorrect. $\\lambda$ is a constant parameter, not a variable.", "isCorrect": false}, {"text": "$t$ (time)", "rationale": "Correct! Time ($t$) drives the system. We are measuring the rate of change of the substance *with respect to* time.", "isCorrect": true}, {"text": "Both $N$ and $t$", "rationale": "Incorrect. An ODE has one dependent and one independent variable.", "isCorrect": false}], "hint": "Look at the denominator of the derivative fraction. What is the system changing *with respect to*?"}, {"questionNumber": 3, "question": "Which of the following is an example of an Ordinary Differential Equation (ODE)?", "answerOptions": [{"text": "$x^2 - 4x + 4 = 0$", "rationale": "Incorrect. This is a standard algebraic quadratic equation, containing no derivatives.", "isCorrect": false}, {"text": "$\\frac{\\partial u}{\\partial t} = \\alpha \\frac{\\partial^2 u}{\\partial x^2}$", "rationale": "Incorrect. The presence of partial derivatives ($\\partial$) makes this a Partial Differential Equation (PDE).", "isCorrect": false}, {"text": "$y = e^{2x} + C$", "rationale": "Incorrect. This is a solution (a function), not a differential equation itself.", "isCorrect": false}, {"text": "$m\\frac{d^2x}{dt^2} + c\\frac{dx}{dt} + kx = 0$", "rationale": "Correct! This equation (modeling a damped harmonic oscillator) contains ordinary derivatives of a single dependent variable ($x$) with respect to a single independent variable ($t$).", "isCorrect": true}], "hint": "An ODE must contain standard derivatives (like $\\frac{dy}{dx}$ or hange of variables step that allows integrals to be separated by variable. It links the derivative $\\frac{dy}{dt}$ to the differentials $dy$ and $dt$."}, {"questionNumber": 4, "question": "After integrating both sides of a separable differential equation, what essential constant must always be included in the solution?", "answerOptions": [{"text": "A constant of proportionality, $k$.", "rationale": "A constant of proportionality, such as $k$ in $y' = ky$, is part of the original differential equation and not a constant introduced during indefinite integration.", "isCorrect": false}, {"text": "A multiplicative constant, $C_m$.", "rationale": "While an additive constant of integration can become a multiplicative constant after exponentiation (e.g., $e^{kt+C} = e^{kt}e^C = C_m e^{kt}$), the constant directly resulting from indefinite integration is additive.", "isCorrect": false}, {"text": "An additive constant of integration, $C$.", "rationale": "The lecture repeatedly emphasizes, 'then I always have to remember to add the plus $C$ my additive constant of integration.' This constant arises from indefinite integration and represents the family of solutions.", "isCorrect": true}, {"text": "A singular constant, $S$.", "rationale": "A 'singular constant' is not a standard term for a constant introduced by integration. Singular solutions are a separate concept.", "isCorrect": false}], "hint": "Remember what happens when you perform an indefinite integral. There's always an arbitrary constant."}, {"questionNumber": 5, "question": "What type of solution might be *missed* by the standard separation of variables methodology and often arises when $g(y) = 0$ in the separable form $\\frac{dy}{dt} = f(t)g(y)$?", "answerOptions": [{"text": "The general solution.", "rationale": "The general solution is precisely what the separation of variables method aims to find (excluding the specific case of missed solutions).", "isCorrect": false}, {"text": "An implicit solution.", "rationale" d inside transcendental functions when determining the order."}, {"questionNumber": 3, "question": "After rationalizing (if necessary) to remove radicals, what is the degree of the differential equation $$\\left( \\frac{d^2y}{dx^2} \\right)^2 + 3y \\frac{dy}{dx} = \\left( \\frac{d^3y}{dx^3} \\right)^1$$", "answerOptions": [{"text": "1", "rationale": "The order of the DE is determined by the highest derivative, which is the third derivative (order 3). The degree is the exponent of this highest-order derivative. In this case, $\\frac{d^3y}{dx^3}$ is raised to the power of 1.", "isCorrect": true}, {"text": "2", "rationale": "The exponent of 2 belongs to the second derivative, which is not the highest order derivative in this equation. The degree is taken from the highest order derivative.", "isCorrect": false}, {"text": "3", "rationale": "This value represents the *order* of the differential equation, which is the highest derivative present (the third derivative). The degree is the exponent of that highest derivative.", "isCorrect": false}, {"text": "Undefined", "rationale": "The degree is well-defined as the exponent of the highest-order derivative, provided the equation is polynomial in its derivatives and free from radicals.", "isCorrect": false}], "hint": "First, identify the order (the highest derivative). Then, find the exponent to which that specific highest derivative is raised. Remember to remove radicals first, though not needed here."}, {"questionNumber": 4, "question": "Which of the following differential equations is an Ordinary Differential Equation (ODE)?", "answerOptions": [{"text": "$$ \\frac{\\partial^2u}{\\partial x^2} + \\frac{\\partial^2u}{\\partial y^2} = 0 $$", "rationale": "This equation contains partial derivatives (denoted by $\\partial$), making it a Partial Differential Equation (PDE), as defined in the lecture.", "isCorrect": false}, {"text": "$$ \\frac{dy}{dx} + y = x^2 $$", "rationale": "This equation contains only ordinary derivatives (d atch.", "rationale": "While graphical methods can offer insights, they are not a rigorous analytical verification method for confirming a solution to a differential equation, as taught in the lecture.", "isCorrect": false}, {"text": "Check if the order and degree of $y(x)$ match that of the differential equation.", "rationale": "The concepts of order and degree apply to the differential equation itself, not to the solution function $y(x)$. This step does not verify if $y(x)$ satisfies the DE.", "isCorrect": false}], "hint": "Recall the detailed steps shown in the 'proof of solution' examples, where functions and their derivatives were directly 'plugged in'."}]}, "inline_p_di4Zn4wz4_definitions": {"quiz_id": "inline_p_di4Zn4wz4_definitions", "chapter_number": 1, "video_id": "p_di4Zn4wz4", "title": "Micro-Practice: Introduction to Differential Equations", "questions": [{"questionNumber": 1, "question": "According to the lecture, what is the primary distinguishing characteristic between Ordinary Differential Equations (ODEs) and Partial Differential Equations (PDEs)?", "answerOptions": [{"text": "ODEs describe systems with constant parameters, while PDEs describe systems with varying parameters.", "rationale": "The lecture does not define ODEs and PDEs based on constant versus varying parameters; it focuses on the number of independent variables.", "isCorrect": false}, {"text": "ODEs involve functions with a single independent input, often time, whereas PDEs deal with functions that have multiple independent inputs.", "rationale": "The transcript states: \"These equations come in two different flavors, ordinary differential equations, or ODEs, involving functions with a single input, often thought of as time, and partial differential equations, or PDEs, dealing with functions that have multiple inputs.\"", "isCorrect": true}, {"text": "ODEs represent linear relationships, while PDEs always represent non-linear relationships.", "rationale": "The lecture does not define  these phenomena DEs are best suited to describe."}, {"questionNumber": 3, "question": "How does the lecture describe the common approach to visualize and analyze a second-order Ordinary Differential Equation, such as the damped pendulum equation $\\theta'' = -\\frac{g}{L} \\sin(\\theta) - \\mu \\theta'$, in a phase space?", "answerOptions": [{"text": "By directly plotting the third derivative of the primary variable against time.", "rationale": "The lecture focuses on reducing higher-order ODEs to first-order systems, not on increasing the order or plotting higher derivatives directly in phase space.", "isCorrect": false}, {"text": "By reducing it to a system of two coupled first-order equations involving the primary variable and its first derivative, then visualizing trajectories in a two-dimensional state plane.", "rationale": "The lecture explains, \"Instead of thinking about higher order changes of a single value, we often prefer to think of the first derivative of vector values... Notice we've effectively broken up a single second-order equation into a system of two first-order equations.\" This involves representing the state as $(\\theta, \\theta')$.", "isCorrect": true}, {"text": "By transforming the equation into a partial differential equation to handle the multiple variables.", "rationale": "The lecture explicitly discusses Ordinary Differential Equations and reducing higher-order ODEs to systems of first-order ODEs, not converting them into Partial Differential Equations.", "isCorrect": false}, {"text": "By finding an exact analytical solution involving special functions, then plotting these functions.", "rationale": "The lecture explicitly states that exact analytical solutions are often \"hilariously complicated\" or non-existent for such equations, and the phase space approach is presented as an alternative for understanding when analytical solutions are elusive.", "isCorrect": false}], "hint": "Think about how the 'state' of the pendulum was defined properties of logarithms and exponentials.", "isCorrect": false}, {"text": "$$I(x) = x^4$$", "rationale": "This is the correct integrating factor. Following the lecture's method, $I(x) = e^{\\int p(x) \\, dx} = e^{\\int \\frac{4}{x} \\, dx} = e^{4 \\ln x}$. Using the logarithm property $a \\ln b = \\ln b^a$, this becomes $e^{\\ln x^4}$. Finally, since $e^{\\ln f(x)} = f(x)$, we get $x^4$.", "isCorrect": true}, {"text": "$$I(x) = 4x$$", "rationale": "This is incorrect. The antiderivative of $p(x) = \\frac{4}{x}$ is $4 \\ln |x|$, not $4x$. The integrating factor involves an exponential of the integral.", "isCorrect": false}, {"text": "$$I(x) = e^{4x}$$", "rationale": "This is incorrect. This would be the integrating factor if $p(x)$ were $4$, not $\\frac{4}{x}$.", "isCorrect": false}], "hint": "Recall the formula for the integrating factor: $I(x) = e^{\\int p(x) \\, dx}$. Don't forget the properties of logarithms and exponentials to simplify the expression."}, {"questionNumber": 3, "question": "Once the integrating factor $I(x)$ and $q(x)$ are identified, what is the correct general solution formula for a first-order linear differential equation, as presented in the lecture?", "answerOptions": [{"text": "$$y = I(x) \\left( \\int \\frac{q(x)}{I(x)} \\, dx + C \\right)$$", "rationale": "This formula is incorrect. The integrating factor $I(x)$ should be in the denominator outside the integral and in the numerator inside the integral, multiplied by $q(x)$.", "isCorrect": false}, {"text": "$$y = \\frac{1}{I(x)} \\left( \\int I(x)q(x) \\, dx + C \\right)$$", "rationale": "This is the correct general solution formula for a first-order linear differential equation, as explicitly stated and applied in the lecture. The constant of integration $C$ is included inside the parenthesis before distributing $1/I(x)$.", "isCorrect": true}, {"text": "$$y = \\frac{1}{I(x)} \\int I(x)q(x) \\, dx + C$$", "rationale": "This formula is incorrect because the constant of integration $C$ is pla ure gives a clear warning about when *not* to add the constant of integration."}, {"questionNumber": 5, "question": "Consider the differential equation $(x-2)y' + y = x^2 - 4$. What is the immediate first step to prepare this equation for solving using the integrating factor method, according to the lecture?", "answerOptions": [{"text": "Identify $p(x) = \\frac{1}{x-2}$ and $q(x) = x+2$.", "rationale": "While these are correctly identified functions $p(x)$ and $q(x)$, they cannot be identified from the original equation directly. The equation must first be put into standard form, which involves a prior step.", "isCorrect": false}, {"text": "Determine the integrating factor $I(x) = e^{\\int p(x) \\, dx}$.", "rationale": "Calculating the integrating factor is a later step. You first need to identify $p(x)$, which requires the equation to be in standard form.", "isCorrect": false}, {"text": "Divide every term by $(x-2)$ to transform it into the standard form $y' + p(x)y = q(x)$.", "rationale": "This is the correct first step. The lecture explicitly states that to put it in standard form, the coefficient of $y'$ must be $1$, which means dividing all terms by $(x-2)$ in this case.", "isCorrect": true}, {"text": "Cross-multiply terms to separate the variables for integration.", "rationale": "Cross-multiplication is not the standard approach for linear first-order differential equations in this format. The primary goal is to achieve the $y' + p(x)y = q(x)$ standard form.", "isCorrect": false}], "hint": "Recall the very first instruction given in the lecture for any first-order linear differential equation: 'you need to write it in standard form'."}]}, "inline_pgJci5CI9n4_definitions": {"quiz_id": "inline_pgJci5CI9n4_definitions", "chapter_number": 5, "video_id": "pgJci5CI9n4", "title": "Micro-Practice: Exact Differential Equations", "questions": [{"questionNumber": 1, "question": "Given a function $f(x, y) = 2x^3y^2 + y - x^2$, what is its partial derivative with respect to $x$, i.e., $\\frac{\\partial f}{\\partial x}$?", "answerOptions": [{"text": "$6x^2y^2 - 2x + 1$", "rationale": "When taking the partial derivative with respect to $x$, terms containing only $y$ (like $y$) are treated as constants, and their derivative with respect to $x$ is $0$.", "isCorrect": false}, {"text": "$6x^2y^2 - 2x$", "rationale": "As explained in the lecture, when taking the partial derivative of $f(x, y)$ with respect to $x$, we treat $y$ as a constant. The derivative of $2x^3y^2$ with respect to $x$ is $6x^2y^2$ (treating $y^2$ as a constant multiplier). The derivative of $y$ with respect to $x$ is $0$ (as $y$ is a constant). The derivative of $-x^2$ with respect to $x$ is $-2x$. Thus, $\\frac{\\partial f}{\\partial x} = 6x^2y^2 - 2x$.", "isCorrect": true}, {"text": "$4x^3y + 1 - 2x$", "rationale": "This option incorrectly takes the derivative of $y^2$ with respect to $y$ (not $x$) in the first term, and treats $x^2$ as a constant in the last term.", "isCorrect": false}, {"text": "$4x^3y + 1$", "rationale": "This option represents the partial derivative of $f(x, y)$ with respect to $y$, not $x$.", "isCorrect": false}], "hint": "Recall that when taking a partial derivative with respect to $x$, all other variables (like $y$) are treated as constants."}, {"questionNumber": 2, "question": "According to the lecture, what is the condition for a differential equation $M(x, y)dx + N(x, y)dy = 0$ to be exact?", "answerOptions": [{"text": "$\\frac{\\partial M}{\\partial x} = \\frac{\\partial N}{\\partial y}$", "rationale": "This condition incorrectly swaps the variables with respect to which the partial derivatives are taken. The condition for exactness is the cross-partial equality.", "isCorrect": false}, {"text": "$\\frac{\\partial M}{\\partial y} = \\frac{\\partial N}{\\partial x}$", "rationale": "The lecture states that for an equation to be exact, 'it does not matter the order in which you do your partial derivatives you will get the same exact answer'. This refers to Clairaut's Theorem, which mathematically is expressed as $\\frac{\\partial}{\\partial y} (\\frac{\\partial f}{\\partial x}) = \\frac{\\partial}{\\partial x} (\\frac{\\partial f}{\\partial y})$, or in terms of $M$ and $N$, $\\frac{\\partial M}{\\partial y} = \\frac{\\partial N}{\\partial x}$.", "isCorrect": true}, {"text": "$M(x, y) = N(x, y)$", "rationale": "This condition is generally not required for an equation to be exact. Exactness depends on the relationship between their partial derivatives, not direct equality.", "isCorrect": false}, {"text": "$\\frac{dM}{dx} = \\frac{dN}{dy}$", "rationale": "This option uses total derivatives, which is incorrect in the context of exact equations which involve partial derivatives with respect to specific variables.", "isCorrect": false}], "hint": "Recall Alexis Clairaut's theorem discussed in the video regarding the order of partial differentiation."}, {"questionNumber": 3, "question": "For the exact equation given in the example, $y^2 dx + (2xy + \\cos y) dy = 0$, what are $M(x, y)$ and $N(x, y)$?", "answerOptions": [{"text": "$M = 2xy + \\cos y$, $N = y^2$", "rationale": "This option incorrectly swaps $M$ and $N$. $M$ is the coefficient of $dx$, and $N$ is the coefficient of $dy$.", "isCorrect": false}, {"text": "$M = y^2$, $N = 2xy + \\cos y$", "rationale": "The lecture defines $M$ as the function multiplying $dx$ and $N$ as the function multiplying $dy$. In the given equation, $y^2$ is multiplied by $dx$, so $M = y^2$. The term $(2xy + \\cos y)$ is multiplied by $dy$, so $N = 2xy + \\cos y$.", "isCorrect": true}, {"text": "$M = y^2$, $N = 2xy$", "rationale": "This option incorrectly omits the $\\cos y$ term from $N$. The entire coefficient of $dy$ is $N$.", "isCorrect": false}, {"text": "$M = y^2 dx$, $N = (2xy + \\cos y) dy$", "rationale": "$M$ and $N$ are functions of $x$ and $y$, not differential terms. They are the coefficients of $dx$ and $dy$, respectively.", "isCorrect": false}], "hint": "Remember that $M(x, y)$ is associated with $dx$, and $N(x, y)$ is associated with $dy$ in the standard form $M dx + N dy = 0$."}, {"questionNumber": 4, "question": "After confirming exactness for $y^2 dx + (2xy + \\cos y) dy = 0$, the first step in finding the general solution is to integrate $M(x, y)$ with respect to $x$. If $M(x, y) = y^2$, what is the result of this integration, including the appropriate \"constant\" of integration?", "answerOptions": [{"text": "$xy^2 + C$", "rationale": "When performing partial integration with respect to $x$, the 'constant' of integration is not just an arbitrary constant $C$, but an arbitrary function of the other variable, $y$.", "isCorrect": false}, {"text": "$xy^2 + g(y)$", "rationale": "As explained in the lecture, when integrating $M(x,y)$ (which is $\\frac{\\partial f}{\\partial x}$) with respect to $x$, any term that is solely a function of $y$ would have differentiated to zero. Therefore, the 'constant' of integration must be an arbitrary function of $y$, denoted as $g(y)$. Integrating $y^2$ with respect to $x$ gives $xy^2$.", "isCorrect": true}, {"text": "$\\frac{y^3}{3} + g(x)$", "rationale": "This option incorrectly integrates $y^2$ with respect to $y$ and incorrectly identifies the arbitrary function of integration as $g(x)$.", "isCorrect": false}, {"text": "$xy^2$", "rationale": "This result misses the arbitrary function of $y$, $g(y)$, which is crucial for finding the complete general solution of $f(x, y)$.", "isCorrect": false}], "hint": "Consider what terms would disappear when taking a partial derivative with respect to $x$. These terms must be recovered in the integration step."}, {"questionNumber": 5, "question": "After finding the function $f(x, y)$ such that $\\frac{\\partial f}{\\partial x} = M$ and $\\frac{\\partial f}{\\partial y} = N$, how is the general solution of the exact differential equation $M(x, y)dx + N(x, y)dy = 0$ typically expressed?", "answerOptions": [{"text": "$f(x, y) = 0$", "rationale": "While the original equation might equal zero (if the constant was zero), the general solution typically accounts for any arbitrary constant that would have differentiated to zero. Setting it to zero is a specific case, not the general solution.", "isCorrect": false}, {"text": "$f(x, y) = C$, where $C$ is an arbitrary constant.", "rationale": "The lecture concludes by stating that the original function $f(x, y)$ was equal to a constant, and that any constant of integration can be absorbed into a single arbitrary constant $C$. Thus, the general solution of an exact differential equation is given by $f(x, y) = C$.", "isCorrect": true}, {"text": "$f(x, y) = g(y)$", "rationale": "This option represents an intermediate step in the solution process, where $g(y)$ is the unknown function of integration, not the final form of the general solution.", "isCorrect": false}, {"text": "$f(x, y) = x + y + C$", "rationale": "This is a specific form of a function, not the general way to express the solution. The general solution relates the derived $f(x, y)$ to an arbitrary constant.", "isCorrect": false}], "hint": "Think about what happens to constants when differentiating to get $M dx + N dy = 0$. What must $f(x,y)$ equal to recover that lost constant?"}]}, "inline_uoOpCGdktQ4_definitions": {"quiz_id": "inline_uoOpCGdktQ4_definitions", "chapter_number": 1, "video_id": "uoOpCGdktQ4", "title": "Micro-Practice: Differential Equation Fundamentals", "questions": [{"questionNumber": 1, "question": "According to the lecture, which of the following statements best defines a differential equation?", "answerOptions": [{"text": "An equation that exclusively involves algebraic expressions of an unknown function.", "rationale": "This statement is incorrect. A differential equation, by definition, must involve derivatives of an unknown function, not just algebraic expressions.", "isCorrect": false}, {"text": "An equation involving an unknown function and one or more of its derivatives.", "rationale": "This definition is directly from the lecture: \"A differential equation is an equation involving an unknown function and one or more of its derivatives.\"", "isCorrect": true}, {"text": "An equation that always contains only the first derivative of an unknown function.", "rationale": "This statement is incorrect. The lecture states a differential equation involves \"one or more\" derivatives, implying higher-order derivatives are also possible.", "isCorrect": false}, {"text": "An equation that relates a function to its integral.", "rationale": "This statement defines an integral equation, not a differential equation. Differential equations focus on derivatives, not integrals.", "isCorrect": false}], "hint": "Recall the fundamental definition presented at the very beginning of the lecture. What key mathematical operation is central to a differential equation?"}, {"questionNumber": 2, "question": "Consider the differential equation: $$\\frac{d^2V}{dx^2} + \\frac{dV}{dy} = 0$$ Based on the lecture's explanation, which statement correctly identifies the dependent and independent variables in this equation?", "answerOptions": [{"text": "$V$ is the independent variable; $x$ and $y$ are dependent variables.", "rationale": "This statement is incorrect. The lecture defines the dependent variable as the one whose derivative occurs. Here, derivatives of $V$ occur, making $V$ the dependent variable.", "isCorrect": false}, {"text": "$x$ and $y$ are independent variables; $V$ is the dependent variable.", "rationale": "This statement is correct. $V$ is the variable being differentiated (its derivatives occur), making it the dependent variable. $x$ and $y$ are the variables with respect to which the differentiation is performed, making them the independent variables, as explained in the lecture with example $\\frac{d^2V}{dx^2} + \\frac{dV}{dy} = 0$.", "isCorrect": true}, {"text": "$V$ and $x$ are independent variables; $y$ is the dependent variable.", "rationale": "This statement is incorrect. The variable $y$ is a variable with respect to which a derivative of $V$ is taken, hence $y$ is an independent variable.", "isCorrect": false}, {"text": "All variables ($V$, $x$, $y$) are dependent variables.", "rationale": "This statement is incorrect. A differential equation always has at least one dependent and one independent variable.", "isCorrect": false}], "hint": "Identify the variable that is being differentiated and the variables with respect to which the differentiation is taking place."}, {"questionNumber": 3, "question": "What is the order of the differential equation: $$\\frac{d^3y}{dx^3} - x \\left(\\frac{dy}{dx}\\right)^2 + y = 0$$", "answerOptions": [{"text": "1", "rationale": "This is incorrect. While $\\frac{dy}{dx}$ is a first-order derivative, it is not the highest order derivative present in the equation.", "isCorrect": false}, {"text": "2", "rationale": "This is incorrect. The order is determined by the highest derivative, not by the exponent of a lower-order derivative.", "isCorrect": false}, {"text": "3", "rationale": "This is correct. The highest derivative appearing in the equation is $\\frac{d^3y}{dx^3}$, which is a third-order derivative. The lecture defines the order of a differential equation as the order of the highest derivative that appears in the equation.", "isCorrect": true}, {"text": "6", "rationale": "This is incorrect. The lecture explicitly warns against multiplying the exponent of a derivative by its order when determining the overall order of the differential equation.", "isCorrect": false}], "hint": "Recall the definition of 'order' as presented in the lecture. Focus solely on the highest derivative, ignoring any powers on it."}, {"questionNumber": 4, "question": "For the differential equation: $$\\left(\\frac{d^2w}{dx^2}\\right)^3 - x w \\frac{dw}{dx} + w = 0$$ what is its degree, assuming it is a polynomial equation in its derivatives?", "answerOptions": [{"text": "1", "rationale": "This is incorrect. The degree is the power of the highest order derivative, which is 3 in this case, not 1.", "isCorrect": false}, {"text": "2", "rationale": "This is incorrect. 2 is the order of the highest derivative, not its power or the degree of the differential equation.", "isCorrect": false}, {"text": "3", "rationale": "This is correct. The highest order derivative is $\\frac{d^2w}{dx^2}$, and its power is 3. Since the equation is a polynomial in its derivatives, the degree is 3, as explained in the lecture.", "isCorrect": true}, {"text": "Undefined", "rationale": "This is incorrect. The given equation is a polynomial in its derivatives ($\\frac{d^2w}{dx^2}$ and $\\frac{dw}{dx}$), so its degree is well-defined.", "isCorrect": false}], "hint": "First, identify the highest order derivative. Then, if the equation is a polynomial in its derivatives, find the power to which that highest order derivative is raised."}, {"questionNumber": 5, "question": "Based on the lecture, how would you classify the differential equation: $$\\frac{\\partial^2u}{\\partial x^2} + \\frac{\\partial u}{\\partial y} + u = 0$$", "answerOptions": [{"text": "Ordinary Differential Equation (ODE)", "rationale": "This is incorrect. An ODE involves an unknown function that depends on only one independent variable. This equation has derivatives with respect to two independent variables, $x$ and $y$, indicated by partial derivatives.", "isCorrect": false}, {"text": "Partial Differential Equation (PDE)", "rationale": "This is correct. The lecture defines a Partial Differential Equation as a type of differential equation where the unknown function depends on two or more independent variables. The presence of partial derivatives with respect to both $x$ and $y$ confirms this classification.", "isCorrect": true}, {"text": "Undefined Differential Equation", "rationale": "This is incorrect. The equation is well-defined and falls into one of the two main types of differential equations discussed.", "isCorrect": false}, {"text": "  equation in its derivatives, what defines its \\textbf{degree}?", "answerOptions": [{"text": "The order of the highest derivative.", "rationale": "This defines the order of the differential equation, not its degree. The degree is related to the power of that highest derivative.", "isCorrect": false}, {"text": "The highest power of the dependent variable, \\(y\\), in the equation.", "rationale": "The power of the dependent variable itself is not directly related to the degree of the differential equation, which focuses on derivatives.", "isCorrect": false}, {"text": "The power to which the highest order derivative is raised.", "rationale": "The lecture defines the degree as \"the power to which the highest order derivative is raised if the differential equation is a polynomial equation in its derivatives.\"", "isCorrect": true}, {"text": "The total sum of the powers of all derivatives in the equation.", "rationale": "The degree is determined by the power of the \\textit{highest order} derivative only, not the sum of powers of all derivatives.", "isCorrect": false}], "hint": "The degree is associated with the 'power' of a specific part of the differential equation."}, {"questionNumber": 3, "question": "Given the differential equation $$\\left(\\frac{d^3y}{dx^3}\\right)^2 + 4\\frac{dy}{dx} = x$$. What are its order and degree?", "answerOptions": [{"text": "Order: 2, Degree: 1", "rationale": "The highest derivative is the third derivative (order 3), not the second. The degree is the power of this highest derivative, which is 2.", "isCorrect": false}, {"text": "Order: 3, Degree: 2", "rationale": "The highest derivative is $\\frac{d^3y}{dx^3}$, making the order 3. This highest derivative is raised to the power of 2, so the degree is 2.", "isCorrect": true}, {"text": "Order: 1, Degree: 3", "rationale": "The highest derivative is the third derivative (order 3), not the first. The power of this highest derivative is 2, not 3.", "isCorrect": false}, {"text": "Order: 3, Degre s first and second derivatives.", "rationale": "The number or specific order of derivatives does not determine whether the degree is defined. The crucial factor is the argument of non-polynomial functions.", "isCorrect": false}, {"text": "Because the trigonometric function $\\cos(x)$ involves the independent variable $x$, not a derivative of the dependent variable.", "rationale": "The lecture explicitly states that if trig, log, or exponential functions involve the \\textit{independent variable}, the equation can still be a polynomial in its derivatives and thus have a defined degree. The problem arises only if these functions involve the \\textit{derivative of the dependent variable}.", "isCorrect": true}, {"text": "Because the highest derivative $y''$ has a power of 1.", "rationale": "While the degree is 1, this statement describes \\textit{what} the degree is, not \\textit{why} it is defined. The definition hinges on whether the equation is a polynomial in its derivatives.", "isCorrect": false}, {"text": "Because it is a linear differential equation.", "rationale": "Linearity is a separate property of differential equations and is not discussed in this lecture as a condition for the degree being defined.", "isCorrect": false}], "hint": "Pay close attention to what is inside the trigonometric function. Does it involve the dependent variable's derivative or the independent variable?"}]}, "inline_fDvxPdqWjkQ_definitions": {"quiz_id": "inline_fDvxPdqWjkQ_definitions", "chapter_number": 1, "video_id": "fDvxPdqWjkQ", "title": "Micro-Practice: Linear and Non-Linear Differential Equations", "questions": [{"questionNumber": 1, "question": "Which of the following differential equations is non-linear based on the first condition for linearity discussed in the lecture?", "answerOptions": [{"text": "$$\\frac{dy}{dx} + y = x^2$$", "rationale": "This equation is linear because the dependent variable $y$ and its derivative $\\frac{dy}{dx}$ both occur only to the first power. The term $x^2$ is a function of the independent variable $x$ and does not affect linearity.", "isCorrect": false}, {"text": "$$\\frac{d^2y}{dx^2} + 3\\frac{dy}{dx} + y = 0$$", "rationale": "This equation is linear because the dependent variable $y$ and all its derivatives ($\\frac{d^2y}{dx^2}$, $\\frac{dy}{dx}$) occur only to the first power, satisfying the first condition.", "isCorrect": false}, {"text": "$$\\frac{dy}{dx} + y^2 = 0$$", "rationale": "This equation is non-linear because the term $y^2$ has the dependent variable $y$ raised to the power of 2, which violates the first condition for linearity stating that the dependent variable and all its derivatives must occur only to the first power.", "isCorrect": true}, {"text": "$$y'' + 2y' - 8y = \\cos(x)$$", "rationale": "This equation is linear. All terms involving $y$ and its derivatives ($y'', y'$) occur to the first power. The term $\\cos(x)$ is a function of the independent variable $x$ and does not affect the linearity of the equation with respect to $y$.", "isCorrect": false}], "hint": "Recall the first condition for linearity, which focuses on the powers of the dependent variable and its derivatives."}, {"questionNumber": 2, "question": "According to the lecture, which term, if present in a differential equation, would make it non-linear due to a violation of the second condition for linearity?", "answerOptions": [{"text": "$$y \\frac{dy}{dx}$$", "rationale": "The term $y \\frac{dy}{dx}$ involves the product of the dependent variable $y$ and its derivative $\\frac{dy}{dx}$. This directly violates the second condition for linearity, which states that there should not be any term involving the products of the dependent variable and its derivatives.", "isCorrect": true}, {"text": "$$x \\frac{dy}{dx}$$", "rationale": "This term involves a product, but it is a product of the independent variable $x$ and the derivative of the dependent variable. It does not violate the second condition, which specifically prohibit e expression for $2y''$ (the second derivative of $2y$) as derived in the lecture?", "answerOptions": [{"text": "$2y'' = a + be^x$", "rationale": "This expression represents the first derivative, $2y'$, as shown in the lecture.", "isCorrect": false}, {"text": "$2y'' = be^x$", "rationale": "The first derivative is $2y' = a + be^x$. Differentiating again, the derivative of the constant $a$ is $0$, and the derivative of $be^x$ is $be^x$. Thus, $2y'' = 0 + be^x = be^x$.", "isCorrect": true}, {"text": "$2y'' = 0$", "rationale": "This would only be true if $b$ were also eliminated or if $be^x$ became $0$ upon differentiation, which is not the case.", "isCorrect": false}, {"text": "$2y'' = ax + be^x$", "rationale": "This is the original equation, not its second derivative.", "isCorrect": false}], "hint": "First, find $2y'$, and then differentiate that result again to find $2y''$."}, {"questionNumber": 4, "question": "After performing the necessary differentiations to obtain a system of equations, what is a primary algebraic method for eliminating an arbitrary constant from the system?", "answerOptions": [{"text": "Integrating the constant term out of the equation.", "rationale": "Integration would typically introduce new arbitrary constants, not eliminate existing ones in the context of forming a differential equation.", "isCorrect": false}, {"text": "Making the arbitrary constant the subject in one equation and substituting it into another.", "rationale": "The lecture consistently employs this strategy: 'make A the subject from equation three' and then 'put this equation four into equation two.' This is a standard method for solving systems of equations by substitution to eliminate variables (or constants).", "isCorrect": true}, {"text": "Multiplying all equations by the arbitrary constant to cancel it out.", "rationale": "Multiplying by the constant would generally make the equation more complex and would not lead to its elimination.", "isCorrect": false}, {"text": "Adding the arbitrary constant to both sides of the equation until it disappears.", "rationale": "This is not a valid algebraic method for eliminating a constant from an equation. Adding a constant to both sides only shifts its value, it doesn't remove it.", "isCorrect": false}], "hint": "Think about how you typically solve a system of algebraic equations to remove a variable."}, {"questionNumber": 5, "question": "Which of the following statements accurately describes a fundamental characteristic of a differential equation formed by eliminating arbitrary constants?", "answerOptions": [{"text": "The final equation will always contain at least one arbitrary constant.", "rationale": "The entire purpose of the process is to 'eliminate the arbitrary constants,' so the final differential equation should not contain them.", "isCorrect": false}, {"text": "The final equation will only involve the independent variable, $x$, and its derivatives, not the dependent variable, $y$.", "rationale": "A differential equation relates the dependent variable $y$, its derivatives, and the independent variable $x$. It does not omit $y$ itself.", "isCorrect": false}, {"text": "The final equation will relate the dependent variable $y$, its derivatives ($y', y'', \\ldots$), and the independent variable $x$, without any arbitrary constants.", "rationale": "This statement correctly encapsulates the objective and result of the process: a differential equation that describes the relationship between a function, its derivatives, and the independent variable, free from the specific arbitrary constants that define a particular solution within a family of solutions.", "isCorrect": true}, {"text": "The final equation must always be of first order.", "rationale": "The order of the differential equation depends on the number of arbitrary constants. Since the lecture examples involve two constants, the resulting ODEs are second order, demonstrating that they are not always first order.", "isCorrect": false}], "hint": "Consider the definition and purpose of a differential equation formed in this way. What elements should it *not* contain?"}]}, "inline__bAjWNsNrQA_definitions": {"quiz_id": "inline__bAjWNsNrQA_definitions", "chapter_number": 2, "video_id": "_bAjWNsNrQA", "title": "Micro-Practice: Newton's Law of Cooling and Separable ODEs", "questions": [{"questionNumber": 1, "question": "Which of the following differential equations correctly represents Newton's Law of Cooling, where $T(t)$ is the temperature of an object at time $t$, and $T_m$ is the constant ambient (surrounding) temperature?", "answerOptions": [{"text": "$$\\frac{dT}{dt} = k T_m$$", "rationale": "This equation states that the rate of temperature change is proportional to the ambient temperature, not the difference between the object's temperature and the ambient temperature, which is incorrect for Newton's Law of Cooling.", "isCorrect": false}, {"text": "$$\\frac{dT}{dt} = k T$$", "rationale": "This equation implies that the rate of temperature change is proportional to the object's current temperature. While exponential growth/decay models use this form, Newton's Law of Cooling specifically involves the temperature difference with the surroundings.", "isCorrect": false}, {"text": "$$\\frac{dT}{dt} = k (T - T_m)$$", "rationale": "This is the correct mathematical formulation of Newton's Law of Cooling. It states that the rate of change of an object's temperature, $\\frac{dT}{dt}$, is proportional to the difference between its own temperature $T$ and the ambient temperature $T_m$. The constant $k$ determines the rate of cooling or heating; it is negative for cooling and positive for heating.", "isCorrect": true}, {"text": "$$\\frac{dT}{dt} = k (T_m - T)$$", "rationale": "This formulation is also physically plausible, implying that $k$ would be positive for cooling. However, the most standard and canonical form presented in ODE textbooks is $\\frac{dT}{dt} = k(T - T_m)$, where the sign of $k$ dictates cooling ($k<0$) or heating ($k>0$).", "isCorrect": false}], "hint": "Recall that Newton's Law of Cooling states that the rate of heat loss of a body is proportional to the difference between the body's temperature and the ambient temperature."}, {"questionNumber": 2, "question": "In the differential equation representing Newton's Law of Cooling, $$\\frac{dT}{dt} = k(T - T_m)$$, identify the independent variable.", "answerOptions": [{"text": "$T$", "rationale": "$T$ represents the temperature of the object, which is the dependent variable as it changes with respect to time.", "isCorrect": false}, {"text": "$T_m$", "rationale": "$T_m$ represents the constant ambient temperature, which is a parameter or a constant in the model, not a variable changing independently.", "isCorrect": false}, {"text": "$t$", "rationale": "$t$ represents time, and the temperature $T$ is expressed as a function of time, $T(t)$. Therefore, $t$ is the independent variable.", "isCorrect": true}, {"text": "$k$", "rationale": "$k$ is the constant of proportionality, which is a fixed parameter for a given object and environment, not a variable.", "isCorrect": false}], "hint": "The independent variable is the one with respect to which the derivative is taken. The dependent variable is the function whose rate of change is being described."}, {"questionNumber": 3, "question": "To solve the ODE $$\\frac{dT}{dt} = k(T - T_m)$$ using separation of variables, which of the following steps correctly isolates the variables for integration?", "answerOptions": [{"text": "$$dT = k(T - T_m) dt$$", "rationale": "This step involves cross-multiplication, but the variable $T$ is still mixed with $dt$ on the right side. For separation, all terms involving $T$ must be with $dT$, and all terms involving $t$ (or constants) must be with $dt$.", "isCorrect": false}, {"text": "$$\\frac{dT}{T - T_m} = k dt$$", "rationale": "This is the correct separation of variables. All terms involving the dependent variable $T$ are on the left side with $dT$, and all terms involving the independent variable $t$ (in this case, just the constant $k$) are on the right side with $dt$.", "isCorrect": true}, {"text": "$$\\frac{dT}{dt} - kT = -k T_m$$", "rationale": "This step rearranges the equation into a linear first-order form, $T' + P(t)T = Q(t)$, but it does not separate the variables for direct integration in the separable form.", "isCorrect": false}, {"text": "$$T - T_m = \\frac{1}{k} \\frac{dT}{dt}$$", "rationale": "This is merely a rearrangement of the original differential equation and does not separate the variables $T$ and $t$ into distinct sides for integration.", "isCorrect": false}], "hint": "The goal of separation of variables is to express the ODE in the form $g(y)dy = h(x)dx$, so that both sides can be integrated independently."}, {"questionNumber": 4, "question": "After separating variables and integrating the ODE $$\\frac{dT}{dt} = k(T - T_m)$$, what is the general solution for $T(t)$? (Assume $T \\neq T_m$)", "answerOptions": [{"text": "$$T(t) = C e^{kt}$$", "rationale": "This is the solution to $\\frac{dT}{dt} = kT$, which models simple exponential growth or decay, but it does not account for the ambient temperature $T_m$ in Newton's Law of Cooling.", "isCorrect": false}, {"text": "$$T(t) = T_m + C e^{kt}$$", "rationale": "This is the correct general solution. Integrating $\\frac{dT}{T - T_m} = k dt$ yields $\\ln|T - T_m| = kt + C_1$. Exponentiating both sides gives $|T - T_m| = e^{kt + C_1} = e^{C_1}e^{kt}$. Let $C = \\pm e^{C_1}$, which absorbs the absolute value and the constant $e^{C_1}$. Thus, $T - T_m = C e^{kt}$, leading to $T(t) = T_m + C e^{kt}$.", "isCorrect": true}, {"text": "$$T(t) = T_m - C e^{kt}$$", "rationale": "While the form $T_m + Ce^{kt}$ is correct, writing $T_m - Ce^{kt}$ implies that $C$ can only take negative values if it were derived directly from $T-T_m = Ce^{kt}$. The constant $C$ can be positive or negative depending on initial conditions.", "isCorrect": false}, {"text": "$$T(t) = T_m e^{kt} + C$$", "rationale": "This structure incorrectly places $T_m$ in an exponential term and the additive constant $C$ outside, which does not result from the correct integration of Newton's Law of Cooling.", "isCorrect": false}], "hint": "Recall the integral of $\\frac{1}{u}$ and how constants of integration are handled when solving for $T(t)$ after exponentiation."}, {"questionNumber": 5, "question": "In the general solution to Newton's Law of Cooling, $T(t) = T_m + C e^{kt}$, what does the constant $C$ primarily represent?", "answerOptions": [{"text": "The ambient temperature $T_m$.", "rationale": "$T_m$ is explicitly part of the solution and represents the ambient temperature, distinct from $C$.", "isCorrect": false}, {"text": "The initial rate of temperature change.", "rationale": "The initial rate of temperature change is given by $\\frac{dT}{dt}\\Big|_{t=0} = k(T(0) - T_m)$, not the constant $C$ itself.", "isCorrect": false}, {"text": "The initial temperature difference, $T(0) - T_m$.", "rationale": "At $t=0$, the solution becomes $T(0) = T_m + C e^{k \\cdot 0} = T_m + C$. Therefore, $C = T(0) - T_m$, representing the initial temperature difference between the object and its surroundings.", "isCorrect": true}, {"text": "The cooling/heating constant $k$.", "rationale": "$k$ is the constant of proportionality in the differential equation and is distinct from $C$. It determines how quickly the temperature changes, not the initial temperature difference.", "isCorrect": false}], "hint": "Consider what happens to the solution when $t=0$. This is often how constants of integration are determined and interpreted."}]}, "inline__lp33noEO50_definitions": {"quiz_id": "inline__lp33noEO50_definitions", "chapter_number": 1, "video_id": "_lp33noEO50", "title": "Micro-Practice: Initial and Boundary Value Problems", "questions": [{"questionNumber": 1, "question": "Given the general solution of a first-order ordinary differential equation as $y(x) = C_1 e^{2x}$, what is the value of the arbitrary constant $C_1$ if the initial condition is $y(0)=3$?", "answerOptions": [{"text": "$C_1 = 3e^2$", "rationale": "This would be the value of $y(2)$ if $C_1=3$, not the value of $C_1$. Substituting $x=0$ and $y=3$ into the general solution yields $3 = C_1 e^{2(0)}$, which simplifies to $C_1=3$.", "isCorrect": false}, {"text": "$C_1 = 3$", "rationale": "Substituting the initial condition $y(0)=3$ into the general solution $y(x) = C_1 e^{2x}$ yields $3 = C_1 e^{2(0)}$. Since $e^{2(0)} = e^0 = 1$, the equation becomes $3 = C_1 \\cdot 1$, which means $C_1=3$.", "isCorrect": true}, {"text": "$C_1 = 0$", "rationale": "If $C_1=0$, then $y(x)=0$ for all $x$. This would contradict the initial condition $y(0)=3$.", "isCorrect": false}, {"text": "$C_1 = e^{-2}$", "rationale": "This value of $C_1$ is incorrect. Substituting $y(0)=3$ requires $3 = C_1 \\cdot 1$, not $C_1=e^{-2}$.", "isCorrect": false}], "hint": "Recall that $e^0=1$. Substitute the given $x$ and $y$ values from the initial condition directly into the general solution to solve for $C_1$."}, {"questionNumber": 2, "question": "A general solution to a second-order linear homogeneous ODE is $y(x) = C_1 \\cos(x) + C_2 \\sin(x)$. If the initial conditions are $y(0)=2$ and $y'(0)=1$, what are the values of $C_1$ and $C_2$?", "answerOptions": [{"text": "$C_1=1, C_2=2$", "rationale": "This option incorrectly swaps the values of $C_1$ and $C_2$. Substituting $y(0)=2$ gives $C_1=2$, and $y'(0)=1$ gives $C_2=1$.", "isCorrect": false}, {"text": "$C_1=2, C_2=1$", "rationale": "First, apply $y(0)=2$: $2 = C_1 \\cos(0) + C_2 \\sin(0) \\implies 2 = C_1(1) + C_2(0) \\implies C_1=2$. Next, find the derivative: $y'(x) = -C_1 \\sin(x) + C_2 \\cos(x)$. Apply $y'(0)=1$: $1 = -C_1 \\sin(0) + C_2 \\cos(0) \\implies 1 = -C_1(0) + C_2(1) \\implies C_2=1$. Thus, $C_1=2$ and $C_2=1$.", "isCorrect": true}, {"text": "$C_1=2, C_2=0$", "rationale": "This option correctly determines $C_1=2$ but incorrectly sets $C_2=0$. The initial condition $y'(0)=1$ implies $C_2=1$, not $C_2=0$.", "isCorrect": false}, {"text": "$C_1=0, C_2=1$", "rationale": "This option incorrectly sets $C_1=0$. The initial condition $y(0)=2$ implies $C_1=2$, not $C_1=0$.", "isCorrect": false}], "hint": "Remember to first calculate the derivative of the general solution before applying the condition involving $y'(x)$. Then solve the resulting system of equations for $C_1$ and $C_2$."}, {"questionNumber": 3, "question": "Consider the general solution $y(x) = C_1 e^x + C_2 e^{-x}$ for a certain ODE. Given boundary conditions $y(0)=0$ and $y(1)=e-e^{-1}$, determine the values of $C_1$ and $C_2$.", "answerOptions": [{"text": "$C_1=0, C_2=0$", "rationale": "If $C_1=0$ and $C_2=0$, then $y(x)=0$ for all $x$. This would satisfy $y(0)=0$ but not $y(1)=e-e^{-1}$.", "isCorrect": false}, {"text": "$C_1=e, C_2=-e^{-1}$", "rationale": "If $C_1=e$ and $C_2=-e^{-1}$, then $y(0)=e \\cdot e^0 - e^{-1} \\cdot e^{-0} = e - e^{-1} \\ne 0$. This violates the first boundary condition.", "isCorrect": false}, {"text": "$C_1=1, C_2=-1$", "rationale": "Applying $y(0)=0$: $0 = C_1 e^0 + C_2 e^{-0} \\implies 0 = C_1 + C_2 \\implies C_2 = -C_1$. Applying $y(1)=e-e^{-1}$: $e-e^{-1} = C_1 e^1 + C_2 e^{-1}$. Substitute $C_2 = -C_1$: $e-e^{-1} = C_1 e - C_1 e^{-1} = C_1(e-e^{-1})$. Dividing by $(e-e^{-1})$ (since it is non-zero) yields $C_1=1$. From $C_2=-C_1$, we get $C_2=-1$.", "isCorrect": true}, {"text": "$C_1=-1, C_2=1$", "rationale": "If $C_1=-1$ and $C_2=1$, then $y(1)=-e + e^{-1} = -(e-e^{-1})$, which is the negative of the required value for $y(1)$.", "isCorrect": false}], "hint": "Use the first boundary condition to establish a relationship between $C_1$ and $C_2$. Then substitute this relationship into the equation derived from the second boundary condition to solve for one constant, and then find the other."}, {"questionNumber": 4, "question": "What is the primary distinguishing characteristic between an Initial Value Problem (IVP) and a Boundary Value Problem (BVP) for an ordinary differential equation?", "answerOptions": [{"text": "IVPs only involve first-order ODEs, while BVPs involve higher-order ODEs.", "rationale": "This statement is incorrect. Both IVPs and BVPs can be formulated for ODEs of any order (first, second, or higher). The distinction is not about the order of the ODE.", "isCorrect": false}, {"text": "IVPs specify all conditions at a single point, while BVPs specify conditions at two or more different points.", "rationale": "This correctly defines the fundamental difference. IVPs require all auxiliary conditions (value of the function and its derivatives) to be specified at one value of the independent variable, typically the 'initial' point. BVPs, in contrast, specify conditions at multiple, distinct values of the independent variable, representing 'boundaries'.", "isCorrect": true}, {"text": "IVPs always have a unique solution, while BVPs always have multiple solutions.", "rationale": "This statement is incorrect. While well-posed IVPs often have unique solutions under certain continuity conditions, BVPs can also have unique solutions, no solutions, or infinitely many solutions depending on the specific problem. Uniqueness is not a defining characteristic that distinguishes them universally.", "isCorrect": false}, {"text": "IVPs only involve constant coefficients, while BVPs involve variable coefficients.", "rationale": "This statement is incorrect. Both IVPs and BVPs can involve ODEs with constant or variable coefficients. The nature of the coefficients is unrelated to how the auxiliary conditions are specified.", "isCorrect": false}], "hint": "Think about the 'initial' vs. 'boundary' terminology. Where are the conditions typically applied in each type of problem?"}, {"questionNumber": 5, "question": "The displacement of an undamped simple harmonic oscillator is given by the general solution $y(t) = C_1 \\cos(\\omega t) + C_2 \\sin(\\omega t)$, where $\\omega$ is a non-zero constant. If the system starts from rest at an initial displacement $y(0)=A$, what are the values of $C_1$ and $C_2$?", "answerOptions": [{"text": "$C_1=0, C_2=A$", "rationale": "Applying $y(0)=A$ gives $A = C_1 \\cos(0) + C_2 \\sin(0) = C_1$. So $C_1=A$, not $0$.", "isCorrect": false}, {"text": "$C_1=A, C_2=0$", "rationale": "First, apply $y(0)=A$: $A = C_1 \\cos(\\omega \\cdot 0) + C_2 \\sin(\\omega \\cdot 0) \\implies A = C_1(1) + C_2(0) \\implies C_1=A$. Next, the system starts from rest, meaning its initial velocity is zero. So $y'(0)=0$. The derivative is $y'(t) = -C_1 \\omega \\sin(\\omega t) + C_2 \\omega \\cos(\\omega t)$. Applying $y'(0)=0$: $0 = -C_1 \\omega \\sin(0) + C_2 \\omega \\cos(0) \\implies 0 = -C_1 \\omega (0) + C_2 \\omega (1) \\implies 0 = C_2 \\omega$. Since $\\omega \\ne 0$, we must have $C_2=0$. Therefore, $C_1=A$ and $C_2=0$.", "isCorrect": true}, {"text": "$C_1=A, C_2=A$", "rationale": "Applying $y'(0)=0$ results in $C_2=0$, not $C_2=A$, assuming $\\omega \\ne 0$.", "isCorrect": false}, {"text": "$C_1=A\\omega, C_2=0$", "rationale": "Applying $y(0)=A$ directly yields $C_1=A$, not $C_1=A\\omega$. The $\\omega$ factor only appears in the derivative for $C_2$.", "isCorrect": false}], "hint": "Recall that 'starts from rest' implies zero initial velocity, meaning $y'(0)=0$. Remember the derivatives of trigonometric functions and that $\\cos(0)=1$ and $\\sin(0)=0$."}]}, "inline_3d5M3G9vDVU_definitions": {"quiz_id": "inline_3d5M3G9vDVU_definitions", "chapter_number": 1, "video_id": "3d5M3G9vDVU", "title": "Micro-Practice: Determining Arbitrary Constants in ODEs", "questions": [{"questionNumber": 1, "question": "Given the general solution to a first-order ordinary differential equation is $y(x) = C e^{2x}$, and the initial condition is $y(0) = 3$. Determine the value of the arbitrary constant $C$.", "answerOptions": [{"text": "$C=0$", "rationale": "Substituting $x=0$ and $y(0)=3$ into the general solution yields $3 = C e^{2(
