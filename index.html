<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODE Playlist Study Dashboard</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- KaTeX for beautiful LaTeX rendering in Quizzes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #020617 100%);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glow-color: rgba(99, 102, 241, 0.4);
            --card-bg: rgba(30, 41, 59, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #10b981;
            --sidebar-width: 320px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, .chapter-title {
            font-family: 'Outfit', sans-serif;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.6);
        }

        /* Header block */
        header {
            position: relative;
            padding: 3rem 2rem 2.5rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.3);
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(8px);
        }

        .glow-circle {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 250px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.25) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 1.5rem;
            font-weight: 300;
        }

        /* Progress Dashboard Banner */
        .progress-banner {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .progress-info {
            text-align: left;
        }

        .progress-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .progress-percentage {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
        }

        .progress-track-bg {
            flex-grow: 1;
            height: 10px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--accent-gradient);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Main Grid Layout */
        .app-container {
            max-width: 1500px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: flex;
            gap: 2rem;
            flex-grow: 1;
            width: 100%;
        }

        /* Sidebar Navigation & Filters */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            position: sticky;
            top: 2rem;
            height: calc(100vh - 6rem);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reset-btn {
            font-size: 0.75rem;
            color: #ef4444;
            background: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }

        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 0.25rem;
        }

        .filter-item {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .filter-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }

        .filter-item.active {
            background: rgba(99, 102, 241, 0.15);
            color: var(--text-primary);
            border-color: rgba(99, 102, 241, 0.3);
            font-weight: 600;
        }

        .filter-badge {
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-weight: 400;
        }

        .filter-item.active .filter-badge {
            background: var(--accent-gradient);
            color: white;
            font-weight: 600;
        }

        /* Content Area */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* Chapter Section */
        .chapter-section {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scroll-margin-top: 2rem;
            transition: opacity 0.3s;
        }

        .chapter-header {
            border-bottom: 2px solid rgba(99, 102, 241, 0.25);
            padding-bottom: 0.75rem;
        }

        .chapter-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .chapter-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* Video Card Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* Video Card */
        .video-card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 
                        0 0 15px 0 rgba(99, 102, 241, 0.1);
        }

        .video-card.watched {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            overflow: hidden;
        }

        .thumbnail-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .video-card:hover .thumbnail-img {
            transform: scale(1.05);
        }

        /* Checkbox watched layer */
        .card-checkbox-label {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.85);
            border: 1.5px solid var(--card-border);
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .card-checkbox-label:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .card-checkbox {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-secondary);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: transparent;
        }

        .card-checkbox:checked {
            background: var(--success-color);
            border-color: var(--success-color);
        }

        .card-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 11px;
            font-weight: 900;
        }

        .orig-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.85);
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(4px);
            font-weight: 500;
        }

        .video-details {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
            gap: 1rem;
        }

        .video-title-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.2s;
        }

        .video-title-link:hover {
            color: #a855f7;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }

        .play-btn {
            width: 100%;
            padding: 0.65rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 0.85rem;
        }

        .play-btn:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
            transform: scale(1.02);
            color: #fff;
        }

        }

        /* Quiz Styles */
        .quiz-badge-btn {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            margin-top: 8px;
            font-family: 'Outfit', sans-serif;
        }

        .quiz-badge-btn:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .quiz-passed-badge {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #34d399;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
        }

        /* Modal Background */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.75);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Modal Container */
        .quiz-modal {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: 90%;
            max-width: 650px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        0 0 40px rgba(99, 102, 241, 0.15);
            backdrop-filter: blur(20px);
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .quiz-modal {
            transform: scale(1);
        }

        .close-modal-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal-btn:hover {
            color: var(--text-primary);
        }

        /* Quiz UI Elements */
        .quiz-header {
            margin-bottom: 1.5rem;
        }

        .quiz-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .quiz-progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .quiz-progress-bar-bg {
            height: 6px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 3px;
            overflow: hidden;
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .quiz-progress-bar-fill {
            height: 100%;
            background: var(--accent-gradient);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.5;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .option-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .option-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(99, 102, 241, 0.3);
            color: var(--text-primary);
        }

        .option-card.selected {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.6);
            color: var(--text-primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.25);
        }

        .option-card.correct {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--success-color);
            color: var(--text-primary);
        }

        .option-card.incorrect {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
            color: var(--text-primary);
        }

        .option-radio {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-secondary);
            border-radius: 50%;
            outline: none;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .option-card.correct .option-radio {
            border-color: var(--success-color);
            background: var(--success-color);
        }

        .option-card.correct .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
        }

        .option-card.incorrect .option-radio {
            border-color: #ef4444;
            background: #ef4444;
        }

        .option-card.incorrect .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
        }

        .option-card.selected .option-radio {
            border-color: #a855f7;
        }

        .option-card.selected .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-gradient);
        }

        /* Feedback Area */
        .feedback-container {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .feedback-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .feedback-title.correct { color: var(--success-color); }
        .feedback-title.incorrect { color: #ef4444; }

        .feedback-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Action Buttons */
        .quiz-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .quiz-btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .quiz-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        .quiz-btn-primary {
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 0.75rem 1.75rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .quiz-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        /* Hint Box */
        .hint-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px dashed rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            line-height: 1.4;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        /* Results Screen */
        .results-container {
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .results-score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
            border: 4px solid rgba(99, 102, 241, 0.3);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.2);
        }

        .results-score-num {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .results-score-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .results-heading {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;

ples 4-5)", "id": "Iqzf5gMTP-c", "url": "https://www.youtube.com/watch?v=Iqzf5gMTP-c", "orig_index": 20}]}, {"ch_number": 5, "name": "5. Exact Equations & Substitutions", "description": "Checking for exactness, finding potential functions, and Bernoulli equations.", "videos": [{"title": "Exact Equations [ODE]", "id": "pgJci5CI9n4", "url": "https://www.youtube.com/watch?v=pgJci5CI9n4", "orig_index": 4}, {"title": "🔵12a - Exact Differential Equations (Solving Exact Differential Equations)", "id": "qS2zicoG9yg", "url": "https://www.youtube.com/watch?v=qS2zicoG9yg", "orig_index": 21}, {"title": "🔵12b - Exact Differential Equations (Solving Exact Differential Equations)", "id": "80BuQopXUMM", "url": "https://www.youtube.com/watch?v=80BuQopXUMM", "orig_index": 22}, {"title": "The Bernoulli Equation // Substitutions in Differential Equations", "id": "iCN8nGXE29o", "url": "https://www.youtube.com/watch?v=iCN8nGXE29o", "orig_index": 42}]}, {"ch_number": 6, "name": "6. Qualitative Analysis, Slope Fields & Stability", "description": "Visualizing slope fields, verifying existence/uniqueness, and analyzing steady states.", "videos": [{"title": "The Geometric Meaning of Differential Equations // Slope Fields, Integral Curves & Isoclines", "id": "ccDMpj2UK_M", "url": "https://www.youtube.com/watch?v=ccDMpj2UK_M", "orig_index": 38}, {"title": "The Big Theorem of Differential Equations: Existence & Uniqueness", "id": "_WpncZ3RkTg", "url": "https://www.youtube.com/watch?v=_WpncZ3RkTg", "orig_index": 39}, {"title": "Autonomous Equations, Equilibrium Solutions, and Stability", "id": "pZOmToxx-R8", "url": "https://www.youtube.com/watch?v=pZOmToxx-R8", "orig_index": 43}, {"title": "The Stability and Instability of Steady States", "id": "NmntYoB1uJg", "url": "https://www.youtube.com/watch?v=NmntYoB1uJg", "orig_index": 32}, {"title": "The Logistic Growth Differential Equation", "id": "aP4YXOo-Uko", "url": "https://www.youtube.com/watch?v=aP4YXOo-Uko", "orig_index": 44}, {"title": "The Logistic Equation", "id": "TCkLSYxx21c", "url": "https://www.youtube.com/watch?v=TCkLSYxx21c", "orig_index": 31}]}, {"ch_number": 7, "name": "7. Frequency Response & Exponential Inputs", "description": "Analyzing responses to exponential, oscillating, complex, and general inputs.", "videos": [{"title": "Response to Exponential Input", "id": "CB9I4mwpQ5E", "url": "https://www.youtube.com/watch?v=CB9I4mwpQ5E", "orig_index": 25}, {"title": "Response to Oscillating Input", "id": "xw3ccgYhFis", "url": "https://www.youtube.com/watch?v=xw3ccgYhFis", "orig_index": 26}, {"title": "Response to Complex Exponential", "id": "kIT2uMxYh6M", "url": "https://www.youtube.com/watch?v=kIT2uMxYh6M", "orig_index": 28}, {"title": "Solution for Any Input", "id": "0r2L3wTqkBc", "url": "https://www.youtube.com/watch?v=0r2L3wTqkBc", "orig_index": 27}]}, {"ch_number": 8, "name": "8. Second-Order Linear Equations", "description": "Intro to higher-order systems, superposition, and linear independence.", "videos": [{"title": "Second Order Equations", "id": "xCCeV-glFdM", "url": "https://www.youtube.com/watch?v=xCCeV-glFdM", "orig_index": 33}, {"title": "The Theory of 2nd Order ODEs // Existence & Uniqueness, Superposition, & Linear Independence", "id": "VpZOuOJ_ob4", "url": "https://www.youtube.com/watch?v=VpZOuOJ_ob4", "orig_index": 45}]}, {"ch_number": 9, "name": "9. Second-Order Linear Equations (Non-Homogeneous)", "description": "Solving non-homogeneous equations using undetermined coefficients and variation of parameters.", "videos": [{"title": "Method of Undetermined Coefficients", "id": "P3fc6v191mA", "url": "https://www.youtube.com/watch?v=P3fc6v191mA", "orig_index": 48}, {"title": "Undetermined Coefficients (Conceptual Breakdown)", "id": "AgyeJEO2a-k", "url": "https://www.youtube.com/watch?v=AgyeJEO2a-k", "orig_index": 49}, {"title": "Variation of Parameters (Analytical Method)", "id": "Ik3YW1JGr_A", "url": "https://www.youtube.com/watch?v=Ik3YW1JGr_A", "orig_index": 50}, {"title": "Variation of Parameters (Examples)", "id": "wSMad7QpaqE", "url": "https://www.youtube.com/watch?v=wSMad7QpaqE", "orig_index": 51}]}, {"ch_number": 10, "name": "10. The Laplace Transform", "description": "Using Laplace transforms to solve initial value problems with discontinuous or impulse forcing functions.", "videos": [{"title": "Visualizing the Laplace Transform", "id": "j0wJBEZdwLs", "url": "https://www.youtube.com/watch?v=j0wJBEZdwLs", "orig_index": 52}, {"title": "Introduction to the Laplace Transform (Calculations)", "id": "KqokoYr_h1A", "url": "https://www.youtube.com/watch?v=KqokoYr_h1A", "orig_index": 53}, {"title": "Solving Initial Value Problems with Laplace Transforms", "id": "fuxFrpaMLtw", "url": "https://www.youtube.com/watch?v=fuxFrpaMLtw", "orig_index": 54}]}, {"ch_number": 11, "name": "11. Systems of Linear Differential Equations", "description": "Transforming higher-order equations into first-order systems, using eigenvalues and phase portraits.", "videos": [{"title": "Introduction to Systems of Differential Equations", "id": "-00_YLHlFE0", "url": "https://www.youtube.com/watch?v=-00_YLHlFE0", "orig_index": 55}, {"title": "Solving Systems with Real, Distinct Eigenvalues", "id": "fsnEIYEZc3Y", "url": "https://www.youtube.com/watch?v=fsnEIYEZc3Y", "orig_index": 56}, {"title": "Phase Portraits of Linear Systems", "id": "UO_dgXa5szg", "url": "https://www.youtube.com/watch?v=UO_dgXa5szg", "orig_index": 57}]}];
        const quizzesData = {"1": {"quiz_id": "module_1_foundations", "title": "Checkpoint Quiz: ODE Foundations & Geometry", "questions": [{"questionNumber": 1, "question": "Which of the following equations is considered a strictly linear Ordinary Differential Equation?", "answerOptions": [{"text": "$\\frac{d^2y}{dx^2} + y\\frac{dy}{dx} = 0$", "rationale": "Incorrect. The product of the dependent variable $y$ and its derivative $\\frac{dy}{dx}$ violates the condition of linearity.", "isCorrect": false}, {"text": "$x^2\\frac{d^2y}{dx^2} + x\\frac{dy}{dx} + y = \\sin(x)$", "rationale": "Correct! The dependent variable $y$ and its derivatives all appear to the first power, and there are no transcendental functions applied to $y$. The variable coefficients ($x^2, x$) depend only on the independent variable.", "isCorrect": true}, {"text": "$\\frac{dy}{dx} + \\cos(y) = x$", "rationale": "Incorrect. The term $\\cos(y)$ applies a transcendental function to the dependent variable, making the equation non-linear.", "isCorrect": false}, {"text": "$(\\frac{dy}{dx})^2 + y = 3x$", "rationale": "Incorrect. The first derivative is raised to the second power, which violates linearity.", "isCorrect": false}], "hint": "Remember the three rules of linearity: no products of $y$ and its derivatives, no powers of $y$ or its derivatives other than 1, and no transcendental functions applied to $y$."}, {"questionNumber": 2, "question": "Determine the order and the degree of the following differential equation: $\\sqrt{1 + (\\frac{dy}{dx})^2} = \\frac{d^2y}{dx^2}$", "answerOptions": [{"text": "Order 2, Degree 1", "rationale": "Incorrect. You must rationalize the equation by squaring both sides before determining the degree.", "isCorrect": false}, {"text": "Order 1, Degree 2", "rationale": "Incorrect. The highest derivative present is the second derivative, so the order must be 2.", "isCorrect": false}, {"text": "Order 2, Degree 2", "rationale": "Correct! Squaring both sides to clear the radical yields $1 + (\\frac{dy}{dx})^2 = (\\frac{d^2y}{dx^2})^2$. The highest derivative is the second derivative (Order 2), and it is raised to the second power (Degree 2).", "isCorrect": true}, {"text": "Order 1, Degree 1", "rationale": "Incorrect. The highest derivative is the second derivative, and you must rationalize the equation first.", "isCorrect": false}], "hint": "Before you can determine the degree, you must clear any fractional powers or radicals that involve derivatives."}, {"questionNumber": 3, "question": "A student solves an ODE and obtains the general solution $y(x) = C e^{2x}$. What does the arbitrary constant '$C$' represent geometrically?", "answerOptions": [{"text": "The rate at which the function grows.", "rationale": "Incorrect. The growth rate is determined by the constant '2' in the exponent.", "isCorrect": false}, {"text": "An infinite family of potential solution curves.", "rationale": "Correct! The constant $C$ indicates that the single rate law describes an infinite family of valid trajectories. An Initial Value Problem (IVP) is required to collapse this family down to a single, specific curve.", "isCorrect": true}, {"text": "An equilibrium point where the derivative is zero.", "rationale": "Incorrect. An equilibrium is a constant solution $y(x) = k$, which is different from the arbitrary constant of integration.", "isCorrect": false}, {"text": "The independent variable of the system.", "rationale": "Incorrect. The independent variable in this system is $x$.", "isCorrect": false}], "hint": "Does a differential equation without initial conditions point to a single answer, or a collection of possible answers?"}, {"questionNumber": 4, "question": "When analyzing the slope field for an autonomous differential equation of the form $\\frac{dy}{dx} = f(y)$, which geometric feature will always be present?", "answerOptions": [{"text": "The slopes will be constant along every vertical line.", "rationale": "Incorrect. That behavior occurs when the ODE             const totalVideos = 57;
            const watchedCount = watchedVideos.length;
            const percentage = totalVideos > 0 ? Math.round((watchedCount / totalVideos) * 100) : 0;
            
            progressBar.style.width = percentage + '%';
            progressText.innerText = percentage + '% (' + watchedCount + ' / ' + totalVideos + ')';
        }

        function toggleVideoWatch(videoId, isChecked) {
            if (isChecked) {
                if (!watchedVideos.includes(videoId)) {
                    watchedVideos.push(videoId);
                }
            } else {
                watchedVideos = watchedVideos.filter(id => id !== videoId);
            }
            localStorage.setItem('watched_videos', JSON.stringify(watchedVideos));
            updateProgress();
            
            // Toggle visual class
            const card = document.getElementById('card-' + videoId);
            if (card) {
                if (isChecked) {
                    card.classList.add('watched');
                } else {
                    card.classList.remove('watched');
                }
            }
        }

            });

            // Wire up event listeners
            document.querySelectorAll('.card-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    toggleVideoWatch(e.target.getAttribute('data-id'), e.target.checked);
                });
            });

            // Wire up Chapter filters
            document.querySelectorAll('.filter-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    const clickedItem = e.currentTarget;
                    document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
                    clickedItem.classList.add('active');
                    
                    const filter = clickedItem.getAttribute('data-filter');
                    
                    document.querySelectorAll('.chapter-section').forEach(section => {
                        if (filter === 'all' || section.id === filter) {
                            section.style.display = 'flex';
                        } else {
                            section.style.display = 'none';
                        }
                    });
                });
            });

            // Wire up reset button
            resetProgressBtn.addEventListener('click', () => {
                if (confirm('Are you sure you want to reset your study and quiz progress?')) {
                    watchedVideos = [];
                    completedQuizzes = {};
                    localStorage.removeItem('watched_videos');
                    localStorage.removeItem('completed_quizzes');
                    document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = false);
                    document.querySelectorAll('.video-card').forEach(card => card.classList.remove('watched'));
                    
                    // Rebuild entire dashboard to reset quiz buttons and badges
                    location.reload();
                }
            });

            updateProgress();
        }

        // ==========================================
        // CHECKPOINT QUIZ ENGINE
        // ==========================================
        let currentQuiz = null;
        let currentQuizChapter = null;
        let currentQuestionIdx = 0;
        let selectedOptionIdx = null;
        let score = 0;
        let isAnswerSubmitted = false;

        const modalOverlay = document.getElementById('quiz-modal-container');
        const quizContentArea = document.getElementById('quiz-content-area');

        function openQuiz(chapterNum) {
            currentQuiz = quizzesData[chapterNum];
            currentQuizChapter = chapterNum;
            if (!currentQuiz) return;

            currentQuestionIdx = 0;
            score = 0;
            selectedOptionIdx = null;
            isAnswerSubmitted = false;

            modalOverlay.classList.add('active');
            renderQuestion();
        }

        function closeQuiz() {
            modalOverlay.classList.remove('active');
        }

        function renderQuestion() {
            selectedOptionIdx = null;
            isAnswerSubmitted = false;

            const q = currentQuiz.questions[currentQuestionIdx];
            const totalQuestions = currentQuiz.questions.length;
            const progressPercent = Math.round(((currentQuestionIdx) / totalQuestions) * 100);

            let optionsHtml = '';
            q.answerOptions.forEach((option, idx) => {
                optionsHtml += `
                    <li class="option-card" id="option-${idx}" onclick="selectOption(${idx})">
                        <span class="option-radio" id="radio-${idx}"></span>
                        <span class="option-text-span">${option.text}</span>
                    </li>
                `;
            });

            quizContentArea.innerHTML = `
                <div class="quiz-header">
                    <div class="quiz-title">${currentQuiz.title}</div>
                    <div class="quiz-progress-container">
                        <span>Question ${currentQuestionIdx + 1} of ${totalQuestions}</span>
                        <span>Score: ${score} / ${totalQuestions}</span>
                    </div>
                    <div class="quiz-progress-bar-bg">
                        <div class="quiz-progress-bar-fill" style="width: ${progressPercent}%"></div>
                    </div>
                </div>

                <div class="question-text">${q.question}</div>

                <div class="hint-box" id="hint-box-el">${q.hint}</div>

                <ul class="options-list">
                    ${optionsHtml}
                </ul>

                <div class="feedback-container" id="feedback-box">
                    <div class="feedback-title" id="feedback-title"></div>
                    <div class="feedback-text" id="feedback-text"></div>
                </div>

                <div class="quiz-actions">
                    <button class="quiz-btn-secondary" id="hint-btn" onclick="toggleHint()">💡 Show Hint</button>
                    <button class="quiz-btn-primary" id="submit-btn" onclick="submitAnswer()" disabled>
                        Submit Answer ➜
                    </button>
                </div>
            `;

            // LaTeX rendering
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(quizContentArea, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false}
                    ]
                });
            }
        }

        function selectOption(optIdx) {
            if (isAnswerSubmitted) return;

            selectedOptionIdx = optIdx;

            // Update UI selection classes
            document.querySelectorAll('.option-card').forEach((card, idx) => {
                if (idx === optIdx) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.removeAttribute('disabled');
        }

        function toggleHint() {
            const hintBox = document.getElementById('hint-box-el');
            const hintBtn = document.getElementById('hint-btn');
            
            if (hintBox.style.display === 'block') {
                hintBox.style.display = 'none';
                hintBtn.innerText = '💡 Show Hint';
            } else {
                hintBox.style.display = 'block';
                hintBtn.innerText = '💡 Hide Hint';
            }
        }

        function submitAnswer() {
            if (isAnswerSubmitted || selectedOptionIdx === null) return;

            isAnswerSubmitted = true;

            const q = currentQuiz.questions[currentQuestionIdx];
            const selectedOpt = q.answerOptions[selectedOptionIdx];
            const isCorrect = selectedOpt.isCorrect;

            const feedbackBox = document.getElementById('feedback-box');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackText = document.getElementById('feedback-text');
            const submitBtn = document.getElementById('submit-btn');

            // Apply styling
            document.querySelectorAll('.option-card').forEach((card, idx) => {
                const opt = q.answerOptions[idx];
                if (opt.isCorrect) {
                    card.classList.add('correct');
                } else if (idx === selectedOptionIdx) {
                    card.classList.add('incorrect');
                }
                card.style.cursor = 'default';
            });

            if (isCorrect) {
                score++;
                feedbackTitle.className = 'feedback-title correct';
                feedbackTitle.innerHTML = '🎉 Correct!';
                feedbackText.innerHTML = selectedOpt.rationale;
            } else {
                feedbackTitle.className = 'feedback-title incorrect';
                feedbackTitle.innerHTML = '❌ Incorrect';
                feedbackText.innerHTML = selectedOpt.rationale;
            }

            feedbackBox.style.display = 'block';

            const isLastQuestion = currentQuestionIdx === currentQuiz.questions.length - 1;
            if (isLastQuestion) {
                submitBtn.innerText = 'View Results 🏆';
            } else {
                submitBtn.innerText = 'Next Question ➜';
            }

            submitBtn.onclick = function() {
                if (isLastQuestion) {
                    showResults();
                } else {
                    currentQuestionIdx++;
                    renderQuestion();
                }
            };
        }

        function showResults() {
            const totalQuestions = currentQuiz.questions.length;
            const passed = score >= Math.ceil(totalQuestions * 0.6); // 60% passing score
            
            let message = '';
            if (score === totalQuestions) {
                message = 'Perfect score! You are a master of Ordinary Differential Equations foundations!';
            } else if (passed) {
                message = 'Great job! You have verified your mathematical foundations and are ready for the next level!';
            } else {
                message = 'Study the concept explanations, check out the foundational chapters, and try again!';
            }

            quizContentArea.innerHTML = `
                <div class="results-container" style="display: block;">
                    <div class="results-score-circle">
                        <span class="results-score-num">${score}/${totalQuestions}</span>
                        <span class="results-score-label">Score</span>
                    </div>

                    <h2 class="results-heading">${passed ? 'Syllabus Checkpoint Verified! 🎓' : 'Keep Practicing! 📚'}</h2>
                    <p class="results-sub">${message}</p>

                    <div class="quiz-actions" style="justify-content: center;">
                        <button class="quiz-btn-secondary" onclick="openQuiz('${currentQuizChapter}')">Retry Quiz 🔄</button>
                        <button class="quiz-btn-primary" onclick="closeQuiz()">Back to Study Guide</button>
                    </div>
                </div>
            `;

            if (passed) {
                // Save progress
                completedQuizzes[currentQuiz.quiz_id] = {
                    completed: true,
                    score: score,
                    total: totalQuestions
                };
                localStorage.setItem('completed_quizzes', JSON.stringify(completedQuizzes));

                // Update Chapter Header UI
                const statusContainer = document.getElementById('quiz-status-container-' + currentQuizChapter);
                if (statusContainer) {
                    statusContainer.innerHTML = `
                        <div class="quiz-passed-badge" id="passed-badge-${currentQuiz.quiz_id}">
                            <span>✓ Passed Checkpoint</span>
                        </div>
                    `;
                }

                // Reload navigation or badge in sidebar
                location.reload();
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', buildDashboard);
    </script>
</body>
</html>
