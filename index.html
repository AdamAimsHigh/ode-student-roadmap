e": "For $0 < P < K$, $dP/dt > 0$ (increasing toward $K$). For $P > K$, $dP/dt < 0$ (decreasing toward $K$). Thus $P=K$ is a sink (stable) and $P=0$ is a source (unstable).", "isCorrect": true}, {"text": "Both $P=0$ and $P=K$ are unstable equilibria.", "rationale": "As established, $P=K$ attracts nearby solutions for $t \\to \\infty$, making it stable.", "isCorrect": false}], "hint": "Analyze the sign of $f'(P)$ at each equilibrium point. If $f'(P^*) < 0$, the equilibrium $P^*$ is stable."}, {"questionNumber": 3, "question": "At what population level $P$ does the logistic growth rate $\\frac{dP}{dt}$ reach its maximum value?", "answerOptions": [{"text": "$P = K$", "rationale": "At $P=K$, the growth rate $\\frac{dP}{dt} = rK(1 - K/K) = 0$, which is the minimum (equilibrium), not the maximum.", "isCorrect": false}, {"text": "$P = \\frac{K}{2}$", "rationale": "The growth rate function $f(P) = rP - \\frac{r}{K}P^2$ is a downward-opening parabola. Its vertex (maximum) occurs at $P = -b/(2a) = -r / (2(-r/K)) = K/2$.", "isCorrect": true}, {"text": "$P = \\frac{K}{r}$", "rationale": "This value does not correspond to a significant qualitative feature of the standard logistic growth curve.", "isCorrect": false}, {"text": "$P = 0$", "rationale": "At $P=0$, the growth rate is zero, representing the lower equilibrium.", "isCorrect": false}], "hint": "Differentiate $g(P) = rP(1 - P/K)$ with respect to $P$ and set the derivative to zero to find the peak of the growth rate function."}, {"questionNumber": 4, "question": "Using the method of separation of variables, what is the explicit solution $P(t)$ to the logistic equation given an initial condition $P(0) = P_0$?", "answerOptions": [{"text": "$P(t) = P_0 e^{rt}$", "rationale": "This is the solution to the Malthusian (exponential) growth model $\\frac{dP}{dt} = rP$, which does not account for the carrying capacity.", "isCorrect": false}, {"text": "$P(t) = \\frac{K}{1 + \\left(\\frac{K - P_0}{P_0}\\right) e^{-rt}}$", "rationale": "This is the correct analytic solution derived by integrating $\\int \\frac{1}{P(1-P/K)} dP = \\int r dt$ using partial fraction decomposition.", "isCorrect": true}, {"text": "$P(t) = K + (P_0 - K) e^{-rt}$", "rationale": "This is the solution to Newton's Law of Cooling or a linear model $\\frac{dy}{dt} = k(A - y)$, not the non-linear logistic model.", "isCorrect": false}, {"text": "$P(t) = \\frac{P_0 K e^{rt}}{K + P_0 (e^{rt} + 1)}$", "rationale": "This is an algebraically incorrect variation of the logistic solution.", "isCorrect": false}], "hint": "Recall that the solution involves an S-shaped curve. As $t \\to \\infty$, the exponent $e^{-rt}$ goes to zero, making the denominator $1$, resulting in $P(t) \\to K$."}, {"questionNumber": 5, "question": "If the initial population $P_0$ satisfies $P_0 > K$, what is the qualitative behavior of $P(t)$ as $t$ increases?", "answerOptions": [{"text": "The population grows exponentially toward infinity.", "rationale": "The logistic model prevents infinite growth due to the $(1 - P/K)$ term, which becomes negative when $P > K$.", "isCorrect": false}, {"text": "The population remains constant at $P_0$.", "rationale": "$P_0$ is only constant if it is an equilibrium point ($P=0$ or $P=K$). If $P_0 > K$, the derivative is non-zero.", "isCorrect": false}, {"text": "The population decreases monotonically toward the carrying capacity $K$.", "rationale": "If $P > K$, the term $(1 - P/K)$ is negative, so $\\frac{dP}{dt} < 0$. The population declines until it asymptotically approaches $K$.", "isCorrect": true}, {"text": "The population oscillates around the carrying capacity $K$.", "rationale": "First-order autonomous differential equations in one variable cannot exhibit oscillation; solutions must be monotonic.", "isCorrect": false}], "hint": "Look at the sign of the derivative $\\frac{dP}{dt}$ when $P > K$."}]}, "inline_VpZOuOJ_ob4_definitions": {"quiz_id": "inline_VpZOuOJ_ob4_definitions", "chapter_number": 8, "video_id": "VpZOuOJ_ob4", "title": "Micro-Practice: Theory of 2nd Order ODEs", "questions": [{"questionNumber": 1, "question": "Consider the initial value problem (IVP) given by: $$y'' + p(t)y' + q(t)y = g(t), \\quad y(t_0) = y_0, \\quad y'(t_0) = y'_0$$ According to the Existence and Uniqueness Theorem, what is the primary condition on $p(t)$, $q(t)$, and $g(t)$ to ensure a unique solution exists on an open interval $I$ containing $t_0$?", "answerOptions": [{"text": "$p(t)$, $q(t)$, and $g(t)$ must be differentiable on $I$.", "rationale": "Differentiability is a stronger condition than required; the theorem only requires continuity for the existence and uniqueness of solutions to linear second-order IVPs.", "isCorrect": false}, {"text": "$p(t)$, $q(t)$, and $g(t)$ must be continuous on $I$.", "rationale": "The theorem states that if the coefficients $p, q$ and the forcing function $g$ are continuous on an open interval $I$ containing $t_0$, then there exists exactly one solution $y = \\phi(t)$ to the IVP throughout $I$.", "isCorrect": true}, {"text": "$p(t)$ and $q(t)$ must be constant functions.", "rationale": "While constant coefficients allow for easier solving (using the characteristic equation), the general existence and uniqueness theorem applies to any continuous variable coefficients.", "isCorrect": false}, {"text": "The equation must be homogeneous ($g(t) = 0$).", "rationale": "The theorem applies to both homogeneous and non-homogeneous linear equations, provided the continuity conditions are met.", "isCorrect": false}], "hint": "Check the requirements for the standard Existence and Uniqueness Theorem for linear differential equations."}, {"questionNumber": 2, "question": "If $y_1(t)$ and $y_2(t)$ are two solutions to the linear homogeneous equation $L[y] = y'' + p(t)y' + q(t)y = 0$, the Principle of Superposition states that $y(t) = c_1 y_1(t) + c_2 y_2(t)$ is also a solution. Why does this principle fail for non-linear equations?", "answerOptions": [{"text": "Non-linear equations do not have two independent solutions.", "rationale": "Non-linear equations can have many solutions, but the linear combination of those solutions is not guaranteed to satisfy the non-linear operators due to terms like $y^2$ or $(y')^2$.", "isCorrect": false}, {"text": "The differential operator $L$ is only additive and homogeneous if the equation is linear.", "rationale": "Superposition relies on the linearity of the operator: $L[c_1y_1 + c_2y_2] = c_1L[y_1] + c_2L[y_2]$. If the equation is non-linear, this equality does not hold.", "isCorrect": true}, {"text": "Non-linear equations always have a Wronskian equal to zero.", "rationale": "The Wronskian is a tool used to test linear independence; its value is not inherently tied to whether an equation is linear or non-linear in this manner.", "isCorrect": false}, {"text": "The Superposition Principle only applies when $p(t) = 0$.", "rationale": "Superposition applies to any linear homogeneous ODE, regardless of whether the $y'$ term coefficient $p(t)$ is zero or non-zero.", "isCorrect": false}], "hint": "Think about the properties of a linear operator $L$ acting on a sum of functions."}, {"questionNumber": 3, "question": "The Wronskian of two functions $y_1$ and $y_2$ is defined as $W(y_1, y_2)(t) = y_1(t)y'_2(t) - y'_1(t)y_2(t)$. If $y_1$ and $y_2$ are solutions to $y'' + p(t)y' + q(t)y = 0$, what does it mean if $W(y_1, y_2)(t) \\neq 0$ for some $t$ in the interval of interest?", "answerOptions": [{"text": "The solutions are linearly dependent.", "rationale": "If the Wronskian is non-zero, the solutions are linearly independent, not dependent.", "isCorrect": false}, {"text": "One solution is a scalar multiple of the other.", "rationale": "This describes linear dependence, which corresponds to a Wronskian of zero.", "isCorrect": false}, {"text": "The solutions form a fundamental set of solutions.", "rationale": "When the Wronskian is non-zero at a point where coefficients are continuous, the solutions are linearly independent and their linear combinations can represent any solution to the homogeneous ODE.", "isCorrect": true}, {"text": "The differential equation must be non-homogeneous.", "rationale": "The Wronskian is primarily used to analyze the solutions of the homogeneous equation to find the fundamental set.", "isCorrect": false}], "hint": "Recall how the Wronskian relates to the ability to solve for constants $c_1$ and $c_2$ in an IVP."}, {"questionNumber": 4, "question": "By definition, two functions $f$ and $g$ are linearly independent on an interval $I$ if the only constants $c_1$ and $c_2$ satisfying $c_1 f(t) + c_2 g(t) = 0$ for all $t \\in I$ are:", "answerOptions": [{"text": "$c_1 = 0, c_2 = 1$", "rationale": "This would mean $g(t) = 0$, which is a specific case, but not the general definition of independence.", "isCorrect": false}, {"text": "$c_1 = 0, c_2 = 0$", "rationale": "Linear independence means that the only way to get a zero linear combination is if all coefficients are zero. If a non-trivial combination exists, they are linearly dependent.", "isCorrect": true}, {"text": "$c_1 = -c_2$", "rationale": "If $c_1 = -c_2$ (and both are non-zero), then $f(t) = g(t)$, meaning they are linearly dependent.", "isCorrect": false}, {"text": "$c_1$ and $c_2$ can be any real numbers.", "rationale": "If any choice of constants works, the functions would still be zero, which is not the definition of independence.", "isCorrect": false}], "hint": "Consider the 'trivial solution' for the coefficients in a linear combination."}, {"questionNumber": 5, "question": "Which of the following describes the general solution to the non-homogeneous equation $y'' + p(t)y' + q(t)y = g(t)$?", "answerOptions": [{"text": "$y(t) = c_1 y_1(t) + c_2 y_2(t)$", "rationale": "This is the general solution to the complementary (homogeneous) equation, not the non-homogeneous equation.", "isCorrect": false}, {"text": "$y(t) = Y(t)$, where $Y$ is a particular solution.", "rationale": "While $Y(t)$ is a solution, it is not the 'general' solution because it does not include the arbitrary constants needed to satisfy arbitrary initial conditions.", "isCorrect": false}, {"text": "$y(t) = c_1 y_1(t) + c_2 y_2(t) + Y(t)$", "rationale": "The general solution to a linear non-homogeneous ODE is the sum of the general solution of the corresponding homogeneous equation (the complementary solution) and any particular solution $Y(t)$.", "isCorrect": true}, {"text": "$y(t) = c_1 y_1(t) \\cdot Y(t)$", "rationale": "Solutions are added, not multiplied, in the theory of linear differential equations.", "isCorrect": false}], "hint": "The general solution must account for both the 'forcing' term $g(t)$ and the homogeneous structure of the operator."}]}, "inline_QbkWlNf2Xtw_definitions": {"quiz_id": "inline_QbkWlNf2Xtw_definitions", "chapter_number": 1, "video_id": "QbkWlNf2Xtw", "title": "Micro-Practice: Introduction to Differential Equations", "questions": [{"questionNumber": 1, "question": "A differential equation is classified by its order and linearity. Determine the order and linearity of the following equation: $$x^2 \\frac{d^2y}{dx^2} + x \\frac{dy}{dx} + (x^2 - n^2)y = 0$$", "answerOptions": [{"text": "First-order, non-linear", "rationale": "The highest derivative present is the second derivative $\\frac{d^2y}{dx^2}$, making it second-order, not first-order.", "isCorrect": false}, {"text": "Second-order, linear", "rationale": "The highest derivative is $\\frac{d^2y}{dx^2}$, so it is second-order. It is linear because the dependent variable $y$ and its derivatives appear in the first power and are not multiplied together or used as arguments in non-linear functions.", "isCorrect": true}, {"text": "Second-order, non-linear", "rationale": "While it is second-order, the equation is linear because the coefficients $x^2$ and $x$ only depend on the independent variable $x$.", "isCorrect": false}, {"text": "Third-order, linear", "rationale": "The highest derivative is the second derivative, making it a second-order equation, not third-order.", "isCorrect": false}], "hint": "Identify the highest derivative present to find the order. For linearity, check if the dependent variable $y$ or its derivatives appear in any non-linear form (like $y^2$, $\\sin(y)$, or $y \\cdot y'$)."}, {"questionNumber": 2, "question": "Which of the following functions is a solution to the first-order differential equation $\\frac{dy}{dt} = -3y$ with the initial condition $y(0) = 5$?", "answerOptions": [{"text": "$y(t) = 5 e^{3t}$", "rationale": "Substituting this into the DE yields $15 e^{3t} = -3(5 e^{3t})$, which simplifies to $15 = -15$, a contradiction.", "isCorrect": false}, {"text": "$y(t) = e^{-3t} + 4$", "rationale": "While $y(0)=5$, the derivative $y'(t) = -3e^{-3t}$ does not equal $-3(e^{-3t} + 4) = -3e^{-3t} - 12$.", "isCorrect": false}, {"text": "$y(t) = 5 e^{-3t}$", "rationale": "The derivative is $y'(t) = -15e^{-3t}$. Substituting into the DE: $-15e^{-3t} = -3(5e^{-3t})$, which is true. Also, $y(0) = 5e^0 = 5$.", "isCorrect": true}, {"text": "$y(t) = -3 e^{5t}$", "rationale": "The initial condition $y(0) = -3$ does not match the required $y(0) = 5$.", "isCorrect": false}], "hint": "The general solution to $\\frac{dy}{dt} = ky$ is $y(t) = Ce^{kt}$. Use the initial condition to solve for $C$."}, {"questionNumber": 3, "question": "What is the primary difference between an Ordinary Differential Equation (ODE) and a Partial Differential Equation (PDE)?", "answerOptions": [{"text": "An ODE contains only one dependent variable, while a PDE contains multiple dependent variables.", "rationale": "Both can have multiple dependent variables (systems of equations). The distinction lies in the independent variables.", "isCorrect": false}, {"text": "An ODE involves derivatives with respect to only one independent variable, whereas a PDE involves partial derivatives with respect to multiple independent variables.", "rationale": "This is the formal definition. ODEs deal with functions of a single variable, while PDEs deal with functions of several variables and their partial derivatives.", "isCorrect": true}, {"text": "An ODE is always linear, whereas a PDE is always non-linear.", "rationale": "Both ODEs and PDEs can be either linear or non-linear.", "isCorrect": false}, {"text": "ODEs can only be first-order, while PDEs can be of any order.", "rationale": "ODEs can be of any order $n$ depending on the highest derivative present.", "isCorrect": false}], "hint": "Consider the variable the function depends on. If $y = f(x)$, it's an ODE. If $u = f(x, t)$, it's likely a PDE."}, {"questionNumber": 4, "question": "Which of the following differential equations is considered non-linear?", "answerOptions": [{"text": "$\\frac{d^2y}{dx^2} + 5y = \\cos(x)$", "rationale": "This is a linear second-order non-homogeneous equation because $y$ and its derivatives are in the first power.", "isCorrect": false}, {"text": "$\\frac{dy}{dx} + xy = x^2$", "rationale": "This is a linear first-order equation; the coefficient $x$ and the term $x^2$ do not affect linearity as they depend on the independent variable.", "isCorrect": false}, {"text": "$\\frac{dy}{dx} + \\sin(y) = 0$", "rationale": "The term $\\sin(y)$ is a non-linear function of the dependent variable $y$, making the entire equation non-linear.", "isCorrect": true}, {"text": "$y''' + e^x y' = 0$", "rationale": "This is linear; the coefficient $e^x$ is a function of the independent variable $x$.", "isCorrect": false}], "hint": "Look for terms where the dependent variable $y$ or its derivatives are squared, multiplied together, or inside functions like $\\sin$, $\\exp$, or $\\ln$."}, {"questionNumber": 5, "question": "In the context of the general solution to a second-order ODE, why are there usually two arbitrary constants ($C_1$ and $C_2$)?", "answerOptions": [{"text": "Because there are two independent variables.", "rationale": "ODEs by definition have only one independent variable.", "isCorrect": false}, {"text": "Because the process of solving involves integrating twice, and each integration step introduces a constant of integration.", "rationale": "A second-order equation typically requires two integrations to recover $y(x)$ from $y''(x)$, leading to two constants that define the family of solutions.", "isCorrect": true}, {"text": "Because all second-order equations are systems of two first-order equations.", "rationale": "While a second-order ODE can be rewritten as a system, the constants arise fundamentally from the order of the highest derivative.", "isCorrect": false}, {"text": "Because the equation must have both a sine and a cosine term.", "rationale": "This only applies to specific linear equations with constant coefficients where the roots are purely imaginary.", "isCorrect": false}], "hint": "Think about the Fundamental Theorem of Calculus and how many times you must reverse the differentiation process for a $d^2y/dx^2$ term."}]}, "inline_P3fc6v191mA_definitions": {"quiz_id": "inline_P3fc6v191mA_definitions", "chapter_number": 9, "video_id": "P3fc6v191mA", "title": "Micro-Practice: Method of Undetermined Coefficients", "questions": [{"questionNumber": 1, "question": "The Method of Undetermined Coefficients is restricted to a specific class of linear non-homogeneous differential equations. For which type of equation is this method applicable?", "answerOptions": [{"text": "Linear ODEs where the coefficients are functions of $x$, such as $x^2 y'' + x y' + y = \\ln(x)$.", "rationale": "Incorrect. Variable coefficients typically require the Method of Variation of Parameters or power series solutions; Undetermined Coefficients requires constant coefficients.", "isCorrect": false}, {"text": "Linear ODEs with constant coefficients where the forcing function $g(x)$ is a polynomial, exponential, or sine/cosine function.", "rationale": "Correct. This method is specifically designed for linear constant-coefficient ODEs where $g(x)$ (and its derivatives) form a finite set of linearly independent functions.", "isCorrect": true}, {"text": "Any first-order nonlinear ODE, provided the forcing function is continuous.", "rationale": "Incorrect. This method is fundamentally a linear technique and does not apply to nonlinear equations.", "isCorrect": false}, {"text": "Linear constant-coefficient ODEs where the forcing function is $g(x) = \\tan(x)$ or $g(x) = \\sec(x)$.", "rationale": "Incorrect. The derivatives of $\\tan(x)$ and $\\sec(x)$ do not form a finite set of functions, so Undetermined Coefficients cannot be used. Variation of Parameters is required here.", "isCorrect": false}], "hint": "Consider the types of functions whose derivatives eventually repeat a pattern or terminate."}, {"questionNumber": 2, "question": "Suppose we are solving the ODE $$y'' + 4y' + 4y = 2x^2 + 5$$. What is the correct form for the trial particular solution $y_p(x)$?", "answerOptions": [{"text": "$y_p(x) = Ax^2$", "rationale": "Incorrect. A trial solution for a polynomial must include all lower-order terms down to the constant, even if those terms are zero in the forcing function.", "isCorrect": false}, {"text": "$y_p(x) = Ax^2 + Bx + C$", "rationale": "Correct. Since the forcing function is a second-degree polynomial and zero is not a root of the characteristic equation $r^2 + 4r + 4 = 0$, the standard polynomial form is used.", "isCorrect": true}, {"text": "$y_p(x) = x(Ax^2 + Bx + C)$", "rationale": "Incorrect. We only multiply by $x$ (the 'Modification Rule') if the constant term or polynomial terms overlap with the complementary solution $y_c(x)$. Here, $y_c(x) = (c_1 + c_2 x)e^{-2x}$, which does not overlap with a polynomial.", "isCorrect": false}, {"text": "$y_p(x) = Ax^2 + B$", "rationale": "Incorrect. Even if the linear term $x$ is missing in $g(x)$, it must be included in the trial $y_p$ because the derivatives $y'$ and $y''$ will generate lower-order terms.", "isCorrect": false}], "hint": "If $g(x)$ is a polynomial of degree $n$, start with a general polynomial of degree $n$ unless the homogeneous equation suggests otherwise."}, {"questionNumber": 3, "question": "Consider the ODE $$y'' - 2y' + y = e^x$$. The characteristic equation $r^2 - 2r + 1 = 0$ has a repeated root $r = 1$, giving $y_h(x) = c_1 e^x + c_2 x e^x$. What is the appropriate trial form for $y_p(x)$?", "answerOptions": [{"text": "$y_p(x) = Ae^x$", "rationale": "Incorrect. This term is already present in the complementary solution, so it will result in zero when plugged into the left-hand side.", "isCorrect": false}, {"text": "$y_p(x) = Axe^x$", "rationale": "Incorrect. Because $x e^x$ is also part of the complementary solution (due to the repeated root), this term will also result in zero when substituted.", "isCorrect": false}, {"text": "$y_p(x) = Ax^2 e^x$", "rationale": "Correct. According to the Modification Rule, we multiply the standard form $Ae^x$ by $x^n$ where $n$ is the smallest integer such that no term in $y_p$ is a solution to the homogeneous equation. Since $e^x$ and $xe^x$ are solutions, we use $x^2$.", "isCorrect": true}, {"text": "$y_p(x) = (Ax^2 + Bx + C)e^x$", "rationale": "Incorrect. While this form includes $Ax^2 e^x$, the lower terms $Bx e^x$ and $C e^x$ are redundant as they are already accounted for in the complementary solution.", "isCorrect": false}], "hint": "The term $e^x$ is a solution to the homogeneous equation twice. How many times must you multiply by $x$ to achieve linear independence?"}, {"questionNumber": 4, "question": "For the differential equation $$y'' + 9y = \\sin(3x)$$, why is the trial solution $y_p(x) = A \\cos(3x) + B \\sin(3x)$ insufficient?", "answerOptions": [{"text": "Because the forcing function only contains $\\sin(3x)$, so $\\cos(3x)$ should not be included.", "rationale": "Incorrect. In Undetermined Coefficients, sines and cosines must always appear in pairs because their derivatives alternate.", "isCorrect": false}, {"text": "Because the function $\\sin(3x)$ is a solution to the homogeneous equation $y'' + 9y = 0$.", "rationale": "Correct. The characteristic roots are $\\pm 3i$, which gives $y_h = c_1 \\cos(3x) + c_2 \\sin(3x)$. Since the forcing function matches the homogeneous solution, resonance occurs, requiring the trial form $x(A \\cos(3x) + B \\sin(3x))$.", "isCorrect": true}, {"text": "Because the method cannot handle trigonometric functions when the frequency squared equals the coefficient of $y$.", "rationale": "Incorrect. The method can handle this; it just requires a modification (multiplying by $x$).", "isCorrect": false}, {"text": "Because the forcing function must be converted to complex exponentials first.", "rationale": "Incorrect. While converting to complex exponentials is a valid alternative approach, the Method of Undetermined Coefficients works directly with real-valued sines and cosines.", "isCorrect": false}], "hint": "Check if the roots of the characteristic equation $r^2 + 9 = 0$ correspond to the frequency of the forcing function."}, {"questionNumber": 5, "question": "Suppose $y_1(x)$ is a particular solution to $a y'' + b y' + c y = g_1(x)$ and $y_2(x)$ is a particular solution to $a y'' + b y' + c y = g_2(x)$. According to the Principle of Superposition, what is a particular solution to $$a y'' + b y' + c y = 3g_1(x) - 4g_2(x)$$?", "answerOptions": [{"text": "$y_p(x) = y_1(x) + y_2(x)$", "rationale": "Incorrect. This does not account for the linear scaling factors 3 and -4.", "isCorrect": false}, {"text": "$y_p(x) = 3y_1(x) - 4y_2(x)$", "rationale": "Correct. Because the differential operator is linear, the particular solution to a linear combination of forcing functions is the same linear combination of their respective particular solutions.", "isCorrect": true}, {"text": "$y_p(x) = 12 y_1(x) y_2(x)$", "rationale": "Incorrect. Particular solutions do not multiply; they combine linearly in linear ODEs.", "isCorrect": false}, {"text": "$y_p(x) = y_h(x) + 3y_1(x) - 4y_2(x)$", "rationale": "Incorrect. While this is the general solution, the question specifically asks for a particular solution.", "isCorrect": false}], "hint": "Linearity of the derivative operator means $L[c_1 y_1 + c_2 y_2] = c_1 L[y_1] + c_2 L[y_2]$."}]}, "inline_AgyeJEO2a-k_definitions": {"quiz_id": "inline_AgyeJEO2a-k_definitions", "chapter_number": 9, "video_id": "AgyeJEO2a-k", "title": "Micro-Practice: Undetermined Coefficients (Conceptual Breakdown)", "questions": [{"questionNumber": 1, "question": "For which of the following non-homogeneous ordinary differential equations is the Method of Undetermined Coefficients directly applicable?", "answerOptions": [{"text": "$$y'' + \\frac{1}{x}y' + y = e^x$$", "isCorrect": false, "rationale": "The Method of Undetermined Coefficients requires the differential equation to have constant coefficients. Here, the term $\\frac{1}{x}$ makes it a variable coefficient equation."}, {"text": "$$y'' - 4y' + 3y = \\ln(x)$$", "isCorrect": false, "rationale": "The non-homogeneous term $g(x)$ must be a polynomial, exponential, sine/cosine, or a finite combination thereof. The natural logarithm $\\ln(x)$ is not in this class of functions."}, {"text": "$$y'' + 5y' + 6y = x^2 e^{2x} \\cos(x)$$", "isCorrect": true, "rationale": "The equation has constant coefficients and the right-hand side is a product of a polynomial, an exponential, and a trigonometric function, which is the standard form required for this method."}, {"text": "$$y'' + y = \\tan(x)$$", "isCorrect": false, "rationale": "While the coefficients are constant, $\\tan(x)$ is not a member of the family of functions (polynomials, exponentials, sines, cosines) handled by Undetermined Coefficients; Variation of Parameters would be required instead."}], "hint": "Check if the coefficients of the derivatives are constants and if the non-homogeneous term $g(x)$ belongs to the 'U-set' (functions whose derivatives eventually repeat a pattern)."}, {"questionNumber": 2, "question": "Given the equation $$y'' + 4y = x^2$$, what is the most appropriate trial form for the particular solution $y_p(x)$?", "answerOptions": [{"text": "$$Ax^2$$", "isCorrect": false, "rationale": "This form is incomplete. When we take derivatives of $y_p$, the terms $x$ and constants will be produced, so they must be accounted for in the initial guess."}, {"text": "$$Ax^2 + Bx + C$$", "isCorrect": true, "rationale": "For a polynomial of degree $n$, the trial solution must be a general polynomial of the same degree $n$, including all lower-order terms."}, {"text": "$$Ax^3 + Bx^2 + Cx + D$$", "isCorrect": false, "rationale": "A cubic trial function is unnecessary because the right-hand side is only of degree 2, and $0$ is not a root of the characteristic equation $r^2 + 4 = 0$."}, {"text": "$$(Ax^2 + Bx + C) \\cos(2x)$$", "isCorrect": false, "rationale": "There is no trigonometric term on the right-hand side, so including one in the guess is incorrect."}], "hint": "When $g(x)$ is a polynomial of degree $n$, the trial solution should be the most general polynomial of that same degree, unless resonance occurs."}, {"questionNumber": 3, "question": "Consider the equation $$y'' - 4y' + 4y = e^{2x}$$. If the characteristic equation $r^2 - 4r + 4 = 0$ has a repeated root $r = 2$, why is the guess $y_p(x) = A e^{2x}$ insufficient?", "answerOptions": [{"text": "Because $A e^{2x}$ is a solution to the homogeneous equation $y'' - 4y' + 4y = 0$.", "isCorrect": true, "rationale": "Since $e^{2x}$ is a part of the complementary solution $y_h$, plugging it into the operator $L[y]$ results in zero, not $e^{2x}$. We must multiply by $x^k$ until no term in $y_p$ is in $y_h$."}, {"text": "Because the derivative of $e^{2x}$ involves a constant factor.", "isCorrect": false, "rationale": "The constant factor in the derivative is expected; the issue is that the function itself satisfies the homogeneous part of the equation."}, {"text": "Because the right-hand side must be a polynomial for this method to work.", "isCorrect": false, " $", "isCorrect": false, "rationale": "This misses the constant term $B$ for the polynomial part and fails to account for the resonance in the exponential part."}, {"text": "$$(Ax + B)e^x$$", "isCorrect": false, "rationale": "This represents a product of a polynomial and an exponential, but the RHS is a sum of these functions."}, {"text": "$$Ax^2 + Bx + Ce^x$$", "isCorrect": false, "rationale": "There is no resonance for the polynomial part ($0$ is not a root of $r^2-1=0$), so $Ax^2$ is incorrect; however, there is resonance for the exponential part, which is not addressed here."}], "hint": "Split the problem into two parts: $g_1(x) = x$ and $g_2(x) = e^x$. Find the correct form for each separately, checking for resonance against $y_h$, and then add them together."}]}, "inline_Ik3YW1JGr_A_definitions": {"quiz_id": "inline_Ik3YW1JGr_A_definitions", "chapter_number": 9, "video_id": "Ik3YW1JGr_A", "title": "Micro-Practice: Variation of Parameters (Analytical Method)", "questions": [{"questionNumber": 1, "question": "For a second-order linear non-homogeneous differential equation in standard form $$y'' + P(x)y' + Q(x)y = f(x)$$, what fundamental property must the homogeneous solutions $y_1(x)$ and $y_2(x)$ satisfy to apply the Variation of Parameters method?", "answerOptions": [{"text": "They must be orthogonal, such that $$\\int y_1(x)y_2(x) dx = 0$$.", "rationale": "Orthogonality is a property often sought in Sturm-Liouville theory or Fourier series, but it is not a requirement for the Variation of Parameters method.", "isCorrect": false}, {"text": "They must be linearly independent, meaning their Wronskian $W(y_1, y_2) \\neq 0$.", "rationale": "Variation of Parameters requires a fundamental set of solutions. Linear independence ensures the Wronskian in the denominator of the $u_1'$ and $u_2'$ formulas is non-zero.", "isCorrect": true}, {"text": "They must be periodic functions such as $$\\sin(ax)$$ or $$\\cos(ax)$$.", "rationale": "The method is general and applies to x)]^T$, leading to a $-y_2 f$ term."}, {"questionNumber": 5, "question": "What is a primary advantage of the Variation of Parameters method over the Method of Undetermined Coefficients?", "answerOptions": [{"text": "It does not require solving the homogeneous equation first.", "rationale": "Incorrect. Both methods require the homogeneous solutions $y_1$ and $y_2$.", "isCorrect": false}, {"text": "It is computationally simpler and never involves integration.", "rationale": "Incorrect. Variation of Parameters almost always involves integration, which can often be quite difficult.", "isCorrect": false}, {"text": "It can be used for any continuous function $f(x)$, such as $$\\ln(x)$$ or $$\\tan(x)$$, where Undetermined Coefficients cannot.", "rationale": "Correct. Undetermined Coefficients is restricted to functions with a finite number of linearly independent derivatives (polynomals, exps, sines/cosines), whereas Variation of Parameters is general.", "isCorrect": true}, {"text": "It only applies to linear equations with constant coefficients.", "rationale": "Incorrect. Variation of Parameters can also be applied to equations with variable coefficients, provided the homogeneous solutions are known.", "isCorrect": false}], "hint": "Think about the limitations of 'guessing' the form of the solution in the Method of Undetermined Coefficients."}]}, "inline_wSMad7QpaqE_definitions": {"quiz_id": "inline_wSMad7QpaqE_definitions", "chapter_number": 9, "video_id": "wSMad7QpaqE", "title": "Micro-Practice: Variation of Parameters (Examples)", "questions": [{"questionNumber": 1, "question": "For a second-order linear non-homogeneous differential equation $$y'' + P(x)y' + Q(x)y = f(x)$$, let $$y_c = c_1 y_1 + c_2 y_2$$ be the complementary solution. What is the fundamental assumption for the particular solution $$y_p$$ in the method of Variation of Parameters?", "answerOptions": [{"text": "$$y_p = u_1 y_1 + u_2 y_2$$ where $$u_1, u_2$$ are functions of $$x$$", "rationale": "The method of Variation of Parameters generalizes the constants $$c_1, c_2$$ into functions (parameters) $$u_1(x), u_2(x)$$ to satisfy the non-homogeneous equation.", "isCorrect": true}, {"text": "$$y_p = A e^{rx}$$ where $$A$$ is an undetermined constant", "rationale": "This describes a specific form used in the Method of Undetermined Coefficients, not Variation of Parameters.", "isCorrect": false}, {"text": "$$y_p = u_1 y_1' + u_2 y_2'$$ where $$u_1, u_2$$ are functions of $$x$$", "rationale": "The particular solution is a linear combination of the fundamental solutions $$y_1, y_2$$, not their derivatives.", "isCorrect": false}, {"text": "$$y_p = x(c_1 y_1 + c_2 y_2)$$ where $$c_1, c_2$$ are constants", "rationale": "This is a form sometimes used in reduction of order or specific cases of undetermined coefficients, not the general variation of parameters form.", "isCorrect": false}], "hint": "Recall that we 'vary' the constants $$c_1$$ and $$c_2$$ from the homogeneous solution."}, {"questionNumber": 2, "question": "To solve $$y'' + 9y = \\tan(3x)$$ using Variation of Parameters, we first find $$y_1 = \\cos(3x)$$ and $$y_2 = \\sin(3x)$$. What is the Wronskian $$W(y_1, y_2)$$?", "answerOptions": [{"text": "$$W = 1$$", "rationale": "The Wronskian is calculated as $$y_1 y_2' - y_2 y_1' = \\cos(3x)(3\\cos(3x)) - \\sin(3x)(-3\\sin(3x)) = 3(\\cos^2(3x) + \\sin^2(3x)) = 3$$.", "isCorrect": false}, {"text": "$$W = 3$$", "rationale": "Correct. $$W(\\cos(3x), \\sin(3x)) = (\\cos(3x))(3\\cos(3x)) - (\\sin(3x))(-3\\sin(3x)) = 3\\cos^2(3x) + 3\\sin^2(3x) = 3$$.", "isCorrect": true}, {"text": "$$W = -3$$", "rationale": "This likely results from a sign error in the derivative of $$\\cos(3x)$$ or the determinant formula.", "isCorrect": false}, {"text": "$$W = 0$$", "rationale": "If the Wronskian were zero, the solutions $$y_1$$ and $$y_2$$ would not be linearly independent.", "isCorrect": false}], "hint": "Use the determinant formula $$W = y_1 y_2' - y_2 y_1'$$ and the chain rule for trigonometric derivatives."}, {"questionNumber": 3, "question": "Given the standard form $$y'' + P(x)y' + Q(x)y = f(x)$$, which of the following correctly defines the derivative of the parameter $$u_1(x)$$?", "answerOptions": [{"text": "$$u_1' = \\frac{y_2 f(x)}{W}$$", "rationale": "The formula for $$u_1'$$ contains a negative sign: $$u_1' = -\\frac{y_2 f(x)}{W}$$.", "isCorrect": false}, {"text": "$$u_1' = -\\frac{y_2 f(x)}{W}$$", "rationale": "This is the standard formula derived from the system of equations $$u_1' y_1 + u_2' y_2 = 0$$ and $$u_1' y_1' + u_2' y_2' = f(x)$$.", "isCorrect": true}, {"text": "$$u_1' = \\frac{y_1 f(x)}{W}$$", "rationale": "This is the formula for $$u_2'$$, not $$u_1'$$.", "isCorrect": false}, {"text": "$$u_1' = -\\int \\frac{y_2 f(x)}{W} dx$$", "rationale": "This expression represents $$u_1(x)$$ itself, not its derivative $$u_1'(x)$$.", "isCorrect": false}], "hint": "Cramer's rule applied to the variation of parameters system yields $$u_1' = \\frac{W_1}{W}$$, where $$W_1$$ is the determinant of the Wronskian matrix with the first column replaced by $$[0, f(x)]^T$$."}, {"questionNumber": 4, "question": "Consider the equation $$y'' + y = \\sec x$$. If $$y_1 = \\cos x$$, $$y_2 = \\sin x$$, and $$W = 1$$, find the expression for $$u_2'(x)$$.", "answerOptions": [{"text": "$$u_2'(x) = 1$$", "rationale": "Using the formula $$u_2' = \\frac{y_1 f(x)}{W}$$, we get $$u_2' = \\frac{\\cos x \\cdot \\sec x}{1} = \\cos x \\cdot \\frac{1}{\\cos x} = 1$$.", "isCorrect": true}, {"text": "$$u_2'(x) = \\tan x$$", "rationale": "This would result if $$y_2$$ was used instead of $$y_1$$ in the numerator.", "isCorrect": false}, {"text": "$$u_2'(x) = \\cos^2 x$$", "rationale": "This suggests a misunderstanding of the identity $$\\sec x = 1/\\cos x$$.", "isCorrect": false}, {"text": "$$u_2'(x) = -1$$", "rationale": "The formula for $$u_2'$$ does not have a leading negative sign, unlike the formula for $$u_1'$$.", "isCorrect": false}], "hint": "Substitute $$y_1 = \\cos x$$ and $$f(x) = \\sec x$$ into the formula $$u_2' = \\frac{y_1 f(x)}{W}$$. Remember that $$\\cos x \\sec x = 1$$."}, {"questionNumber": 5, "question": "When applying Variation of Parameters to the equation $$2y'' + 4y' + 2y = e^{-x} \\ln x$$, what is the first critical step regarding the non-homogeneous term $$f(x)$$?", "answerOptions": [{"text": "Identify $$f(x) = e^{-x} \\ln x$$ immediately.", "rationale": "The formula requires the ODE to be in standard form (leading coefficient of 1). Here, the leading coefficient is 2.", "isCorrect": false}, {"text": "Divide the entire equation by 2 so that $$f(x) = \\frac{1}{2} e^{-x} \\ln x$$.", "rationale": "The standard form $$y'' + P(x)y' + Q(x)y = f(x)$$ must be established before using the $$u_1', u_2'$$ formulas. Since the original equation has a $$2$$ in front of $$y''$$, we must normalize it.", "isCorrect": true}, {"text": "Set $$f(x) = 0$$ and solve the homogeneous part.", "rationale": "While solving the homogeneous part is necessary, this does not address the correct identification of $$f(x)$$ for the subsequent integration steps.", "isCorrect": false}, {"text": "Multiply the equation by $$x$$ to simplify the log term.", "rationale": "Multiplying by $$x$$ would change the differential equation and is not a standard step in Variation of Parameters.", "isCorrect": false}], "hint": "Check the coefficient of the highest-order derivative term ($$y''$$) before applying the formulas."}]}, "inline_j0wJBEZdwLs_definitions": {"quiz_id": "inline_j0wJBEZdwLs_definitions", "chapter_number": 10, "video_id": "j0wJBEZdwLs", "title": "Micro-Practice: Visualizing the Laplace Transform", "questions": [{"questionNumber": 1, "question": "The Laplace transform of a function $f(t)$ is defined as $F(s) = \\int_{0}^{\\infty} f(t) e^{-st} dt$. From a visualization perspective, how can we interpret the effect of the term $e^{-st}$ when $s$ is a real positive number $\\sigma$?", "answerOptions": [{"text": "It acts as a 'damping' or 'weighting' factor that suppresses the function $f(t)$ as $t \\to \\infty$, allowing the integral to converge even for some growing functions.", "rationale": "For $s = \\sigma > 0$, the term $e^{-\\sigma t}$ decays exponentially. Multiplying $f(t)$ by this factor ensures that if $f(t)$ grows slower than $e^{\\sigma t}$, the product will approach zero, making the area under the curve (the integral) finite.", "isCorrect": true}, {"text": "It shifts the function $f(t)$ horizontally along the $t$-axis by a distance proportional to $s$.", "rationale": "Horizontal shifts are represented by $f(t-c)$, which corresponds to multiplying the transform by an exponential, rather than the exponential being inside the integral definition itself.", "isCorrect": false}, {"text": "It rotates the function $f(t)$ in the complex plane by an angle determined by the value of $s$.", "rationale": "Pure rotation is associated with $e^{i\\theta}$. While $s$ can be complex, if $s$ is real, it only scales the magnitude of the function over time, not its phase.", "isCorrect": false}, {"text": "It computes the derivative of $f(t)$ and scales it by a factor of $1/s$.", "rationale": "The Laplace transform of a derivative is related to $sF(s) - f(0)$, but the integral definition itself is a projection onto exponential basis functions, not a differentiation process.", "isCorrect": false}], "hint": "Think about what happens to the graph of $f(t) e^{-\\sigma t}$ as $t$ becomes very large compared to the graph of $f(t)$ alone."}, {"questionNumber": 2, "question": "When $s$ is a complex number $s = \\sigma + i\\omega$, the Laplace transform involves the term $e^{-st} = e^{-\\sigma t} e^{-i\\omega t}$. How does the $e^{-i\\omega t}$ component change our visualization of the transform?", "answerOptions": [{"text": "It only affects the amplitude of the signal, doubling its value for every unit of $\\omega$.", "rationale": "The term $e^{-i\\omega t}$ has a constant magnitude of 1 and does not affect the amplitude growt gral $\\int_{0}^{\\infty} f(t) e^{-st} dt$ is well-defined and finite.", "rationale": "If $s$ is outside the ROC, the exponential $e^{-st}$ does not decay fast enough to counteract the growth of $f(t)$, causing the integral to diverge to infinity.", "isCorrect": true}, {"text": "The area where the function $f(t)$ is equal to its own derivative.", "rationale": "This describes the property of $e^t$, which is a specific function, not the general region of convergence for the transform operator.", "isCorrect": false}], "hint": "Visualize a surface that 'blows up' to infinity at certain values of $s$. The ROC is the 'safe' zone where the surface is finite."}, {"questionNumber": 4, "question": "In the visualization of the Laplace transform of $f(t) = e^{at}$, why is the transform defined for $s > a$ (for real $s$ and $a$)?", "answerOptions": [{"text": "To ensure that the integrand $e^{(a-s)t}$ decays toward zero as $t \\to \\infty$, resulting in a finite area.", "rationale": "The product is $e^{at} e^{-st} = e^{(a-s)t}$. If $s > a$, then $(a-s)$ is negative, which represents exponential decay. If $s < a$, the function grows and the integral diverges.", "isCorrect": true}, {"text": "To ensure that the frequency $\\omega$ is high enough to be captured by the sensors.", "rationale": "This is a physical interpretation of sampling, but the mathematical requirement for $s > a$ relates to convergence of the integral, not sampling rates.", "isCorrect": false}, {"text": "Because the Laplace transform is only valid for negative exponents.", "rationale": "The transform is valid as long as the integral converges; the exponent $(a-s)t$ must be negative in the limit, but $s$ and $a$ themselves can be positive.", "isCorrect": false}, {"text": "To avoid a division by zero in the time-domain function.", "rationale": "The function $e^{at}$ has no division by zero; the constraint $s > a$ arises solely from the limits of the improper integral.", "isCorrect": false}], "hint": "Combine $e^{at}         // ==========================================
        // SLOPE FIELD GENERATOR MATHEMATICAL LOGIC
        // ==========================================
        let particularCurves = [];
        const xMin = -5, xMax = 5;
        const yMin = -5, yMax = 5;

        function toPixelX(x, canvas) {
            return ((x - xMin) / (xMax - xMin)) * canvas.width;
        }

        function toPixelY(y, canvas) {
            return canvas.height - (((y - yMin) / (yMax - yMin)) * canvas.height);
        }

        function toCartesianX(px, canvas) {
            return xMin + (px / canvas.width) * (xMax - xMin);
        }

        function toCartesianY(py, canvas) {
            return yMin + ((canvas.height - py) / canvas.height) * (yMax - yMin);
        }

        function getMathFunction(exprStr) {
            if (typeof math !== 'undefined') {
                try {
                    const parsed = math.parse(exprStr);
                    const compiled = parsed.compile();
                    return (x, y) => {
                        const val = compiled.evaluate({ x: x, y: y });
                        if (typeof val === 'object' && val.isComplex) return NaN;
                        return Number(val);
                    };
                } catch (err) {
                    throw new Error("Invalid equation: " + err.message);
                }
            } else {
                console.warn("Math.js CDN not available, running fallback evaluator.");
                let jsExpr = exprStr
                    .replace(/\^/g, '**')
                    .replace(/sin/g, 'Math.sin')
                    .replace(/cos/g, 'Math.cos')
                    .replace(/tan/g, 'Math.tan')
                    .replace(/exp/g, 'Math.exp')
                    .replace(/log/g, 'Math.log')
                    .replace(/pi/g, 'Math.PI')
                    .replace(/e/g, 'Math.E')
                    .replace(/abs/g, 'Math.abs')
                    .replace(/sqrt/g, 'Math.sqrt');
                    
                return (x, y) => {
                    try {
                        const fn = new Function('x', 'y', `return (${jsExpr});`);
                        return Number(fn(x, y));
                    } catch (err) {
                        throw new Error("Invalid equation or Math.js unavailable: " + err.message);
                    }
                };
            }
        }

        function integrateRK4(x0, y0, fn, direction, canvas) {
            const points = [];
            let x = x0;
            let y = y0;
            const h = direction * 0.04;
            const maxSteps = 150;
            
            points.push({ x: x, y: y });
            
            for (let step = 0; step < maxSteps; step++) {
                const k1 = fn(x, y);
                if (isNaN(k1) || !isFinite(k1)) break;
                
                const x_half = x + h / 2;
                const y_k1 = y + (h * k1) / 2;
                const k2 = fn(x_half, y_k1);
                if (isNaN(k2) || !isFinite(k2)) break;
                
                const y_k2 = y + (h * k2) / 2;
                const k3 = fn(x_half, y_k2);
                if (isNaN(k3) || !isFinite(k3)) break;
                
                const x_next = x + h;
                const y_k3 = y + h * k3;
                const k4 = fn(x_next, y_k3);
                if (isNaN(k4) || !isFinite(k4)) break;
                
                const slope = (k1 + 2 * k2 + 2 * k3 + k4) / 6;
                y = y + h * slope;
                x = x_next;
                
                if (x < xMin - 0.5 || x > xMax + 0.5 || y < yMin - 0.5 || y > yMax + 0.5) {
                    break;
                }
                
                points.push({ x: x, y: y });
            }
            return points;
        }

        function drawSlopeFieldOnCanvas() {
            const canvas = document.getElementById('slope-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            
            for (let x = xMin; x <= xMax; x += 1) {
                const px = toPixelX(x, canvas);
                ctx.beginPath();
                ctx.moveTo(px, 0);
                ctx.lineTo(px, canvas.height);
                ctx.stroke();
            }
            for (let y = yMin; y <= yMax; y += 1) {
                const py = toPixelY(y, canvas);
                ctx.beginPath();
                ctx.moveTo(0, py);
                ctx.lineTo(canvas.width, py);
                ctx.stroke();
            }
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.font = '10px Inter, sans-serif';
            
            const pY0 = toPixelY(0, canvas);
            ctx.beginPath();
            ctx.moveTo(0, pY0);
            ctx.lineTo(canvas.width, pY0);
            ctx.stroke();
            
            const pX0 = toPixelX(0, canvas);
            ctx.beginPath();
            ctx.moveTo(pX0, 0);
            ctx.lineTo(pX0, canvas.height);
            ctx.stroke();
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for (let x = xMin; x <= xMax; x += 1) {
                if (x !== 0) {
                    ctx.fillText(x.toString(), toPixelX(x, canvas), pY0 + 5);
                }
            }
            
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            for (let y = yMin; y <= yMax; y += 1) {
                if (y !== 0) {
                    ctx.fillText(y.toString(), pX0 - 5, toPixelY(y, canvas));
                }
            }
            
            const exprInput = document.getElementById('slope-expr');
            const densityInput = document.getElementById('slope-density');
            const lengthInput = document.getElementById('slope-length');
            const errorBox = document.getElementById('slope-error');
            
            const exprStr = exprInput ? exprInput.value.trim() : "y - x";
            const density = densityInput ? parseInt(densityInput.value) : 20;
            const vectorLength = lengthInput ? parseInt(lengthInput.value) : 7;
            
            if (errorBox) errorBox.style.display = 'none';
            
            let derivativeFn;
            try {
                derivativeFn = getMathFunction(exprStr);
            } catch (err) {
                if (errorBox) {
                    errorBox.innerText = err.message;
                    errorBox.style.display = 'block';
                }
                return;
            }
            
            const dxCartesian = (xMax - xMin) / density;
            const dyCartesian = (yMax - yMin) / density;
            
            for (let i = 0.5; i < density; i++) {
                const x = xMin + i * dxCartesian;
                for (let j = 0.5; j < density; j++) {
                    const y = yMin + j * dyCartesian;
                    
                    let slope = derivativeFn(x, y);
                    if (isNaN(slope) || !isFinite(slope)) continue;
                    
                    const px = toPixelX(x, canvas);
                    const py = toPixelY(y, canvas);
                    
                    const angle = Math.atan(slope);
                    
                    const dxPixel = Math.cos(angle) * (vectorLength / 2);
                    const dyPixel = Math.sin(angle) * (vectorLength / 2);
                    
                    const hue = Math.round(180 + (angle / (Math.PI / 2)) * 80);
                    ctx.strokeStyle = `hsla(${hue}, 85%, 65%, 0.75)`;
                    ctx.lineWidth = 1.5;
                    
                    ctx.beginPath();
                    ctx.moveTo(px - dxPixel, py + dyPixel);
                    ctx.lineTo(px + dxPixel, py - dyPixel);
                    ctx.stroke();
                }
            }
            
            particularCurves.forEach(curve => {
                if (curve.points.length < 2) return;
                
                ctx.strokeStyle = curve.color;
                ctx.lineWidth = 3;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                
                ctx.shadowColor = curve.color;
                ctx.shadowBlur = 8;
                
                ctx.beginPath();
                ctx.moveTo(toPixelX(curve.points[0].x, canvas), toPixelY(curve.points[0].y, canvas));
                for (let idx = 1; idx < curve.points.length; idx++) {
                    ctx.lineTo(toPixelX(curve.points[idx].x, canvas), toPixelY(curve.points[idx].y, canvas));
                }
                ctx.stroke();
                
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(toPixelX(curve.x0, canvas), toPixelY(curve.y0, canvas), 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
            });
        }

        window.generateSlopeField = () => {
            drawSlopeFieldOnCanvas();
        };

        window.resetSlopeField = () => {
            particularCurves = [];
            drawSlopeFieldOnCanvas();
        };

        window.loadSlopePreset = (expr) => {

                chapterMasteryQuizzes.forEach(quiz => {
                    const quizId = quiz.quiz_id;
                    const isPassed = completedQuizzes[quizId] && completedQuizzes[quizId].completed;
                    
                    if (isPassed) {
                        quizBtnHtml += `
                            <div class="quiz-passed-badge" id="passed-badge-${quizId}" style="margin-top: 8px;">
                                <span>✓ Passed: ${quiz.title.split(':')[0]}</span>
                            </div>
                        `;
                    } else {
                        quizBtnHtml += `
                            <button class="quiz-badge-btn" id="quiz-btn-${quizId}" onclick="openQuiz('${quizId}', '${chapter.ch_number}')" style="margin-top: 8px; margin-right: 6px;">
                                🏆 Chapter Mastery Checkpoint
                            </button>
                        `;
                    }
                });
                
                let sidebarQuizStatus = '';
                if (chapterQuizzes.length > 0) {
                    if (passedQuizzesCount === chapterQuizzes.length) {
                        sidebarQuizStatus = ' <span class="sidebar-passed-dot" title="All Quizzes Passed" style="color: #34d399; margin-left: 5px;">✓</span>';
                    } else if (passedQuizzesCount > 0) {
                        sidebarQuizStatus = ' <span class="sidebar-passed-dot" title="Some Quizzes Passed" style="color: #f59e0b; margin-left: 5px;">•</span>';
                    }
                }

                // 1. Generate Sidebar Nav item
                const navItem = document.createElement('li');
                navItem.className = 'filter-item';
                navItem.setAttribute('data-filter', 'chapter-' + chapter.ch_number);
                navItem.innerHTML = `
                    <span>Ch. ${chapter.ch_number} - ${chapter.name.split('.')[1] ? chapter.name.split('.')[1].trim() : chapter.name}${sidebarQuizStatus}</span>
                    <span class="filter-badge">${chapter.videos.length}</span>
                `;
                chaptersNav.appendChild(navItem);

                // 2. Generate Chapter Section block
                const section = document.createElement('section');
                section.className = 'chapter-section';
                section.id = 'chapter-' + chapter.ch_number;
                
                section.innerHTML = `
                    <div class="chapter-header">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
                            <div>
                                <h2 class="chapter-title">${chapter.name}</h2>
                                <div class="chapter-desc">${chapter.description}</div>
                            </div>
                            <div class="chapter-quiz-status" id="quiz-status-container-${chapter.ch_number}">
                                ${quizBtnHtml}
                            </div>
                        </div>
                    </div>
                `;

                const grid = document.createElement('div');
                grid.className = 'video-grid';

                chapter.videos.forEach(video => {
                    const isWatched = watchedVideos.includes(video.id);
                    
                    const card = document.createElement('div');
                    card.className = 'video-card' + (isWatched ? ' watched' : '');
                    card.id = 'card-' + video.id;
                    
                    card.innerHTML = `
                        <div class="thumbnail-container">
                            <label class="card-checkbox-label">
                                <input type="checkbox" class="card-checkbox" data-id="${video.id}" ${isWatched ? 'checked' : ''}>
                            </label>
                            <span class="orig-badge">#${video.orig_index}</span>
                            <img class="thumbnail-img" src="https://img.youtube.com/vi/${video.id}/mqdefault.jpg" alt="Video Thumbnail" loading="lazy">
                        </div>
                        <div class="video-details">
                            <a href="${video.url}" target="_blank" class="video-title-link" title="${video.title}">${video.title}</a>
                            <a href="${video.url}" target="_blank" class="play-btn">Play Video</a>
                        </div>
                    `;
                    grid.appendChild(card);

                    // Check if this video has a mapped Micro-Practice quiz
                    const videoQuiz = Object.values(quizzesData).find(q => q.video_id === video.id && !q.quiz_id.includes('mastery'));
                    if (videoQuiz) {
                        const quizId = videoQuiz.quiz_id;
                        const isPassed = completedQuizzes[quizId] && completedQuizzes[quizId].completed;
                        
                        const quizCard = document.createElement('div');
                        quizCard.className = 'video-card quiz-card-inline' + (isPassed ? ' passed' : '');
                        quizCard.id = 'quiz-card-' + quizId;
                        
                        let cardContent = '';
                        if (isPassed) {
                            cardContent = `
                                <div class="quiz-card-header">
                                    <div class="quiz-card-icon-container">
                                        <span class="quiz-card-icon">✓</span>
                                        <span class="quiz-card-badge">Passed</span>
                                    </div>
                                </div>
                                <div class="video-details">
                                    <span class="video-title-link" style="cursor: default;" title="${videoQuiz.title}">${videoQuiz.title}</span>
                                    <div class="quiz-passed-badge" style="margin-top: 8px; justify-content: center; width: 100%;">
                                        <span>Score: ${completedQuizzes[quizId].score} / ${completedQuizzes[quizId].total}</span>
                                    </div>
                                </div>
                            `;
                        } else {
                            cardContent = `
                                <div class="quiz-card-header">
                                    <div class="quiz-card-icon-container">
                                        <span class="quiz-card-icon">📝</span>
                                        <span class="quiz-card-badge">Micro-Practice</span>
                                    </div>
                                </div>
                                <div class="video-details">
                                    <span class="video-title-link" style="cursor: default;" title="${videoQuiz.title}">${videoQuiz.title}</span>
                                    <button class="play-btn" onclick="openQuiz('${quizId}', '${chapter.ch_number}')">Start Quiz ➜</button>
                                </div>
                            `;
                        }
                        quizCard.innerHTML = cardContent;
                        grid.appendChild(quizCard);
                    }
                });

                section.appendChild(grid);

                if (chapter.ch_number === 1) {
                    const generatorDiv = document.createElement('div');
                    generatorDiv.className = 'glass-panel slope-field-container';
                    generatorDiv.innerHTML = `
                        <div class="chapter-header" style="border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 0.75rem; margin-bottom: 0.5rem;">
                            <h3 class="chapter-title" style="font-size: 1.3rem; display: flex; align-items: center; gap: 8px;">
                                🌀 Interactive Slope Field Generator
                            </h3>
                            <div class="chapter-desc" style="font-size: 0.85rem;">
                                Visualize the geometry of first-order ordinary differential equations $\\frac{dy}{dx} = f(x, y)$ in real-time.
                            </div>
                        </div>
                        
                        <div class="slope-field-layout">
                            <!-- Left Controls -->
                            <div class="slope-controls">
                                <div class="control-group">
                                    <label class="control-label">Differential Equation</label>
                                    <div class="slope-input-wrapper">
                                        <span class="slope-input-prefix">dy/dx =</span>
                                        <input type="text" class="slope-input" id="slope-expr" value="y - x" placeholder="y - x">
                                    </div>
                                    <div class="presets-wrapper">
                                        <span class="preset-pill" onclick="loadSlopePreset('y - x')">y - x</span>
                                        <span class="preset-pill" onclick="loadSlopePreset('x * y')">x * y</span>
                                        <span class="preset-pill" onclick="loadSlopePreset('sin(x)')">sin(x)</span>
                                        <span class="preset-pill" onclick="loadSlopePreset('y * (1 - y)')">y * (1 - y)</span>
                                        <span class="preset-pill" onclick="loadSlopePreset('-x / y')">-x / y</span>
                                        <span class="preset-pill" onclick="loadSlopePreset('x^2 - y')">x^2 - y</span>
                                    </div>
                                </div>
                                
                                <div class="control-group">
                                    <label class="control-label">
                                        Grid Density 
                                        <span class="slider-value" id="density-val">20</span>
                                    </label>
                                    <input type="range" class="slider-control" id="slope-density" min="10" max="30" value="20">
                                </div>
                                
                                <div class="control-group">
                                    <label class="control-label">
                                        Vector Length
                                        <span class="slider-value" id="length-val">7</span>
                                    </label>
                                    <input type="range" class="slider-control" id="slope-length" min="3" max="15" value="7" step="1">
                                </div>
                                
                                <div class="slope-error-box" id="slope-error"></div>
                                
                                <div class="slope-btn-group">
                                    <button class="slope-btn-primary" onclick="generateSlopeField()">
                                        ⚡ Generate Field
                                    </button>
                                    <button class="slope-btn-secondary" onclick="resetSlopeField()">
                                        Clear Curves
                                    </button>
                                </div>
                            </div>
                            
                            <!-- Right Canvas Visualizer -->
                            <div class="slope-visualizer">
                                <div class="canvas-wrapper">
                                    <canvas id="slope-canvas" width="500" height="500"></canvas>
                                </div>
                                <div class="canvas-label-hint">
                                    💡 Click anywhere on the grid to plot particular solution curves (RK4 integration)
                                </div>
                            </div>
                        </div>
                    `;
                    section.appendChild(generatorDiv);
                    
                    // Render Math inside the newly added generatorDiv
                    if (typeof renderMathInElement === 'function') {
                        renderMathInElement(generatorDiv, {
                            delimiters: [
                                {left: "$$", right: "$$", display: true},
                                {left: "$", right: "$", display: false}
                            ]
                        });
                    }
                }

                contentContainer.appendChild(section);
            });

            // Wire up event listeners
            document.querySelectorAll('.card-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    toggleVideoWatch(e.target.getAttribute('data-id'), e.target.checked);
                });
            });

            // Wire up Chapter filters
            document.querySelectorAll('.filter-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    const clickedItem = e.currentTarget;
                    document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
                    clickedItem.classList.add('active');
                    
                    const filter = clickedItem.getAttribute('data-filter');
                    
                    document.querySelectorAll('.chapter-section').forEach(section => {
                        if (filter === 'all' || section.id === filter) {
                            section.style.display = 'flex';
                        } else {
                            section.style.display = 'none';
                        }
                    });
                });
            });

            // Wire up reset button
            resetProgressBtn.addEventListener('click', () => {
                if (confirm('Are you sure you want to reset your study and quiz progress?')) {
                    watchedVideos = [];
                    completedQuizzes = {};
                    localStorage.removeItem('watched_videos');
                    localStorage.removeItem('completed_quizzes');
                    document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = false);
                    document.querySelectorAll('.video-card').forEach(card => card.classList.remove('watched'));
                    
                    // Rebuild entire dashboard to reset quiz buttons and badges
                    location.reload();
                }
            });

            updateProgress();

            // ==========================================
            // SLOPE FIELD DYNAMIC INITIALIZATION
            // ==========================================
            setTimeout(() => {
                const canvas = document.getElementById('slope-canvas');
                if (canvas) {
                    // Canvas click particular solution curve plotting
                    canvas.addEventListener('click', (e) => {
                        const rect = canvas.getBoundingClientRect();
                        const px = e.clientX - rect.left;
                        const py = e.clientY - rect.top;
                        
                        const x0 = toCartesianX(px, canvas);
                        const y0 = toCartesianY(py, canvas);
                        
                        const exprInput = document.getElementById('slope-expr');
                        const exprStr = exprInput ? exprInput.value.trim() : "y - x";
                        
                        try {
                            const derivativeFn = getMathFunction(exprStr);
                            
                            const forwardPoints = integrateRK4(x0, y0, derivativeFn, 1, canvas);
                            const backwardPoints = integrateRK4(x0, y0, derivativeFn, -1, canvas);
                            const mergedPoints = [...backwardPoints.reverse(), ...forwardPoints];
                            
                            const neonColors = ['#06b6d4', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#3b82f6'];
                            const randomColor = neonColors[particularCurves.length % neonColors.length];
                            
                            particularCurves.push({
                                x0: x0,
                                y0: y0,
                                points: mergedPoints,
                                color: randomColor
                            });
                            
                            drawSlopeFieldOnCanvas();
                        } catch (err) {
                            console.error("Error drawing solution curve: ", err);
                        }
                    });

                    // Grid Density range slider change listener
                    const densitySlider = document.getElementById('slope-density');
                    const densityVal = document.getElementById('density-val');
                    if (densitySlider && densityVal) {
                        densitySlider.addEventListener('input', (e) => {
                            densityVal.innerText = e.target.value;
                            generateSlopeField();
                        });
                    }
                    
                    // Vector Length range slider change listener
                    const lengthSlider = document.getElementById('slope-length');
                    const lengthVal = document.getElementById('length-val');
                    if (lengthSlider && lengthVal) {
                        lengthSlider.addEventListener('input', (e) => {
                            lengthVal.innerText = e.target.value;
                            generateSlopeField();
                        });
                    }

                    // Render the initial field with y - x preset
                    generateSlopeField();
                }
            }, 100);
        }

        // ==========================================
        // CHECKPOINT QUIZ ENGINE
        // ==========================================
        let currentQuiz = null;
        let currentQuizChapter = null;
        let currentQuestionIdx = 0;
        let selectedOptionIdx = null;
        let score = 0;
        let isAnswerSubmitted = false;

        const modalOverlay = document.getElementById('quiz-modal-container');
        const quizContentArea = document.getElementById('quiz-content-area');

        function openQuiz(quizId, chapterNum) {
            currentQuiz = quizzesData[quizId];
            currentQuizChapter = chapterNum;
            if (!currentQuiz) return;

            currentQuestionIdx = 0;
            score = 0;
            selectedOptionIdx = null;
            isAnswerSubmitted = false;

            modalOverlay.classList.add('active');
            renderQuestion();
        }

        function closeQuiz() {
            modalOverlay.classList.remove('active');
        }

        function renderQuestion() {
            selectedOptionIdx = null;
            isAnswerSubmitted = false;

            const q = currentQuiz.questions[currentQuestionIdx];
            const totalQuestions = currentQuiz.questions.length;
            const progressPercent = Math.round(((currentQuestionIdx) / totalQuestions) * 100);

            let optionsHtml = '';
            q.answerOptions.forEach((option, idx) => {
                optionsHtml += `
                    <li class="option-card" id="option-${idx}" onclick="selectOption(${idx})">
                        <span class="option-radio" id="radio-${idx}"></span>
                        <span class="option-text-span">${option.text}</span>
                    </li>
                `;
            });

            quizContentArea.innerHTML = `
                <div class="quiz-header">
                    <div class="quiz-title">${currentQuiz.title}</div>
                    <div class="quiz-progress-container">
                        <span>Question ${currentQuestionIdx + 1} of ${totalQuestions}</span>
                        <span>Score: ${score} / ${totalQuestions}</span>
                    </div>
                    <div class="quiz-progress-bar-bg">
                        <div class="quiz-progress-bar-fill" style="width: ${progressPercent}%"></div>
                    </div>
                </div>

                <div class="question-text">${q.question}</div>

                <div class="hint-box" id="hint-box-el">${q.hint}</div>

                <ul class="options-list">
                    ${optionsHtml}
                </ul>

                <div class="feedback-container" id="feedback-box">
                    <div class="feedback-title" id="feedback-title"></div>
                    <div class="feedback-text" id="feedback-text"></div>
                </div>

                <div class="quiz-actions">
                    <button class="quiz-btn-secondary" id="hint-btn" onclick="toggleHint()">💡 Show Hint</button>
                    <button class="quiz-btn-primary" id="submit-btn" onclick="submitAnswer()" disabled>
                        Submit Answer ➜
                    </button>
                </div>
            `;

            // LaTeX rendering
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(quizContentArea, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false}
                    ]
                });
            }
        }

        function selectOption(optIdx) {
            if (isAnswerSubmitted) return;

            selectedOptionIdx = optIdx;

            // Update UI selection classes
            document.querySelectorAll('.option-card').forEach((card, idx) => {
                if (idx === optIdx) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.removeAttribute('disabled');
        }

        function toggleHint() {
            const hintBox = document.getElementById('hint-box-el');
            const hintBtn = document.getElementById('hint-btn');
            
            if (hintBox.style.display === 'block') {
                hintBox.style.display = 'none';
                hintBtn.innerText = '💡 Show Hint';
            } else {
                hintBox.style.display = 'block';
                hintBtn.innerText = '💡 Hide Hint';
            }
        }

        function submitAnswer() {
            if (isAnswerSubmitted || selectedOptionIdx === null) return;

            isAnswerSubmitted = true;

            const q = currentQuiz.questions[currentQuestionIdx];
            const selectedOpt = q.answerOptions[selectedOptionIdx];
            const isCorrect = selectedOpt.isCorrect;

            const feedbackBox = document.getElementById('feedback-box');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackText = document.getElementById('feedback-text');
            const submitBtn = document.getElementById('submit-btn');

            // Apply styling
            document.querySelectorAll('.option-card').forEach((card, idx) => {
                const opt = q.answerOptions[idx];
                if (opt.isCorrect) {
                    card.classList.add('correct');
                } else if (idx === selectedOptionIdx) {
                    card.classList.add('incorrect');
                }
                card.style.cursor = 'default';
            });

            if (isCorrect) {
                score++;
                feedbackTitle.className = 'feedback-title correct';
                feedbackTitle.innerHTML = '🎉 Correct!';
                feedbackText.innerHTML = selectedOpt.rationale;
            } else {
                feedbackTitle.className = 'feedback-title incorrect';
                feedbackTitle.innerHTML = '❌ Incorrect';
                feedbackText.innerHTML = selectedOpt.rationale;
            }

            feedbackBox.style.display = 'block';

            // Render Math in feedback/rationale box dynamically
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(feedbackBox, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false}
                    ]
                });
            }

            const isLastQuestion = currentQuestionIdx === currentQuiz.questions.length - 1;
            if (isLastQuestion) {
                submitBtn.innerText = 'View Results 🏆';
            } else {
                submitBtn.innerText = 'Next Question ➜';
            }

            submitBtn.onclick = function() {
                if (isLastQuestion) {
                    showResults();
                } else {
                    currentQuestionIdx++;
                    renderQuestion();
                }
            };
        }

        function showResults() {
            const totalQuestions = currentQuiz.questions.length;
            const passed = score >= Math.ceil(totalQuestions * 0.6); // 60% passing score
            
            let message = '';
            if (score === totalQuestions) {
                message = 'Perfect score! You are a master of Ordinary Differential Equations foundations!';
            } else if (passed) {
                message = 'Great job! You have verified your mathematical foundations and are ready for the next level!';
            } else {
                message = 'Study the concept explanations, check out the foundational chapters, and try again!';
            }

            quizContentArea.innerHTML = `
                <div class="results-container" style="display: block;">
                    <div class="results-score-circle">
                        <span class="results-score-num">${score}/${totalQuestions}</span>
                        <span class="results-score-label">Score</span>
                    </div>

                    <h2 class="results-heading">${passed ? 'Syllabus Checkpoint Verified! 🎓' : 'Keep Practicing! 📚'}</h2>
                    <p class="results-sub">${message}</p>

                    <div class="quiz-actions" style="justify-content: center;">
                        <button class="quiz-btn-secondary" onclick="openQuiz('${currentQuiz.quiz_id}', '${currentQuizChapter}')">Retry Quiz 🔄</button>
                        <button class="quiz-btn-primary" onclick="closeQuiz()">Back to Study Guide</button>
                    </div>
                </div>
            `;

            if (passed) {
                // Save progress
                completedQuizzes[currentQuiz.quiz_id] = {
                    completed: true,
                    score: score,
                    total: totalQuestions
                };
                localStorage.setItem('completed_quizzes', JSON.stringify(completedQuizzes));

                // Update Chapter Header UI
                const statusContainer = document.getElementById('quiz-status-container-' + currentQuizChapter);
                if (statusContainer) {
                    statusContainer.innerHTML = `
                        <div class="quiz-passed-badge" id="passed-badge-${currentQuiz.quiz_id}">
                            <span>✓ Passed Checkpoint</span>
                        </div>
                    `;
                }

                // Reload navigation or badge in sidebar
                location.reload();
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', buildDashboard);
    </script>
</body>
</html>
