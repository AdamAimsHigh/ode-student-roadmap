 \\frac{\\partial N}{\\partial x}$", "rationale": "This is the correct condition for an exact differential equation. It implies the existence of a potential function $\\Psi(x, y)$ such that $\\frac{\\partial \\Psi}{\\partial x} = M$ and $\\frac{\\partial \\Psi}{\\partial y} = N$.", "isCorrect": false}, {"text": "If $\\frac{\\partial M}{\\partial x} = \\frac{\\partial N}{\\partial y}$", "rationale": "This condition is not the defining characteristic of an exact differential equation. It relates to the symmetry of second partial derivatives if M and N were themselves partial derivatives of some function, but not directly to exactness in this form.", "isCorrect": false}, {"text": "If $\\frac{\\partial M}{\\partial y} = -\\frac{\\partial N}{\\partial x}$", "rationale": "This condition represents a relationship that is not the standard criterion for exactness. The signs must match for the equation to be exact.", "isCorrect": false}, {"text": "If $\\frac{\\partial M}{\\partial x} = -\\frac{\\partial N}{\\partial y}$", "rationale": "This condition is also incorrect. The condition for exactness involves the partial derivative of M with respect to y and N with respect to x.", "isCorrect": false}], "hint": "Recall the condition derived from the requirement that the differential equation can be expressed as the total differential of a function $\\Psi(x, y)$."}, {"questionNumber": 2, "question": "Given the differential equation $(2xy + y^2)dx + (x^2 + 2xy)dy = 0$. Determine if this equation is exact.", "answerOptions": [{"text": "Yes, because $\\frac{\\partial M}{\\partial y} = 2x + 2y$ and $\\frac{\\partial N}{\\partial x} = 2x + 2y$.", "rationale": "This is the correct answer. We identify $M(x, y) = 2xy + y^2$ and $N(x, y) = x^2 + 2xy$. Calculating the partial derivatives, we find $\\frac{\\partial M}{\\partial y} = 2x + 2y$ and $\\frac{\\partial N}{\\partial x} = 2x + 2y$. Since $\\frac{\\partial M}{\\partial y} = \\frac{\\partial N}{\\partial x}$, the equation is exact.", "isCorrect": true}, {"text": "No, because $\\frac{\\partial M}{\\partial x} = 2y$ and $\\frac{\\partial N}{\\partial y} = 2x$.", "rationale": "This is incorrect. While these partial derivatives are calculated correctly, they are not the ones that determine exactness. The test for exactness compares $\\frac{\\partial M}{\\partial y}$ with $\\frac{\\partial N}{\\partial x}$.", "isCorrect": false}, {"text": "Yes, because $\\frac{\\partial M}{\\partial x} = \\frac{\\partial N}{\\partial y}$.", "rationale": "This is incorrect. The condition for exactness is $\\frac{\\partial M}{\\partial y} = \\frac{\\partial N}{\\partial x}$. Comparing $\\frac{\\partial M}{\\partial x}$ and $\\frac{\\partial N}{\\partial y}$ is not the correct test.", "isCorrect": false}, {"text": "No, because $M$ and $N$ are not homogeneous functions.", "rationale": "The homogeneity of $M$ and $N$ is not the criterion for determining if a differential equation is exact.", "isCorrect": false}], "hint": "Identify $M(x, y)$ and $N(x, y)$ from the given equation and compute their respective partial derivatives with respect to $y$ and $x$."}, {"questionNumber": 3, "question": "If a differential equation $M(x, y)dx + N(x, y)dy = 0$ is exact, its general solution can be found by determining a function $\\Psi(x, y)$ such that $M = \\frac{\\partial \\Psi}{\\partial x}$ and $N = \\frac{\\partial \\Psi}{\\partial y}$. The solution is then given by:", "answerOptions": [{"text": "$\\Psi(x, y) = C$, where C is an arbitrary constant.", "rationale": "This is the correct form of the general solution for an exact differential equation. The existence of $\\Psi(x, y)$ satisfying the partial differential equations implies that $d\\Psi = Mdx + Ndy = 0$, and integrating this gives $\\Psi(x, y) = C$.", "isCorrect": true}, {"text": "$y = \\Psi(x) + C$.", "rationale": "This form of solution is not general for exact differential equations. The solution $\\Psi$ is typically a function of both $x$ and $y$.", "isCorrect": false}, {"text": "$x = \\Psi(y) + C$.", "rationale": "Similar to the previous option, this form is not the general solution for an exact differential equation where $\\Psi$ can depend on both $x$ and $y$.", "isCorrect": false}, {"text": "$\\int M dx + \\int N dy = C$.", "rationale": "This is incorrect. While integration is involved, simply summing the independent integrals of $M$ and $N$ does not generally yield the correct potential function $\\Psi(x, y)$ for an exact equation.", "isCorrect": false}], "hint": "Think about what the total differential $d\\Psi$ represents in relation to the given differential equation $Mdx + Ndy = 0$."}, {"questionNumber": 4, "question": "Find the potential function $\\Psi(x, y)$ for the exact differential equation $(2xy)dx + (x^2 + 3y^2)dy = 0$.", "answerOptions": [{"text": "$\\Psi(x, y) = x^2y + y^3$", "rationale": "This is correct. We have $M = 2xy$ and $N = x^2 + 3y^2$. First, $\\int M dx = \\int 2xydx = x^2y + h(y)$. Then, $\\frac{\\partial \\Psi}{\\partial y} = x^2 + h'(y)$. Equating this to $N$, we get $x^2 + h'(y) = x^2 + 3y^2$, so $h'(y) = 3y^2$, which integrates to $h(y) = y^3$. Thus, $\\Psi(x, y) = x^2y + y^3$.", "isCorrect": true}, {"text": "$\\Psi(x, y) = x^2y + x^3$", "rationale": "This is incorrect. If $\\Psi(x, y) = x^2y + x^3$, then $\\frac{\\partial \\Psi}{\\partial x} = 2xy + 3x^2$, which does not match $M=2xy$.", "isCorrect": false}, {"text": "$\\Psi(x, y) = x^2y + y^2$", "rationale": "This is incorrect. If $\\Psi(x, y) = x^2y + y^2$, then $\\frac{\\partial \\Psi}{\\partial y} = x^2 + 2y$, which does not match $N = x^2 + 3y^2$.", "isCorrect": false}, {"text": "$\\Psi(x, y) = xy^2 + y^3$", "rationale": "This is incorrect. If $\\Psi(x, y) = xy^2 + y^3$, then $\\frac{\\partial \\Psi}{\\partial x} = y^2$, which does not match $M=2xy$.", "isCorrect": false}], "hint": "Integrate $M$ with respect to $x$, treating $y$ as a constant, to find a preliminary form of $\\Psi$. Then, differentiate this form with respect to $y$ and equate it to $N$ to solve for the unknown function of $y$."}, {"questionNumber": 5, "question": "What is the general solution to the exact differential equation $(2xy)dx + (x^2 + 3y^2)dy = 0$?", "answerOptions": [{"text": "$x^2y + y^3 = C$", "rationale": "This is the correct general solution. From the previous question, we found the potential function to be $\\Psi(x, y) = x^2y + y^3$. For an exact differential equation, the general solution is given by $\\Psi(x, y) = C$.", "isCorrect": true}, {"text": "$x^2y + xy^2 = C$", "rationale": "This is incorrect. This potential function does not satisfy the conditions for $M$ and $N$. Specifically, if $\\Psi = x^2y + xy^2$, then $N = \\frac{\\partial \\Psi}{\\partial y} = x^2 + 2xy$, which does not match the given $N = x^2 + 3y^2$.", "isCorrect": false}, {"text": "$xy^2 + x^3 = C$", "rationale": "This is incorrect. If $\\Psi = xy^2 + x^3$, then $M = \\frac{\\partial \\Psi}{\\partial x} = y^2 + 3x^2$, which does not match the given $M = 2xy$.", "isCorrect": false}, {"text": "$y^2x + y^3 = C$", "rationale": "This is incorrect. If $\\Psi = y^2x + y^3$, then $M = \\frac{\\partial \\Psi}{\\partial x} = y^2$, which does not match the given $M = 2xy$.", "isCorrect": false}], "hint": "First, verify that the differential equation is exact. Then, find the potential function $\\Psi(x, y)$ and set it equal to an arbitrary constant $C$."}]}, "inline_ghjOS7Q82s0_definitions": {"quiz_id": "inline_ghjOS7Q82s0_definitions", "chapter_number": 1, "video_id": "ghjOS7Q82s0", "title": "Micro-Practice: Overview of Differential Equations", "questions": [{"questionNumber": 1, "question": "Which of the following statements best defines an Ordinary Differential Equation (ODE)?", "answerOptions": [{"text": "An equation relating an independent variable to its derivative.", "rationale": "This definition is incomplete. An ODE relates an unknown function of a single independent variable to its derivatives, not just the independent variable itself to its derivative.", "isCorrect": false}, {"text": "An equation involving an unknown function of a single independent variable and its derivatives.", "rationale": "This correctly defines an Ordinary Differential Equation (ODE), distinguishing it from Partial Differential Equations (PDEs) by specifying a 'single independent variable'.", "isCorrect": true}, {"text": "An equation that only contains derivatives with respect to multiple independent variables.", "rationale": "This describes a Partial Differential Equation (PDE), not an Ordinary Differential Equation (ODE). ODEs involve derivatives with respect to only one independent variable.", "isCorrect": false}, {"text": "An algebraic equation that must be solved using calculus.", "rationale": "A differential equation is fundamentally distinct from an algebraic equation; it involves derivatives of an unknown function, not just powers of unknown variables.", "isCorrect": false}], "hint": "Consider the meaning of 'Ordinary' in the context of differential equations and how it restricts the number of independent variables."}, {"questionNumber": 2, "question": "Consider the equation $$\\frac{\\partial^2 u}{\\partial x^2} + \\frac{\\partial^2 u}{\\partial y^2} = 0$$. This is an example of a:", "answerOptions": [{"text": "Ordinary Differential Equation (ODE).", "rationale": "This is incorrect. The presence of partial derivatives ($\\frac{\\partial}{\\partial x}$ and $\\frac{\\partial}{\\partial y}$) indicates that there are multiple independent variables ($x$ and $y$), which defines a PDE, not an ODE.", "isCorrect": false}, {"text": "Partial Differential Equation (PDE).", "rationale": "This is correct. The equation involves partial derivatives with respect to two different independent variables ($x$ and $y$), which is the defining characteristic of a Partial Differential Equation.", "isCorrect": true}, {"text": "System of Algebraic Equations.", "rationale": "This is incorrect. The equation contains derivative terms, making it a differential equation, not an algebraic one.", "isCorrect": false}, {"text": "Integral Equation.", "rationale": "This is incorrect. An integral equation involves an unknown function appearing under an integral sign. This equation clearly involves derivatives.", "isCorrect": false}], "hint": "Pay close attention to the notation for the derivatives. Ordinary derivatives are denoted by 'd', while partial derivatives are denoted by '\\partial'."}, {"questionNumber": 3, "question": "What is the order of the differential equation $$\\frac{d^3y}{dt^3} + t^2 \\frac{dy}{dt} - 5y = \\cos(t)$$?", "answerOptions": [{"text": "1", "rationale": "The first derivative, $\\frac{dy}{dt}$, is present, but it is not the highest order derivative in the equation.", "isCorrect": false}, {"text": "2", "rationale": "There is no second derivative in the equation, and the highest order is clearly greater than 2.", "isCorrect": false}, {"text": "3", "rationale": "The highest derivative present in the equation is the third derivative, $\\frac{d^3y}{dt^3}$. Therefore, the order of the differential equation is 3.", "isCorrect": true}, {"text": "4", "rationale": "There is no fourth derivative in the equation. The highest order derivative is 3.", "isCorrect": false}], "hint": "The order of a differential equation is determined by the highest order derivative appearing in the equation."}, {"questionNumber": 4, "question": "Which of the following differential equations is non-linear?", "answerOptions": [{"text": "$$\\frac{d^2y}{dx^2} + x^2 y = e^x$$", "rationale": "This equation is linear because the dependent variable $y$ and its derivatives ($y''$) appear only to the first power, and their coefficients ($1$ and $x^2$) depend only on the independent variable $x$.", "isCorrect": false}, {"text": "$$\\frac{dy}{dx} + \\sin(x) y = 0$$", "rationale": "This equation is linear because the dependent variable $y$ and its derivative ($y'$) appear only to the first power, and their coefficients ($1$ and $\\sin(x)$) depend only on the independent variable $x$.", "isCorrect": false}, {"text": "$$\\frac{dy}{dx} + y^2 = 0$$", "rationale": "This equation is non-linear because the dependent variable $y$ is raised to the second power ($y^2$). For a DE to be linear, $y$ and all its derivatives must appear only to the first power.", "isCorrect": true}, {"text": "$$\\frac{d^3y}{dt^3} + 5t \\frac{dy}{dt} + 2y = \\tan(t)$$", "rationale": "This equation is linear because the dependent variable $y$ and its derivatives ($y'''$, $y'$) appear only to the first power, and their coefficients ($1$, $5t$, and $2$) depend only on the independent variable $t$.", "isCorrect": false}], "hint": "A differential equation is linear if the dependent variable and all its derivatives appear to the first power only, and their coefficients depend solely on the independent variable."}, {"questionNumber": 5, "question": "Which function is a solution to the differential equation $$\\frac{dy}{dx} = 2y$$?", "answerOptions": [{"text": "$$y(x) = x^2$$", "rationale": "If $y(x) = x^2$, then $\\frac{dy}{dx} = 2x$. Substituting into the DE gives $2x = 2(x^2)$, which simplifies to $x = x^2$. This is not true for all $x$, so $y(x)=x^2$ is not a solution.", "isCorrect": false}, {"text": "$$y(x) = e^{2x}$$", "rationale": "If $y(x) = e^{2x}$, then $\\frac{dy}{dx} = 2e^{2x}$. Substituting into the DE gives $2e^{2x} = 2(e^{2x})$, which is true for all $x$. Thus, $y(x)=e^{2x}$ is a solution.", "isCorrect": true}, {"text": "$$y(x) = \\sin(2x)$$", "rationale": "If $y(x) = \\sin(2x)$, then $\\frac{dy}{dx} = 2\\cos(2x)$. Substituting into the DE gives $2\\cos(2x) = 2(\\sin(2x))$, which simplifies to $\\cos(2x) = \\sin(2x)$. This is not true for all $x$, so $y(x)=\\sin(2x)$ is not a solution.", "isCorrect": false}, {"text": "$$y(x) = C$$ (where $C$ is a constant)", "rationale": "If $y(x) = C$, then $\\frac{dy}{dx} = 0$. Substituting into the DE gives $0 = 2C$, which implies $C=0$. While $y(x)=0$ is a solution, this option suggests any constant $C$ would work, which is false.", "isCorrect": false}], "hint": "To verify if a function is a solution, substitute the function and its derivative(s) into the differential equation and check if the equality holds true."}]}, "inline_f0BxAtprWts_definitions": {"quiz_id": "inline_f0BxAtprWts_definitions", "chapter_number": 1, "video_id": "f0BxAtprWts", "title": "Micro-Practice: Fundamental Calculus Concepts", "questions": [{"questionNumber": 1, "question": "What is the fundamental theorem of calculus, Part 1, which relates differentiation and integration?", "answerOptions": [{"text": "It states that $\\int_{a}^{b} f(x) dx = F(b) - F(a)$, where $F'(x) = f(x)$.", "rationale": "This is the statement of the Fundamental Theorem of Calculus, Part 2. Part 1 has a different focus.", "isCorrect": false}, {"text": "It states that $\\frac{d}{dx} \\left( \\int_{a}^{x} f(t) dt \\right) = f(x)$.", "rationale": "This is the correct statement of the Fundamental Theorem of Calculus, Part 1. It asserts that the derivative of an integral with a variable upper limit is the integrand itself.", "isCorrect": true}, {"text": "It states that the derivative of a function represents the slope of the tangent line at any point.", "rationale": "This is a definition of the derivative, not the Fundamental Theorem of Calculus, Part 1.", "isCorrect": false}, {"text": "It states that the definite integral of a function represents the area under the curve.", "rationale": "This is a geometric interpretation of the definite integral, not the Fundamental Theorem of Calculus, Part 1.", "isCorrect": false}], "hint": "Recall the theorem that connects the derivative of an integral function to the original function."}, {"questionNumber": 2, "question": "Consider the function $f(x) = x^2$. What is its antiderivative $F(x)$ that satisfies $F(0) = 3$?", "answerOptions": [{"text": "$F(x) = \\frac{x^3}{3}$", "rationale": "This is a correct antiderivative, but it does not satisfy the initial condition $F(0)=3$. Its value at $x=0$ is 0.", "isCorrect": false}, {"text": "$F(x) = 2x$", "rationale": "This is the derivative of $f(x)$, not an antiderivative.", "isCorrect": false}, {"text": "$F(x) = \\frac{x^3}{3} + 3$", "rationale": "The derivative of $\\frac{x^3}{3} + 3$ is $x^2$. Also, $F(0) = \\frac{0^3}{3} + 3 = 3$, satisfying the initial condition.", "isCorrect": true}, {"text": "$F(x) = x^3$", "rationale": "The derivative of $x^3$ is $3x^2$, not $x^2$. Therefore, it is not an antiderivative.", "isCorrect": false}], "hint": "An antiderivative is a function whose derivative is the given function. Remember to include the constant of integration and use the initial condition to find its value."}, {"questionNumber": 3, "question": "Which of the following represents the definition of the derivative of a function $f(x)$ at a point $a$?", "answerOptions": [{"text": "$f'(a) = \\lim_{h \\to 0} \\frac{f(a) - f(a+h)}{h}$", "rationale": "The numerator should represent the change in $f(x)$, i.e., $f(a+h) - f(a)$, not $f(a) - f(a+h)$.", "isCorrect": false}, {"text": "$f'(a) = \\lim_{h \\to 0} \\frac{f(a+h) - f(a)}{h}$", "rationale": "This is the correct limit definition of the derivative of $f(x)$ at the point $x=a$. It represents the instantaneous rate of change.", "isCorrect": true}, {"text": "$f'(a) = \\lim_{x \\to a} \\frac{f(x) - f(a)}{x-a}$", "rationale": "While this is also a correct definition of the derivative at a point, the question asks for the definition using the limit as $h \to 0$. This form is equivalent but not the one commonly emphasized in introductory calculus for the limit definition.", "isCorrect": false}, {"text": "$f'(a) = \\lim_{h \\to \\infty} \\frac{f(a+h) - f(a)}{h}$", "rationale": "The limit for the derivative is taken as $h$ approaches 0, not infinity, to find the instantaneous rate of change.", "isCorrect": false}], "hint": "Think about the limit that represents the instantaneous slope of the tangent line to the function's graph."}, {"questionNumber": 4, "question": "What is the indefinite integral of $f(x) = \\cos(x)$?", "answerOptions": [{"text": "$-\\sin(x) + C$", "rationale": "The derivative of $-\\sin(x) + C$ is $-\\cos(x)$, not $\\cos(x)$.", "isCorrect": false}, {"text": "$\\sin(x) + C$", "rationale": "The derivative of $\\sin(x) + C$ is $\\cos(x)$. Thus, $\\sin(x) + C$ is the correct indefinite integral.", "isCorrect": true}, {"text": "$-\\cos(x) + C$", "rationale": "The derivative of $-\\cos(x) + C$ is $\\sin(x)$, not $\\cos(x)$.", "isCorrect": false}, {"text": "$\\cos(x) + C$", "rationale": "The derivative of $\\cos(x) + C$ is $-\\sin(x)$, not $\\cos(x)$.", "isCorrect": false}], "hint": "Recall the differentiation rules for trigonometric functions. Integration is the reverse process of differentiation."}, {"questionNumber": 5, "question": "Which of the following is an application of integration?", "answerOptions": [{"text": "Finding the instantaneous rate of change of a quantity.", "rationale": "Finding the instantaneous rate of change is an application of differentiation, not integration.", "isCorrect": false}, {"text": "Determining the slope of a tangent line to a curve.", "rationale": "Determining the slope of a tangent line is a core concept of differentiation.", "isCorrect": false}, {"text": "Calculating the area under a curve between two points.", "rationale": "Calculating the area under a curve is a fundamental application of definite integration.", "isCorrect": true}, {"text": "Finding the maximum or minimum value of a function.", "rationale": "Finding extrema typically involves differentiation (finding critical points) and then potentially using the second derivative test.", "isCorrect": false}], "hint": "Consider what geometric or physical quantities can be accumulated or summed up using calculus."}]}, "inline_CB9I4mwpQ5E_definitions": {"quiz_id": "inline_CB9I4mwpQ5E_definitions", "chapter_number": 7, "video_id": "CB9I4mwpQ5E", "title": "Micro-Practice: Response to Exponential Input", "questions": [{"questionNumber": 1, "question": "Consider the first-order linear ordinary differential equation with constant coefficients: $$\\frac{dy}{dt} + a y = B e^{s t}$$ where $a$ and $B$ are constants, and $s \\neq -a$. According to the Exponential Response Formula (ERF), what is the particular solution $y_p(t)$ to this differential equation?", "answerOptions": [{"text": "$y_p(t) = \\frac{B e^{s t}}{s + a}$", "rationale": "By substituting the trial solution $y_p(t) = Y e^{s t}$ into the ODE, we obtain $Y s e^{s t} + a Y e^{s t} = B e^{s t}$. Factoring out $e^{s t}$ yields $Y(s + a) = B$. Since $s \\neq -a$, we can divide by $s+a$ to find $Y = \\frac{B}{s+a}$, resulting in $y_p(t) = \\frac{B e^{s t}}{s+a}$.", "isCorrect": true}, {"text": "$y_p(t) = \\frac{B e^{s t}}{s - a}$", "rationale": "This option incorrectly features a subtraction in the denominator. The characteristic polynomial for the differential operator $p(D) = D + a$ evaluated at $s$ is $p(s) = s + a$, not $s - a$.", "isCorrect": false}, {"text": "$y_p(t) = B (s + a) e^{s t}$", "rationale": "This option multiplies by the characteristic polynomial $p(s) = s + a$ instead of dividing by it.", "isCorrect": false}, {"text": "$y_p(t) = B t e^{s t}$", "rationale": "This is the form used for the resonant case where $s = -a$. Since we are given $s \\neq -a$, the standard non-resonant ERF applies and no extra factor of $t$ is needed.", "isCorrect": false}], "hint": "Represent the left-hand side using the differential operator $p(D) = D + a$. The Exponential Response Formula states that if $p(s) \\neq 0$, then a particular solution to $p(D)y = B e^{s t}$ is given by $y_p(t) = \\frac{B e^{s t}}{p(s)}$."}, {"questionNumber": 2, "question": "Find a particular solution $y_p(t)$ to the first-order differential equation: $$\\frac{dy}{dt} + 3y = 6 e^{-3t}$$", "answerOptions": [{"text": "$y_p(t) = 6 t e^{-3t}$", "rationale": "Here, the input exponent is $s = -3$, which is a root of the characteristic polynomial $p(D) = D + 3$ (since $p(-3) = -3 + 3 = 0$). This is the resonant case. Using the generalized ERF, $y_p(t) = \\frac{6 e^{s t}}{p'(s)} t$. Since $p'(D) = 1$, we get $y_p(t) = \\frac{6 e^{-3t}}{1} t = 6 t e^{-3t}$.", "isCorrect": true}, {"text": "$y_p(t) = 2 t^2 e^{-3t}$", "rationale": "This option assumes a second-order root resonance (multiplicity 2), but the characteristic equation $r + 3 = 0$ has $r = -3$ as a simple root (multiplicity 1). Thus, we only multiply by $t^1$, not $t^2$.", "isCorrect": false}, {"text": "$y_p(t) = 2 e^{-3t}$", "rationale": "This option incorrectly attempts to apply the standard non-resonant ERF, which would result in division by $p(-3) = 0$. Since division by zero is undefined, the standard formula fails and a resonance term containing $t$ must be introduced.", "isCorrect": false}, {"text": "$y_p(t) = -18 t e^{-3t}$", "rationale": "This option incorrectly scales the resonant solution, likely due to a differentiation mistake on the right-hand side rather than dividing by $p'(s) = 1$.", "isCorrect": false}], "hint": "Identify the characteristic polynomial $p(D) = D + 3$ and evaluate it at the input frequency $s = -3$. Since $p(-3) = 0$, use the resonant form of the Exponential Response Formula: $y_p(t) = \\frac{F_0 e^{st}}{p'(s)} t$."}, {"questionNumber": 3, "question": "Determine a particular solution $y_p(t)$ to the second-order ordinary differential equation: $$\\frac{d^2y}{dt^2} + 4\\frac{dy}{dt} + 3y = 8 e^{t}$$", "answerOptions": [{"text": "$y_p(t) = e^{t}$", "rationale": "The characteristic polynomial is $p(D) = D^2 + 4D + 3$. Evaluating at the input exponent $s = 1$ gives $p(1) = 1^2 + 4(1) + 3 = 8$. Since $p(1) \\neq 0$, we apply the ERF: $y_p(t) = \\frac{8 e^{t}}{p(1)} = \\frac{8 e^{t}}{8} = e^{t}$.", "isCorrect": true}, {"text": "$y_p(t) = 8 e^{t}$", "rationale": "This option fails to divide by the characteristic polynomial evaluated at the input frequency, $p(1) = 8$.", "isCorrect": false}, {"text": "$y_p(t) = t e^{t}$", "rationale": "This option assumes resonance. However, $s=1$ is not a root of the characteristic equation $r^2 + 4r + 3 = 0$ (the roots are $r = -1$ and $r = -3$), so no factor of $t$ is warranted.", "isCorrect": false}, {"text": "$y_p(t) = \\frac{1}{3} e^{t}$", "rationale": "This option is obtained by incorrectly evaluating the characteristic polynomial, perhaps by only looking at the constant coefficient $3$ instead of calculating $p(1) = 1 + 4 + 3 = 8$.", "isCorrect": false}], "hint": "Find the characteristic polynomial $p(D) = D^2 + 4D + 3$. Evaluate $p(s)$ at $s = 1$. If $p(1) \\neq 0$, the particular solution is given by $y_p(t) = \\frac{8 e^{1 \\cdot t}}{p(1)}$."}, {"questionNumber": 4, "question": "Using the complexification method and the Exponential Response Formula, find a real-valued particular solution $y_p(t)$ to the equation: $$\\frac{dy}{dt} + y = \\cos(t)$$", "answerOptions": [{"text": "$y_p(t) = \\frac{\\cos(t) + \\sin(t)}{2}$", "rationale": "We complexify the equation to $\\frac{dz}{dt} + z = e^{i t}$, where $y_p = \\text{Re}(z_p)$. Here $p(D) = D + 1$ and $s = i$. Since $p(i) = 1 + i \\neq 0$, the complex particular solution is $z_p(t) = \\frac{e^{it}}{1+i} = \\frac{\\cos(t) + i\\sin(t)}{1+i}$. Multiplying the numerator and denominator by the complex conjugate $1-i$ gives $z_p(t) = \\frac{(1-i)(\\cos(t) + i\\sin(t))}{2} = \\frac{(\\cos(t) + \\sin(t)) + i(\\sin(t) - \\cos(t))}{2}$. Taking the real part yields $y_p(t) = \\frac{\\cos(t) + \\sin(t)}{2}$.", "isCorrect": true}, {"text": "$y_p(t) = \\cos(t) - \\sin(t)$", "rationale": "This option misses the division by the magnitude-squared of the characteristic value $|p(i)|^2 = |1+i|^2 = 2$.", "isCorrect": false}, {"text": "$y_p(t) = \\frac{\\cos(t) - \\sin(t)}{2}$", "rationale": "This option corresponds to the imaginary part of $z_p(t)$ (up to a sign) rather than the real part, or results from an algebraic sign error during complex conjugation.", "isCorrect": false}, {"text": "$y_p(t) = \\sin(t)$", "rationale": "This is a simple trigonometric function that does not satisfy the differential equation because $\\frac{d}{dt}(\\sin(t)) + \\sin(t) = \\cos(t) + \\sin(t) \\neq \\cos(t)$.", "isCorrect": false}], "hint": "Replace the driving force $\\cos(t)$ with the complex exponential $e^{i t}$ to solve the complex ODE $\\frac{dz}{dt} + z = e^{i t}$. After finding $z_p(t)$ using the ERF with $s = i$, extract its real part to find $y_p(t)$."}, {"questionNumber": 5, "question": "Consider the second-order ODE with double-root resonance: $$\\frac{d^2y}{dt^2} - 4\\frac{dy}{dt} + 4y = e^{2t}$$ Determine the particular solution $y_p(t)$ using the resonant Exponential Response Formula.", "answerOptions": [{"text": "$y_p(t) = \\frac{1}{2} t^2 e^{2t}$", "rationale": "The characteristic polynomial is $p(D) = D^2 - 4D + 4 = (D-2)^2$. Here, $s = 2$ is a root of multiplicity $m = 2$. Therefore, $p(2) = 0$ and $p'(2) = 0$. The second derivative is $p''(D) = 2$, so $p''(2) = 2$. The resonant ERF for a root of multiplicity 2 states that $y_p(t) = \\frac{e^{s t}}{p''(s)} t^2$. Substituting $s=2$ yields $y_p(t) = \\frac{e^{2t}}{2} t^2 = \\frac{1}{2} t^2 e^{2t}$.", "isCorrect": true}, {"text": "$y_p(t) = t^2 e^{2t}$", "rationale": "This option fails to divide by $p''(2) = 2$, omitting the scaling factor from the second derivative of the characteristic polynomial.", "isCorrect": false}, {"text": "$y_p(t) = t e^{2t}$", "rationale": "This option assumes a single root of resonance (multiplicity 1). Since $s = 2$ is a double root of the characteristic polynomial, a factor of $t^2$ is required instead of $t$.", "isCorrect": false}, {"text": "$y_p(t) = \\frac{1}{4} e^{2t}$", "rationale": "This option would be correct if $s=2$ were not a root, but since $s=2$ makes the characteristic polynomial zero, this formulation yields division by zero under the standard ERF.", "isCorrect": false}], "hint": "Find the characteristic polynomial $p(D) = (D-2)^2$. Notice that $s = 2$ is a root of multiplicity $m = 2$. For a root of multiplicity $2$, the resonant ERF is given by $y_p(t) = \\frac{e^{st}}{p''(s)} t^2$."}]}, "inline_xw3ccgYhFis_definitions": {"quiz_id": "inline_xw3ccgYhFis_definitions", "chapter_number": 7, "video_id": "xw3ccgYhFis", "title": "Micro-Practice: Response to Oscillating Input", "questions": [{"questionNumber": 1, "question": "Consider the first-order linear differential equation representing a system driven by a sinusoidal input: $$\\frac{dx}{dt} + k x = A \\cos(\\omega t)$$ where $k > 0$ is a constant, and $A, \\omega$ are positive real parameters. What is the amplitude of the steady-state (particular) solution $x_p(t)$?", "answerOptions": [{"text": "$\\frac{A}{\\sqrt{k^2 + \\omega^2}}$", "rationale": "Correct. Using the complexification method, we solve the complexified equation $\\frac{dz}{dt} + k z = A e^{i\\omega t}$ with $z_p(t) = C e^{i\\omega t}$. This yields $C = \\frac{A}{k + i\\omega}$. The amplitude of the real steady-state response is the magnitude $|C| = \\frac{A}{|k + i\\omega|} = \\frac{A}{\\sqrt{k^2 + \\omega^2}}$.", "isCorrect": true}, {"text": "$\\frac{A}{k + \\omega}$", "rationale": "Incorrect. This formula linearizes the denominator incorrectly, neglecting the orthogonal relationship between the real and imaginary components in the complex plane.", "isCorrect": false}, {"text": "$\\frac{A}{k^2 + \\omega^2}$", "rationale": "Incorrect. This is the magnitude squared of the complex denominator (divided into $A$), not the correct amplitude (which requires the square root).", "isCorrect": false}, {"text": "$\\frac{A}{\\sqrt{k^2 - \\omega^2}}$", "rationale": "Incorrect. This expression contains a subtraction under the radical, which is physically and mathematically incorrect for this first-order system.", "isCorrect": false}], "hint": "Complexify the input term to $A e^{i\\omega t}$, find the complex coefficient $C$ of the particular solution $z_p(t) = C e^{i\\omega t}$, and compute its modulus $|C|$."}, {"questionNumber": 2, "question": "For the first-order system $$\\frac{dx}{dt} + k x = B \\cos(\\omega t)$$, the steady-state response can be written in the phase-lag form $x_p(t) = g B \\cos(\\omega t - \\phi)$, where $g$ is the gain and $\\phi$ is the phase lag. What is the correct expression for $\\tan(\\phi)$?", "answerOptions": [{"text": "$\\tan(\\phi) = \\frac{\\omega}{k}$", "rationale": "Correct. The complex particular solution is $z_p(t) = \\frac{B}{k + i\\omega} e^{i\\omega t}$. Writing the denominator in polar form yields $k + i\\omega = \\sqrt{k^2 + \\omega^2} e^{i\\phi}$, where $\\tan(\\phi) = \\frac{\\omega}{k}$. Substituting this back gives $z_p(t) = \\frac{B}{\\sqrt{k^2 + \\omega^2}} e^{i(\\omega t - \\phi)}$, confirming that the phase lag is $\\phi = \\arctan(\\frac{\\omega}{k})$.", "isCorrect": true}, {"text": "$\\tan(\\phi) = \\frac{k}{\\omega}$", "rationale": "Incorrect. This is the cotangent of the phase lag, which incorrectly swaps the imaginary part (frequency $\\omega$) and the real part (system parameter $k$).", "isCorrect": false}, {"text": "$\\tan(\\phi) = -\\frac{\\omega}{k}$", "rationale": "Incorrect. A negative tangent would imply a phase lead rather than a phase lag for a standard stable first-order lag system.", "isCorrect": false}, {"text": "$\\tan(\\phi) = \\frac{\\omega^2}{k^2}$", "rationale": "Incorrect. This represents the square of the correct tangent ratio, which does not match the geometry of the complex number $k + i\\omega$.", "isCorrect": false}], "hint": "Analyze the angle of the complex denominator $k + i\\omega$ in the complex plane, where the real part is on the horizontal axis and the imaginary part is on the vertical axis."}, {"questionNumber": 3, "question": "Consider an undamped second-order system driven by an oscillating force: $$\\frac{d^2x}{dt^2} + \\omega_0^2 x = F_0 \\cos(\\omega t)$$ where the driving frequency $\\omega$ is not equal to the natural frequency $\\omega_0$ ($\\omega \\neq \\omega_0$). What is the steady-state particular solution $x_p(t)$?", "answerOptions": [{"text": "$x_p(t) = \\frac{F_0}{\\omega_0^2 - \\omega^2} \\cos(\\omega t)$", "rationale": "Correct. Substituting the ansatz $x_p(t) = C \\cos(\\omega t)$ into the ODE yields $-\\omega^2 C \\cos(\\omega t) + \\omega_0^2 C \\cos(\\omega t) = F_0 \\cos(\\omega t)$. Factoring out terms gives $C(\\omega_0^2 - \\omega^2) = F_0$, which simplifies to $C = \\frac{F_0}{\\omega_0^2 - \\omega^2}$.", "isCorrect": true}, {"text": "$x_p(t) = \\frac{F_0}{\\omega^2 - \\omega_0^2} \\cos(\\omega t)$", "rationale": "Incorrect. This differs from the correct solution by a sign factor of $-1$, which incorrectly shifts the phase by $\\pi$ radians.", "isCorrect": false}, {"text": "$x_p(t) = \\frac{F_0}{\\omega_0^2 + \\omega^2} \\cos(\\omega t)$", "rationale": "Incorrect. This expression features a plus sign in the denominator, which would only arise in a modified system with a negative restoring force coefficient.", "isCorrect": false}, {"text": "$x_p(t) = \\frac{F_0}{2\\omega_0(\\omega_0 - \\omega)} \\sin(\\omega t)$", "rationale": "Incorrect. This has a sine function instead of a cosine function, and represents a hybrid term that does not satisfy the governing differential equation.", "isCorrect": false}], "hint": "Assume a particular solution of the form $x_p(t) = C \\cos(\\omega t)$ and solve for the constant coefficient $C$ by substitution."}, {"questionNumber": 4, "question": "When the driving frequency matches the natural frequency ($\\omega = \\omega_0$), the undamped system experiences pure resonance: $$\\frac{d^2x}{dt^2} + \\omega_0^2 x = F_0 \\cos(\\omega_0 t)$$. What is the correct form of the particular solution $x_p(t)$?", "answerOptions": [{"text": "$x_p(t) = \\frac{F_0}{2\\omega_0} t \\sin(\\omega_0 t)$", "rationale": "Correct. Using the complexified ODE $z'' + \\omega_0^2 z = F_0 e^{i\\omega_0 t}$, since $i\\omega_0$ is a simple root of the characteristic polynomial, we try $z_p(t) = C t e^{i\\omega_0 t}$. Substituting this in yields $C = \\frac{F_0}{2i\\omega_0} = -i\\frac{F_0}{2\\omega_0}$. Taking the real part of $z_p(t)$ gives $x_p(t) = \\text{Re}\\left(-i\\frac{F_0}{2\\omega_0} t (\\cos(\\omega_0 t) + i\\sin(\\omega_0 t))\\right) = \\frac{F_0}{2\\omega_0} t \\sin(\\omega_0 t)$.", "isCorrect": true}, {"text": "$x_p(t) = -\\frac{F_0}{2\\omega_0} t \\cos(\\omega_0 t)$", "rationale": "Incorrect. This would be the solution if the input force were a sine wave ($F_0 \\sin(\\omega_0 t)$) instead of a cosine wave.", "isCorrect": false}, {"text": "$x_p(t) = \\frac{F_0}{2\\omega_0} t^2 \\cos(\\omega_0 t)$", "rationale": "Incorrect. The envelope factor grows linearly with $t$ (not $t^2$) because the root of the characteristic polynomial has multiplicity 1.", "isCorrect": false}, {"text": "$x_p(t) = \\frac{F_0}{\\omega_0^2} t \\sin(\\omega_0 t)$", "rationale": "Incorrect. This expression contains the wrong denominator factor of $\\omega_0^2$ instead of $2\\omega_0$.", "isCorrect": false}], "hint": "Under resonant conditions, the trial solution must be multiplied by $t$. Try the complex trial function $z_p(t) = C t e^{i\\omega_0 t}$ and extract the real part."}, {"questionNumber": 5, "question": "In a first-order system with time constant $\\tau > 0$ modeled by $$\\tau \\frac{dy}{dt} + y = A e^{i\\omega t}$$, the complex gain $G(i\\omega)$ is defined as the ratio of the steady-state output response to the input signal. What is the correct expression for $G(i\\omega)$?", "answerOptions": [{"text": "$G(i\\omega) = \\frac{1}{1 + i\\omega\\tau}$", "rationale": "Correct. Substituting the steady-state ansatz $y_p(t) = G(i\\omega) A e^{i\\omega t}$ into the ODE yields $\\tau (i\\omega) G(i\\omega) A e^{i\\omega t} + G(i\\omega) A e^{i\\omega t} = A e^{i\\omega t}$. Dividing by $A e^{i\\omega t}$ gives $G(i\\omega)(i\\omega\\tau + 1) = 1$, which simplifies to $G(i\\omega) = \\frac{1}{1 + i\\omega\\tau}$.", "isCorrect": true}, {"text": "$G(i\\omega) = \\frac{1}{\\tau + i\\omega}$", "rationale": "Incorrect. This expression assumes $\\tau$ scales the algebraic term rather than the derivative term, violating the structure of the ODE.", "isCorrect": false}, {"text": "$G(i\\omega) = \\frac{1}{1 - i\\omega\\tau}$", "rationale": "Incorrect. This corresponds to a time-reversed system or one with a negative time constant, indicating an unstable growth instead of stable delay.", "isCorrect": false}, {"text": "$G(i\\omega) = \\frac{i\\omega}{1 + i\\omega\\tau}$", "rationale": "Incorrect. This represents a high-pass filter response, which would correspond to a derivative output rather than the direct low-pass response $y(t)$.", "isCorrect": false}], "hint": "Assume $y_p(t) = G(i\\omega) A e^{i\\omega t}$ and substitute this directly into the differential equation, taking the derivative with respect to time."}]}, "inline_0r2L3wTqkBc_definitions": {"quiz_id": "inline_0r2L3wTqkBc_definitions", "chapter_number": 7, "video_id": "0r2L3wTqkBc", "title": "Micro-Practice: Solutions for Any Input in ODEs", "questions": [{"questionNumber": 1, "question": "Consider a linear, non-homogeneous ordinary differential equation of the form $a_n(x)\\frac{d^ny}{dx^n} + \\dots + a_1(x)\\frac{dy}{dx} + a_0(x)y = g(x)$. The general solution $y(x)$ is typically expressed as the sum of the complementary solution $y_c(x)$ and a particular solution $y_p(x)$. What is the relationship between $y(x)$, $y_c(x)$, and $y_p(x)$?", "answerOptions": [{"text": "$y(x) = y_c(x) - y_p(x)$", "rationale": "This is incorrect. The particular solution is added to the complementary solution, not subtracted, to account for the non-homogeneous term $g(x)$.", "isCorrect": false}, {"text": "$y(x) = y_c(x) + y_p(x)$", "rationale": "This is correct. For a linear non-homogeneous ODE, the general solution is the sum of the general solution to the associated homogeneous equation (complementary solution) and any particular solution to the non-homogeneous equation.", "isCorrect": true}, {"text": "$y(x) = y_p(x) - y_c(x)$", "rationale": "This is incorrect. The complementary solution represents the solutions when $g(x)=0$. The particular solution addresses the contribution of $g(x)$. Their sum gives the full solution.", "isCorrect": false}, {"text": "$y(x) = y_c(x) \\cdot y_p(x)$", "rationale": "This is incorrect. The relationship is additive for linear ODEs, not multiplicative. Multiplication would imply a non-linear superposition principle.", "isCorrect": false}], "hint": "Recall the principle of superposition for linear differential equations. The total response is the sum of the response due to the homogeneous part and the response due to the non-homogeneous forcing function."}, {"questionNumber": 2, "question": "For a second-order linear non-homogeneous ODE $\\frac{d^2y}{dx^2} + p(x)\\frac{dy}{dx} + q(x)y = g(x)$, if $y_1(x)$ and $y_2(x)$ form a fundamental set of solutions for the associated homogeneous equation, and $y_p(x)$ is a particular solution to the non-homogeneous equation, which of the following is the general solution?", "answerOptions": [{"text": "$y(x) = C_1 y_1(x) - C_2 y_2(x) + y_p(x)$", "rationale": "This is incorrect. The constants $C_1$ and $C_2$ should typically apply to both fundamental solutions, and the structure is additive.", "isCorrect": false}, {"text": "$y(x) = C_1 y_1(x) + C_2 y_2(x) + y_p(x)$", "rationale": "This is correct. The complementary solution is $y_c(x) = C_1 y_1(x) + C_2 y_2(x)$, and the general solution is $y(x) = y_c(x) + y_p(x)$.", "isCorrect": true}, {"text": "$y(x) = C_1 y_1(x) + C_2 y_2(x)$", "rationale": "This is incorrect. This represents only the complementary solution, which is the general solution to the homogeneous equation. It does not account for the non-homogeneous term $g(x)$.", "isCorrect": false}, {"text": "$y(x) = y_1(x) + y_2(x) + y_p(x)$", "rationale": "This is incorrect. The complementary solution should include arbitrary constants ($C_1, C_2$) to represent the general solution to the homogeneous part.", "isCorrect": false}], "hint": "Remember that the complementary solution is a linear combination of the fundamental solutions of the associated homogeneous ODE, with arbitrary constants."}, {"questionNumber": 3, "question": "When using the method of variation of parameters to find a particular solution $y_p(x)$ for a second-order linear ODE $y'' + p(x)y' + q(x)y = g(x)$, assuming $y_1(x)$ and $y_2(x)$ are linearly independent solutions to the homogeneous equation, the particular solution is often expressed as $y_p(x) = u_1(x)y_1(x) + u_2(x)y_2(x)$. What are the formulas for $u_1'(x)$ and $u_2'(x)$?", "answerOptions": [{"text": "$u_1'(x) = \\frac{y_2(x)g(x)}{W(y_1, y_2)}$ and $u_2'(x) = \\frac{-y_1(x)g(x)}{W(y_1, y_2)}$", "rationale": "This is incorrect. The signs in the numerators for $u_1'(x)$ and $u_2'(x)$ are typically swapped, and the denominator should involve the Wronskian.", "isCorrect": false}, {"text": "$u_1'(x) = \\frac{-y_2(x)g(x)}{W(y_1, y_2)}$ and $u_2'(x) = \\frac{y_1(x)g(x)}{W(y_1, y_2)}$", "rationale": "This is correct. These are the standard formulas for the derivatives of the coefficients in the variation of parameters method, where $W(y_1, y_2)$ is the Wronskian of $y_1$ and $y_2$. This assumes the ODE is in the standard form $y'' + p(x)y' + q(x)y = g(x)$.", "isCorrect": true}, {"text": "$u_1'(x) = \\frac{y_1(x)g(x)}{W(y_1, y_2)}$ and $u_2'(x) = \\frac{y_2(x)g(x)}{W(y_1, y_2)}$", "rationale": "This is incorrect. The formulas require specific coefficients involving the solutions and the forcing function, and the signs are crucial.", "isCorrect": false}, {"text": "$u_1'(x) = \\frac{y_2(x)}{W(y_1, y_2)}$ and $u_2'(x) = \\frac{y_1(x)}{W(y_1, y_2)}$", "rationale": "This is incorrect. These formulas are missing the forcing function $g(x)$ and the correct sign conventions.", "isCorrect": false}], "hint": "The variation of parameters method seeks to find functions $u_1(x)$ and $u_2(x)$ such that $y_p(x) = u_1(x)y_1(x) + u_2(x)y_2(x)$ is a solution. The derivatives $u_1'(x)$ and $u_2'(x)$ are found by solving a system of equations derived from imposing the differential equation and a constraint on the derivatives."}, {"questionNumber": 4, "question": "For the non-homogeneous ODE $y'' - y = e^{2x}$, the complementary solution to $y'' - y = 0$ is $y_c(x) = C_1e^x + C_2e^{-x}$. Which of the following is a suitable form for a particular solution $y_p(x)$ using the method of undetermined coefficients?", "answerOptions": [{"text": "$y_p(x) = Ae^x$", "rationale": "This is incorrect. The term $e^x$ is part of the complementary solution, so a simple $Ae^x$ will not work. We need to modify it by multiplying by $x$.", "isCorrect": false}, {"text": "$y_p(x) = Ae^{2x}$", "rationale": "This is correct. Since $e^{2x}$ is not a solution to the homogeneous equation, we can assume a particular solution of the form $y_p(x) = Ae^{2x}$. Substituting this into the ODE and solving for A yields the particular solution.", "isCorrect": true}, {"text": "$y_p(x) = Ax e^{2x}$", "rationale": "This is incorrect. While multiplying by $x$ is sometimes necessary, it's only required if the proposed form for $y_p(x)$ or parts of it are already solutions to the homogeneous equation. Here, $e^{2x}$ is not.", "isCorrect": false}, {"text": "$y_p(x) = A$", "rationale": "This is incorrect. The forcing function is $e^{2x}$, which is not a constant. A constant guess for $y_p(x)$ would only be appropriate if $g(x)$ were a constant.", "isCorrect": false}], "hint": "When using the method of undetermined coefficients, the form of the particular solution is guessed based on the form of the non-homogeneous term $g(x)$. If any part of the guessed form is a solution to the homogeneous equation, you must modify the guess by multiplying by $x$ (or higher powers of $x$ if necessary)."}, {"questionNumber": 5, "question": "Consider the second-order ODE $y'' + 4y = \\sin(x)$. The complementary solution is $y_c(x) = C_1 \\cos(2x) + C_2 \\sin(2x)$. Using the method of undetermined coefficients, what is the correct form for a particular solution $y_p(x)$?", "answerOptions": [{"text": "$y_p(x) = Ax \\cos(x) + Bx \\sin(x)$", "rationale": "This is incorrect. The non-homogeneous term is $\\sin(x)$, so the guess should involve $\\sin(x)$ and $\\cos(x)$, not multiples of $x$ unless those terms are already in $y_c(x)$.", "isCorrect": false}, {"text": "$y_p(x) = A \\cos(2x) + B \\sin(2x)$", "rationale": "This is incorrect. The terms $\\cos(2x)$ and $\\sin(2x)$ are part of the complementary solution. If we used this form, it would lead to $y'' + 4y = 0$, which is not the given ODE.", "isCorrect": false}, {"text": "$y_p(x) = Ax \\cos(2x) + Bx \\sin(2x)$", "rationale": "This is incorrect. The non-homogeneous term is $\\sin(x)$, not something involving $2x$. Modification by $x$ is needed if the forcing function has terms in $y_c$, but the functional form must match $g(x)$.", "isCorrect": false}, {"text": "$y_p(x) = A \\cos(x) + B \\sin(x)$", "rationale": "This is correct. Since $\\cos(x)$ and $\\sin(x)$ are not solutions to the homogeneous equation ($y''+4y=0$), we can assume a particular solution of the form $y_p(x) = A \\cos(x) + B \\sin(x)$.", "isCorrect": true}], "hint": "When guessing the form of the particular solution for the method of undetermined coefficients, ensure that the guess's fundamental components (e.g., $e^{ax}$, $x^n$, $\\sin(bx)$, $\\cos(bx)$) are distinct from those in the complementary solution. If there's an overlap, multiply the guess by appropriate powers of $x$."}]}, "inline_MJUjSKew4nQ_definitions": {"quiz_id": "inline_MJUjSKew4nQ_definitions", "chapter_number": 3, "video_id": "MJUjSKew4nQ", "title": "Micro-Practice: Integrating Factor for Constant Rate", "questions": [{"questionNumber": 1, "question": "Consider a first-order linear ODE of the form $\\frac{dy}{dx} + P(x)y = Q(x)$. What is the general form of the integrating factor, $\\mu(x)$, used to solve such an equation?", "answerOptions": [{"text": "$\\mu(x) = \\int Q(x) dx$", "rationale": "The integrating factor is derived based on the coefficient of $y$, $P(x)$, not the non-homogeneous term $Q(x)$.", "isCorrect": false}, {"text": "$\\mu(x) = e^{\\int P(x) dx}$", "rationale": "This is the standard formula for the integrating factor. Multiplying the ODE by this factor makes the left side the derivative of a product, $(\\mu(x) y)'$.", "isCorrect": true}, {"text": "$\\mu(x) = e^{-\\int P(x) dx}$", "rationale": "The exponent of the integrating factor should be positive, $\\int P(x) dx$, to cancel out the derivative term effectively when multiplied by $y$.", "isCorrect": false}, {"text": "$\\mu(x) = \\frac{Q(x)}{P(x)}$", "rationale": "This ratio does not represent the integrating factor. The integrating factor is an exponential function of the integral of $P(x)$.", "isCorrect": false}], "hint": "Think about what function's derivative, when multiplied by $y$, resembles the left side of the ODE after multiplying by the integrating factor."}, {"questionNumber": 2, "question": "For the specific case of a constant rate process modeled by the ODE $\\frac{dy}{dt} = ky$, where $k$ is a constant, what is the integrating factor if we rewrite it in the standard linear form $\\frac{dy}{dt} - ky = 0$?", "answerOptions": [{"text": "$\\mu(t) = e^{kt}$", "rationale": "In this form, $P(t) = -k$. The integrating factor is $e^{\\int -k dt} = e^{-kt}$.", "isCorrect": false}, {"text": "$\\mu(t) = e^{-kt}$", "rationale": "For the ODE $\\frac{dy}{dt} - ky = 0$, $P(t) = -k$. The integrating factor is $e^{\\int P(t) dt} = e^{\\int -k dt} = e^{-kt}$. This makes the left side $(e^{-kt} y)' = 0$.", "isCorrect": true}, {"text": "$\\mu(t) = t$", "rationale": "This is not an exponential function and does not arise from the integration of $P(t)$ in the correct form.", "isCorrect": false}, {"text": "$\\mu(t) = e^t$", "rationale": "This integrating factor implies $P(t) = 1$, which is not the case for the given ODE.", "isCorrect": false}], "hint": "First, rewrite the ODE $\\frac{dy}{dt} = ky$ into the standard form $\\frac{dy}{dt} + P ating factor; the exponential function is crucial for transforming the left side into the derivative of a product.", "isCorrect": false}, {"text": "$\\mu(x) = e^{P(x)}$", "rationale": "The integrating factor requires the integral of $P(x)$, not just $P(x)$ itself, because of the differential relationship $\\mu'(x) = \\mu(x)P(x)$.", "isCorrect": false}, {"text": "$\\mu(x) = \\frac{Q(x)}{P(x)}$", "rationale": "This ratio is not directly related to the construction of the integrating factor, which is designed to handle the left side of the equation.", "isCorrect": false}], "hint": "The integrating factor $\\mu(x)$ must satisfy the condition $\\frac{d\\mu}{dx} = P(x)\\mu(x)$. What differential equation is this, and what is its solution?"}, {"questionNumber": 3, "question": "Solve the differential equation $\\frac{dy}{dx} - \\frac{1}{x}y = x^2$. What is the general solution for $y(x)$ (for $x>0$)?", "answerOptions": [{"text": "$y(x) = x^3 + Cx$", "rationale": "The integrating factor is $e^{\\int -\\frac{1}{x} dx} = e^{-\\ln|x|} = e^{\\ln|x|^{-1}} = \\frac{1}{|x|}$. For $x>0$, $\\mu(x) = \\frac{1}{x}$. Multiplying the ODE by $\\frac{1}{x}$ gives $\\frac{1}{x}\\frac{dy}{dx} - \\frac{1}{x^2}y = x$. The left side is $\\frac{d}{dx}(\\frac{1}{x}y)$. So, $\\frac{d}{dx}(\\frac{1}{x}y) = x$. Integrating both sides yields $\\frac{1}{x}y = \\frac{x^2}{2} + C$. Thus, $y(x) = \\frac{x^3}{2} + Cx$. This option has a slight error in the coefficient of $x^3$.", "isCorrect": false}, {"text": "$y(x) = \\frac{x^4}{4} + Cx$", "rationale": "The integrating factor is $\\mu(x) = e^{\\int -\\frac{1}{x} dx} = \\frac{1}{x}$ (for $x>0$). Multiplying the ODE by $\\frac{1}{x}$ gives $\\frac{d}{dx}(\\frac{1}{x}y) = x$. Integrating yields $\\frac{1}{x}y = \\int x dx = \\frac{x^2}{2} + C$. Thus, $y(x) = \\frac{x^3}{2} + Cx$. This option has an error in the power of $x$ and the coefficient.", "isCorrect": false}, {"text": "$y(x) = \\frac{x^3}{2} + Cx$", "rationale": "The integrating factor is $\\mu(x) = l", "questions": [{"questionNumber": 1, "question": "For a linear constant-coefficient ODE of the form $L[y] = f(t)$, where $f(t) = e^{i\\omega t}$, what is the primary advantage of utilizing complex exponentials to find a particular solution $y_p(t)$?", "answerOptions": [{"text": "It eliminates the need for calculating the homogeneous solution $y_h(t)$.", "rationale": "Incorrect. The homogeneous solution is still required for the general solution, regardless of the method used for $y_p(t)$.", "isCorrect": false}, {"text": "It converts the differential operation into simple algebraic multiplication by the characteristic polynomial $P(i\\omega)$.", "rationale": "Correct. By assuming $y_p(t) = A e^{i\\omega t}$, the operator $L$ acts on the exponential such that $L[A e^{i\\omega t}] = A P(i\\omega) e^{i\\omega t}$, turning the ODE into an algebraic equation.", "isCorrect": true}, {"text": "It ensures that the resulting particular solution $y_p(t)$ is always a purely real-valued function.", "rationale": "Incorrect. The solution $y_p(t)$ will generally be complex-valued; its real and imaginary parts correspond to the responses to $\\cos(\\omega t)$ and $\\sin(\\omega t)$, respectively.", "isCorrect": false}, {"text": "It allows the system to remain linear when the input frequency is zero.", "rationale": "Incorrect. The method of complex exponentials applies to linear systems regardless of the value of the frequency $\\omega$.", "isCorrect": false}], "hint": "Consider how the derivative operator $\\frac{d}{dt}$ acts on $e^{st}$."}, {"questionNumber": 2, "question": "Given the ODE $y'' + 4y = e^{it}$, what is the correct form of the particular solution $y_p(t)$ obtained using the method of complex exponentials?", "answerOptions": [{"text": "$y_p(t) = \\frac{1}{3} e^{it}$", "rationale": "Correct. Substituting $y = A e^{it}$ into $y'' + 4y = e^{it}$ gives $A(-1) + 4A = 1$, which implies $3A = 1$, thus $A = 1/3$.", "isCorrect": true}, {"text": "$y_p(t) = \\frac{1}{5} e^{it}$", "rationale": "Incorrect. This would result from $A(1 + 4) = 1$, which ignores the effect of the second derivative on the exponential factor $e^{it}$.", "isCorrect": false}, {"text": "$y_p(t) = i e^{it}$", "rationale": "Incorrect. Substituting this into the ODE yields $(-i + 4i)e^{it} = 3ie^{it} \\neq e^{it}$.", "isCorrect": false}, {"text": "$y_p(t) = e^{it} + C_1 \\cos(2t) + C_2 \\sin(2t)$", "rationale": "Incorrect. The term involving $C_1$ and $C_2$ belongs to the homogeneous solution, not the particular solution $y_p(t)$.", "isCorrect": false}], "hint": "Assume $y_p(t) = A e^{it}$ and substitute into the differential equation."}, {"questionNumber": 3, "question": "If the driving force is $\\cos(\\omega t)$, how do we extract the physical response from the complex solution $z(t)$ where $L[z] = e^{i\\omega t}$?", "answerOptions": [{"text": "Take the derivative of $z(t)$.", "rationale": "Incorrect. Differentiation does not extract the physical response to the cosine input.", "isCorrect": false}, {"text": "Take the real part, $y_p(t) = \\text{Re}\\{z(t)\\}$.", "rationale": "Correct. Since $\\cos(\\omega t) = \\text{Re}\\{e^{i\\omega t}\\}$, the linearity of the operator $L$ ensures the real part of the complex solution is the solution to the real-valued ODE.", "isCorrect": true}, {"text": "Take the imaginary part, $y_p(t) = \\text{Im}\\{z(t)\\}$.", "rationale": "Incorrect. The imaginary part of $e^{i\\omega t}$ is $\\sin(\\omega t)$, not $\\cos(\\omega t)$.", "isCorrect": false}, {"text": "Multiply $z(t)$ by $i$ and take the real part.", "rationale": "Incorrect. This procedure does not isolate the response to the cosine component.", "isCorrect": false}], "hint": "Use Euler's formula: $e^{i\\omega t} = \\cos(\\omega t) + i\\sin(\\omega t)$."}, {"questionNumber": 4, "question": "When solving $L[y] = e^{i\\omega t}$, what condition indicates that resonance is occurring?", "answerOptions": [{"text": "The coefficient $A$ is a real number.", "rationale": "Incorrect. The antly near resonance.", "isCorrect": false}], "hint": "Consider the limit of $A = \\frac{1}{P(i\\omega)}$ as $P(i\\omega) \\to 0$."}]}, "inline_TCkLSYxx21c_definitions": {"quiz_id": "inline_TCkLSYxx21c_definitions", "chapter_number": 6, "video_id": "TCkLSYxx21c", "title": "Micro-Practice: The Logistic Equation", "questions": [{"questionNumber": 1, "question": "The autonomous differential equation for the logistic growth model is given by $\\frac{dP}{dt} = rP\\left(1 - \\frac{P}{K}\\right)$. Which of the following statements correctly identifies the steady-state (equilibrium) solutions?", "answerOptions": [{"text": "$P = 0$ is a stable equilibrium and $P = K$ is an unstable equilibrium.", "rationale": "Incorrect. In the logistic model, for positive populations, $P=0$ is the extinction state (unstable) and $P=K$ is the carrying capacity (stable).", "isCorrect": false}, {"text": "$P = 0$ is an unstable equilibrium and $P = K$ is a stable equilibrium.", "rationale": "Correct. Evaluating the sign of $f(P) = rP(1 - P/K)$, we see $f'(0) > 0$ and $f'(K) < 0$, confirming $P=0$ is unstable and $P=K$ is stable.", "isCorrect": true}, {"text": "Both $P = 0$ and $P = K$ are stable equilibrium points.", "rationale": "Incorrect. A system cannot have two adjacent stable equilibria without an unstable one in between; the derivative sign changes across the roots.", "isCorrect": false}, {"text": "There are no equilibrium points for this equation.", "rationale": "Incorrect. Equilibrium points occur where $\\frac{dP}{dt} = 0$, which yields $P=0$ and $P=K$.", "isCorrect": false}], "hint": "Find the roots of the growth function $f(P) = rP(1 - P/K)$ and test the sign of $f'(P)$ at these points."}, {"questionNumber": 2, "question": "What is the qualitative behavior of the solution $P(t)$ to the logistic equation if the initial population $P(0)$ satisfies $P(0) > K$?", "answerOptions": [{"text": "$P(t)$ increases monotonically toward infinity.", "rationale": "Incorrect. When $P > K$, the term d $y^* = \\pi$", "rationale": "At $y^*=0$, $f'(0) = \\cos(0) = 1$ (unstable). At $y^*=\\pi$, $f'(\\pi) = \\cos(\\pi) = -1$ (stable).", "isCorrect": false}, {"text": "$y^* = 0$ and $y^* = 2\\pi$", "rationale": "Both are points where the derivative $\\cos(y)$ is positive, hence unstable.", "isCorrect": false}, {"text": "$y^* = \\pi$", "rationale": "The slope $\\cos(\\pi) = -1$, confirming that $y^* = \\pi$ is the only stable steady state in this interval.", "isCorrect": true}, {"text": "No steady states in this interval are stable.", "rationale": "$y^* = \\pi$ is stable because $f'(y) < 0$ at that point.", "isCorrect": false}], "hint": "Identify the zeros of $\\sin(y)$ and evaluate the sign of the derivative $\\cos(y)$ at those points."}]}, "inline_xCCeV-glFdM_definitions": {"quiz_id": "inline_xCCeV-glFdM_definitions", "chapter_number": 8, "video_id": "xCCeV-glFdM", "title": "Micro-Practice: Second Order Equations", "questions": [{"questionNumber": 1, "question": "For the linear homogeneous second-order differential equation $y'' + py' + qy = 0$ with constant coefficients, the characteristic equation is given by $r^2 + pr + q = 0$. If the discriminant $D = p^2 - 4q$ is negative, what is the form of the general solution?", "answerOptions": [{"text": "$y(x) = c_1 e^{r_1 x} + c_2 e^{r_2 x}$ where $r_1, r_2$ are distinct real roots.", "rationale": "This form applies when the roots are real and distinct, which occurs when $D > 0$.", "isCorrect": false}, {"text": "$y(x) = c_1 e^{\\alpha x} \\cos(\\beta x) + c_2 e^{\\alpha x} \\sin(\\beta x)$ where $r = \\alpha \\pm i\\beta$.", "rationale": "When $D < 0$, the roots are complex conjugates, leading to oscillatory solutions involving sine and cosine.", "isCorrect": true}, {"text": "$y(x) = c_1 e^{rx} + c_2 x e^{rx}$ where $r$ is a repeated root.", "rationale": "This form applies when the roots are real and repeated, which occurs when $D = 0$.", "isCorrect": false}, {"text": "$y(x) = c_1 \\cos(x) + c_2 \\sin(x)$ regardless of th  "If $a$ is a simple root, multiplying by $x$ ensures the assumption is linearly independent of the homogeneous solutions.", "isCorrect": true}, {"text": "Assume $y_p(x) = A\\ln(x)e^{ax}$.", "rationale": "This is not the standard form prescribed by the Method of Undetermined Coefficients.", "isCorrect": false}, {"text": "The method of undetermined coefficients cannot be used for exponential functions.", "rationale": "The method of undetermined coefficients is specifically designed for exponentials, polynomials, and trigonometric functions.", "isCorrect": false}], "hint": "When the trial solution overlaps with the homogeneous solution, multiply by $x$ (or $x^2$ if it is a repeated root)."}, {"questionNumber": 4, "question": "Which of the following is a characteristic of the Principle of Superposition for linear homogeneous equations?", "answerOptions": [{"text": "It applies to all non-linear second-order equations.", "rationale": "Superposition specifically requires linearity; non-linear equations generally do not satisfy this principle.", "isCorrect": false}, {"text": "If $y_1$ and $y_2$ are solutions, then $c_1 y_1 + c_2 y_2$ is also a solution.", "rationale": "This is the definition of the superposition principle for linear homogeneous ODEs.", "isCorrect": true}, {"text": "The sum of solutions must satisfy a non-homogeneous boundary condition.", "rationale": "Superposition pertains to the homogeneity of the differential operator, not the boundary conditions.", "isCorrect": false}, {"text": "It implies that $y_1 \\cdot y_2$ is also a solution.", "rationale": "Linearity applies to additive and scalar multiplication, not multiplication of functions.", "isCorrect": false}], "hint": "Consider the linearity of the differentiation operator $L[y] = y'' + py' + qy$."}, {"questionNumber": 5, "question": "The method of Variation of Parameters is used to find a particular solution $y_p = u_1 y_1 + u_2 y_2$ for $y'' + p(x)y' + q(x)y = g(x)$. Which condition is typically impose ent to the graph of the function at a specific point."}, {"questionNumber": 2, "question": "An isocline for the differential equation $$\\frac{dy}{dx} = f(x, y)$$ is defined as the set of points where:", "answerOptions": [{"text": "The function $y(x)$ reaches a local maximum or minimum.", "rationale": "While extrema occur where the derivative is zero, an isocline is a more general collection of points where the derivative equals *any* constant $k$.", "isCorrect": false}, {"text": "The slope of the solution curves is constant, satisfying $f(x, y) = k$.", "rationale": "Isoclines (from Greek 'isos' meaning equal and 'klisis' meaning inclination) are curves along which all slope segments in the slope field have the same gradient $k$.", "isCorrect": true}, {"text": "The solution curve $y(x)$ intersects the $x$-axis.", "rationale": "Points where $y=0$ are roots or $x$-intercepts, which do not necessarily relate to the constant slope property of isoclines.", "isCorrect": false}, {"text": "The second derivative $$\\frac{d^2y}{dx^2}$$ is equal to zero.", "rationale": "Points where the second derivative is zero are points of inflection, not necessarily isoclines.", "isCorrect": false}], "hint": "Think of 'isocline' as 'equal incline.' What mathematical expression defines a constant slope in the context of $$\\frac{dy}{dx} = f(x, y)$$?"}, {"questionNumber": 3, "question": "Consider the differential equation $$\\frac{dy}{dx} = x^2 + y^2$$. What is the geometric shape of the isoclines for this equation?", "answerOptions": [{"text": "Vertical lines of the form $x = C$.", "rationale": "Vertical lines would require $f(x, y)$ to depend only on $x$ in a linear fashion, but here both $x$ and $y$ are squared.", "isCorrect": false}, {"text": "Parabolas of the form $y = x^2 + C$.", "rationale": "For the isocline to be a parabola, the equation $x^2 + y^2 = k$ would need to be linear in $y$ and quadratic in $x$.", "isCorrect": false}, {"text": "Concentric circles centered at the origin.", 's conditions fail when the solution trajectory reaches that value."}]}, "inline_2H6BZHlD_3g_definitions": {"quiz_id": "inline_2H6BZHlD_3g_definitions", "chapter_number": 3, "video_id": "2H6BZHlD_3g", "title": "Micro-Practice: Linear Differential Equations & Integrating Factors", "questions": [{"questionNumber": 1, "question": "Which of the following represents the standard form of a first-order linear ordinary differential equation (ODE) required to apply the method of integrating factors?", "answerOptions": [{"text": "$$\\frac{dy}{dx} + P(x)y = Q(x)$$", "rationale": "Correct. In this form, the coefficient of the derivative $$\\frac{dy}{dx}$$ is $1$, which allows for the direct identification of the function $P(x)$ used to calculate the integrating factor.", "isCorrect": true}, {"text": "$$M(x,y)dx + N(x,y)dy = 0$$", "rationale": "Incorrect. This is the general differential form often used for testing exactness, not the specific standard form for the linear integrating factor method.", "isCorrect": false}, {"text": "$$\\frac{dy}{dx} = f(x)g(y)$$", "rationale": "Incorrect. This is the standard form for a separable differential equation, which is solved by algebraic rearrangement rather than an integrating factor.", "isCorrect": false}, {"text": "$$\\frac{dy}{dx} + P(x)y^n = Q(x)$$", "rationale": "Incorrect. This is a Bernoulli equation. It is non-linear if $n \\neq 0$ and $n \\neq 1$, though it can be transformed into a linear equation via substitution.", "isCorrect": false}], "hint": "The standard form requires the derivative term to be isolated with a coefficient of $1$ and the dependent variable $y$ to appear linearly."}, {"questionNumber": 2, "question": "Given the first-order linear equation in standard form, $$\\frac{dy}{dx} + P(x)y = Q(x)$$, what is the formula for the integrating factor $$\\mu(x)$$?", "answerOptions": [{"text": "$$\\mu(x) = \\int P(x) dx$$", "rationale": "Incorrect. This is just the integral of the coefficient function, not the exponential function required to satisfy the product rule identity.", "isCorrect": false}, {"text": "$$\\mu(x) = e^{\\int P(x) dx}$$", "rationale": "Correct. Multiplying the ODE by this factor $$\\mu(x)$$ transforms the left-hand side into the derivative of a product: $$\\frac{d}{dx}[\\mu(x)y]$$.", "isCorrect": true}, {"text": "$$\\mu(x) = e^{-\\int P(x) dx}$$", "rationale": "Incorrect. This form is often associated with the homogeneous solution, but the integrating factor itself does not have a negative sign in the exponent.", "isCorrect": false}, {"text": "$$\\mu(x) = \\ln |P(x)|$$", "rationale": "Incorrect. The integrating factor involves an exponential of an integral, not a logarithm of the function $P(x)$.", "isCorrect": false}], "hint": "Recall that we seek a function $$\\mu(x)$$ such that $$\\mu'(x) = P(x)\\mu(x)$$. Solve this simple separable equation for $$\\mu(x)$$."}, {"questionNumber": 3, "question": "Determine the integrating factor $$\\mu(x)$$ for the following differential equation, assuming $x > 0$: $$x \\frac{dy}{dx} + 4y = \\sin(x)$$ ", "answerOptions": [{"text": "$$\\mu(x) = e^{4x}$$", "rationale": "Incorrect. This would be correct if $P(x) = 4$, but the original equation must first be divided by $x$ to reach standard form.", "isCorrect": false}, {"text": "$$\\mu(x) = x^4$$", "rationale": "Correct. Standardizing gives $$\\frac{dy}{dx} + \\frac{4}{x}y = \\frac{\\sin(x)}{x}$$. Thus $P(x) = \\frac{4}{x}$ and $$\\mu(x) = e^{\\int \\frac{4}{x} dx} = e^{4 \\ln x} = x^4$$.", "isCorrect": true}, {"text": "$$\\mu(x) = 4 \\ln(x)$$", "rationale": "Incorrect. This is the result of the integral $$\\int P(x) dx$$, but the integrating factor is the exponential of this result.", "isCorrect": false}, {"text": "$$\\mu(x) = x^{-4}$$", "rationale": "Incorrect. This occurs if the sign of $P(x)$ is misinterpreted or if the division by $x$ is handled incorrectly.", "isCorrect": false}], "hint": "First, divide the entire equation by $x$ to ensure the coefficient of $y'$ is $1$. Then
