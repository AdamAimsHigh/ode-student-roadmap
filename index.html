<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODE Playlist Study Dashboard</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- KaTeX for beautiful LaTeX rendering in Quizzes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <!-- Math.js for robust local mathematical parsing and evaluation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #020617 100%);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glow-color: rgba(99, 102, 241, 0.4);
            --card-bg: rgba(30, 41, 59, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #10b981;
            --sidebar-width: 320px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, .chapter-title {
            font-family: 'Outfit', sans-serif;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.6);
        }

        /* Header block */
        header {
            position: relative;
            padding: 3rem 2rem 2.5rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.3);
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(8px);
        }

        .glow-circle {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 250px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.25) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 1.5rem;
            font-weight: 300;
        }

        /* Progress Dashboard Banner */
        .progress-banner {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .progress-info {
            text-align: left;
        }

        .progress-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .progress-percentage {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
        }

        .progress-track-bg {
            flex-grow: 1;
            height: 10px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--accent-gradient);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Main Grid Layout */
        .app-container {
            max-width: 1500px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: flex;
            gap: 2rem;
            flex-grow: 1;
            width: 100%;
        }

        /* Sidebar Navigation & Filters */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            position: sticky;
            top: 2rem;
            height: calc(100vh - 6rem);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reset-btn {
            font-size: 0.75rem;
            color: #ef4444;
            background: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }

        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 0.25rem;
        }

        .filter-item {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .filter-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }

        .filter-item.active {
            background: rgba(99, 102, 241, 0.15);
            color: var(--text-primary);
            border-color: rgba(99, 102, 241, 0.3);
            font-weight: 600;
        }

        .filter-badge {
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-weight: 400;
        }

        .filter-item.active .filter-badge {
            background: var(--accent-gradient);
            color: white;
            font-weight: 600;
        }

        /* Content Area */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* Chapter Section */
        .chapter-section {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scroll-margin-top: 2rem;
            transition: opacity 0.3s;
        }

        .chapter-header {
            border-bottom: 2px solid rgba(99, 102, 241, 0.25);
            padding-bottom: 0.75rem;
        }

        .chapter-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .chapter-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* Video Card Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* Video Card */
        .video-card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 
                        0 0 15px 0 rgba(99, 102, 241, 0.1);
        }

        .video-card.watched {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            overflow: hidden;
        }

        .thumbnail-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .video-card:hover .thumbnail-img {
            transform: scale(1.05);
        }

        /* Checkbox watched layer */
        .card-checkbox-label {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.85);
            border: 1.5px solid var(--card-border);
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .card-checkbox-label:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .card-checkbox {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-secondary);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: transparent;
        }

        .card-checkbox:checked {
            background: var(--success-color);
            border-color: var(--success-color);
        }

        .card-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 11px;
            font-weight: 900;
        }

        .orig-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.85);
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(4px);
            font-weight: 500;
        }

        .video-details {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
            gap: 1rem;
        }

        .video-title-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.2s;
        }

        .video-title-link:hover {
            color: #a855f7;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }

        .play-btn {
            width: 100%;
            padding: 0.65rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 0.85rem;
        }

        .play-btn:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
            transform: scale(1.02);
            color: #fff;
        }

        }

        /* Inline Quiz Card */
        .quiz-card-inline {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6) 0%, rgba(76, 29, 149, 0.2) 100%);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .quiz-card-inline:hover {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 
                        0 0 15px 0 rgba(139, 92, 246, 0.2);
        }
        
        .quiz-card-inline.passed {
            border-color: rgba(16, 185, 129, 0.4);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6) 0%, rgba(6, 78, 59, 0.2) 100%);
        }

        .quiz-card-inline.passed:hover {
            border-color: rgba(16, 185, 129, 0.6);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 
                        0 0 15px 0 rgba(16, 185, 129, 0.2);
        }

        .quiz-card-header {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Matches 16:9 Aspect Ratio */
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-card-icon-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .quiz-card-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.6));
            animation: float 3s ease-in-out infinite;
        }

        .quiz-card-inline.passed .quiz-card-icon {
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.6));
            animation: none;
        }

        .quiz-card-badge {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #c084fc;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .quiz-card-inline.passed .quiz-card-badge {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #34d399;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        /* Quiz Styles */
        .quiz-badge-btn {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            margin-top: 8px;
            font-family: 'Outfit', sans-serif;
        }

        .quiz-badge-btn:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .quiz-passed-badge {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #34d399;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
        }

        /* Modal Background */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.75);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Modal Container */
        .quiz-modal {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: 90%;
            max-width: 650px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        0 0 40px rgba(99, 102, 241, 0.15);
            backdrop-filter: blur(20px);
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .quiz-modal {
            transform: scale(1);
        }

        .close-modal-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal-btn:hover {
            color: var(--text-primary);
        }

        /* Quiz UI Elements */
        .quiz-header {
            margin-bottom: 1.5rem;
        }

        .quiz-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .quiz-progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .quiz-progress-bar-bg {
            height: 6px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 3px;
            overflow: hidden;
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .quiz-progress-bar-fill {
            height: 100%;
            background: var(--accent-gradient);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.5;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .option-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .option-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(99, 102, 241, 0.3);
            color: var(--text-primary);
        }

        .option-card.selected {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.6);
            color: var(--text-primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.25);
        }

        .option-card.correct {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--success-color);
            color: var(--text-primary);
        }

        .option-card.incorrect {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
            color: var(--text-primary);
        }

        .option-radio {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-secondary);
            border-radius: 50%;
            outline: none;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .option-card.correct .option-radio {
            border-color: var(--success-color);
            background: var(--success-color);
        }

        .option-card.correct .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
        }

        .option-card.incorrect .option-radio {
            border-color: #ef4444;
            background: #ef4444;
        }

        .option-card.incorrect .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
        }

        .option-card.selected .option-radio {
            border-color: #a855f7;
        }

        .option-card.selected .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-gradient);
        }

        /* Feedback Area */
        .feedback-container {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .feedback-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .feedback-title.correct { color: var(--success-color); }
        .feedback-title.incorrect { color: #ef4444; }

        .feedback-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Action Buttons */
        .quiz-actions {
            display: flex;
            align-items: center;

        let particularCurves = [];
        const xMin = -5, xMax = 5;
        const yMin = -5, yMax = 5;

        function toPixelX(x, canvas) {
            return ((x - xMin) / (xMax - xMin)) * canvas.width;
        }

        function toPixelY(y, canvas) {
            return canvas.height - (((y - yMin) / (yMax - yMin)) * canvas.height);
        }

        function toCartesianX(px, canvas) {
            return xMin + (px / canvas.width) * (xMax - xMin);
        }

        function toCartesianY(py, canvas) {
            return yMin + ((canvas.height - py) / canvas.height) * (yMax - yMin);
        }

        function getMathFunction(exprStr) {
            if (typeof math !== 'undefined') {
                try {
                    const parsed = math.parse(exprStr);
                    const compiled = parsed.compile();
                    return (x, y) => {
                        const val = compiled.evaluate({ x: x, y: y });
                        if (typeof val === 'object' && val.isComplex) return NaN;
                        return Number(val);
                    };
                } catch (err) {
                    throw new Error("Invalid equation: " + err.message);
                }
            } else {
                console.warn("Math.js CDN not available, running fallback evaluator.");
                let jsExpr = exprStr
                    .replace(/\^/g, '**')
                    .replace(/sin/g, 'Math.sin')
                    .replace(/cos/g, 'Math.cos')
                    .replace(/tan/g, 'Math.tan')
                    .replace(/exp/g, 'Math.exp')
                    .replace(/log/g, 'Math.log')
                    .replace(/pi/g, 'Math.PI')
                    .replace(/e/g, 'Math.E')
                    .replace(/abs/g, 'Math.abs')
                    .replace(/sqrt/g, 'Math.sqrt');
                    
                return (x, y) => {
                    try {
                        const fn = new Function('x', 'y', `return (${jsExpr});`);
                        return Number(fn(x, y));
                    } catch (err) {
                        throw new Error("Invalid equation or Math.js unavailable: " + err.message);
                    }
                };
            }
        }

        function integrateRK4(x0, y0, fn, direction, canvas) {
            const points = [];
            let x = x0;
            let y = y0;
            const h = direction * 0.04;
            const maxSteps = 150;
            
            points.push({ x: x, y: y });
            
            for (let step = 0; step < maxSteps; step++) {
                const k1 = fn(x, y);
                if (isNaN(k1) || !isFinite(k1)) break;
                
                const x_half = x + h / 2;
                const y_k1 = y + (h * k1) / 2;
                const k2 = fn(x_half, y_k1);
                if (isNaN(k2) || !isFinite(k2)) break;
                
                const y_k2 = y + (h * k2) / 2;
                const k3 = fn(x_half, y_k2);
                if (isNaN(k3) || !isFinite(k3)) break;
                
                const x_next = x + h;
                const y_k3 = y + h * k3;
                const k4 = fn(x_next, y_k3);
                if (isNaN(k4) || !isFinite(k4)) break;
                
                const slope = (k1 + 2 * k2 + 2 * k3 + k4) / 6;
                y = y + h * slope;
                x = x_next;
                
                if (x < xMin - 0.5 || x > xMax + 0.5 || y < yMin - 0.5 || y > yMax + 0.5) {
                    break;
                }
                
                points.push({ x: x, y: y });
            }
            return points;
        }

        function drawSlopeFieldOnCanvas() {
            const canvas = document.getElementById('slope-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            
            for (let x = xMin; x <= xMax; x += 1) {
                const px = toPixelX(x, canvas);
                ctx.beginPath();
                ctx.moveTo(px, 0);
                ctx.lineTo(px, canvas.height);
                ctx.stroke();
            }
            for (let y = yMin; y <= yMax; y += 1) {
                const py = toPixelY(y, canvas);
                ctx.beginPath();
                ctx.moveTo(0, py);
                ctx.lineTo(canvas.width, py);
                ctx.stroke();
            }
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.font = '10px Inter, sans-serif';
            
            const pY0 = toPixelY(0, canvas);
            ctx.beginPath();
            ctx.moveTo(0, pY0);
            ctx.lineTo(canvas.width, pY0);
            ctx.stroke();
            
            const pX0 = toPixelX(0, canvas);
            ctx.beginPath();
            ctx.moveTo(pX0, 0);
            ctx.lineTo(pX0, canvas.height);
            ctx.stroke();
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for (let x = xMin; x <= xMax; x += 1) {
                if (x !== 0) {
                    ctx.fillText(x.toString(), toPixelX(x, canvas), pY0 + 5);
                }
            }
            
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            for (let y = yMin; y <= yMax; y += 1) {
                if (y !== 0) {
                    ctx.fillText(y.toString(), pX0 - 5, toPixelY(y, canvas));
                }
            }
            
            const exprInput = document.getElementById('slope-expr');
            const densityInput = document.getElementById('slope-density');
            const lengthInput = document.getElementById('slope-length');
            const errorBox = document.getElementById('slope-error');
            
            const exprStr = exprInput ? exprInput.value.trim() : "y - x";
            const density = densityInput ? parseInt(densityInput.value) : 20;
            const vectorLength = lengthInput ? parseInt(lengthInput.value) : 7;
            
            if (errorBox) errorBox.style.display = 'none';
            
            let derivativeFn;
            try {
                derivativeFn = getMathFunction(exprStr);
            } catch (err) {
                if (errorBox) {
                    errorBox.innerText = err.message;
                    errorBox.style.display = 'block';
                }
                return;
            }
            
            const dxCartesian = (xMax - xMin) / density;
            const dyCartesian = (yMax - yMin) / density;
            
            for (let i = 0.5; i < density; i++) {
                const x = xMin + i * dxCartesian;
                for (let j = 0.5; j < density; j++) {
                    const y = yMin + j * dyCartesian;
                    
                    let slope = derivativeFn(x, y);
                    if (isNaN(slope) || !isFinite(slope)) continue;
                    
                    const px = toPixelX(x, canvas);
                    const py = toPixelY(y, canvas);
                    
                    const angle = Math.atan(slope);
                    
                    const dxPixel = Math.cos(angle) * (vectorLength / 2);
                    const dyPixel = Math.sin(angle) * (vectorLength / 2);
                    
                    const hue = Math.round(180 + (angle / (Math.PI / 2)) * 80);
                    ctx.strokeStyle = `hsla(${hue}, 85%, 65%, 0.75)`;
                    ctx.lineWidth = 1.5;
                    
                    ctx.beginPath();
                    ctx.moveTo(px - dxPixel, py + dyPixel);
                    ctx.lineTo(px + dxPixel, py - dyPixel);
                    ctx.stroke();
                }
            }
            
            particularCurves.forEach(curve => {
                if (curve.points.length < 2) return;
                
                ctx.strokeStyle = curve.color;
                ctx.lineWidth = 3;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                
                ctx.shadowColor = curve.color;
                ctx.shadowBlur = 8;
                
                ctx.beginPath();
                ctx.moveTo(toPixelX(curve.points[0].x, canvas), toPixelY(curve.points[0].y, canvas));
                for (let idx = 1; idx < curve.points.length; idx++) {
                    ctx.lineTo(toPixelX(curve.points[idx].x, canvas), toPixelY(curve.points[idx].y, canvas));
                }
                ctx.stroke();
                
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(toPixelX(curve.x0, canvas), toPixelY(curve.y0, canvas), 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
            });
        }

        window.generateSlopeField = () => {
            drawSlopeFieldOnCanvas();
        };

                        const x0 = toCartesianX(px, canvas);
                        const y0 = toCartesianY(py, canvas);
                        
                        const exprInput = document.getElementById('slope-expr');

                        try {

            selectedOptionIdx = null;

            const q = currentQuiz.questions[currentQuestionIdx];

            let optionsHtml = '';

            // LaTeX rendering
            if (typeof renderMathInElement === 'function') {

                        {left: "$", right: "$", display: false}

        function selectOption(optIdx) {
            if (isAnswerSubmitted) return;

            selectedOptionIdx = optIdx;

            document.querySelectorAll('.option-card').forEach((card, idx) => {
                if (idx === optIdx) {

        function submitAnswer() {
            if (isAnswerSubmitted || selectedOptionIdx === null) return;

            isAnswerSubmitted = true;

            const q = currentQuiz.questions[currentQuestionIdx];
            const selectedOpt = q.answerOptions[selectedOptionIdx];
            const isCorrect = selectedOpt.isCorrect;

            const feedbackTitle = document.getElementById('feedback-title');

            const submitBtn = document.getElementById('submit-btn');

                    card.classList.add('incorrect');

                card.style.cursor = 'default';

            if (isCorrect) {
                score++;

                feedbackTitle.innerHTML = '🎉 Correct!';
                feedbackText.innerHTML = selectedOpt.rationale;

                feedbackTitle.className = 'feedback-title incorrect';

            if (typeof renderMathInElement === 'function') {

                    total: totalQuestions
                };
                localStorage.setItem('completed_quizzes', JSON.stringify(completedQuizzes));

                // Update Chapter Header UI
                const statusContainer = document.getElementById('quiz-status-container-' + currentQuizChapter);
                if (statusContainer) {
                    statusContainer.innerHTML = `
                        <div class="quiz-passed-badge" id="passed-badge-${currentQuiz.quiz_id}">
                            <span>✓ Passed Checkpoint</span>
                        </div>
                    `;
                }

                // Reload navigation or badge in sidebar
                location.reload();
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', buildDashboard);
    </script>
</body>
</html>
